services:
  ipaes:
    image: hoya0803/ipaes:latest
    container_name: ipaes
    restart: unless-stopped
    ports:
      - "8084:80"
      - "8085:8085"
    volumes:
      - /your/path/to/ipa:/data/ipa
      - /your/path/to/icons:/data/icons
      - ./config:/config
      - ./session:/session
      - ./logs:/logs
      - ./data:/data
    environment:
      - REPO_BASE_URL=${REPO_BASE_URL}
      - REPO_NAME=My IPA Repo
      - REPO_IDENTIFIER=com.example.ipa.repo
      - TG_PROXY=
      - TG_SCAN_CRON=0 17 * * *
      - TG_SCAN_HOURS=25
      - TZ=Asia/Shanghai
