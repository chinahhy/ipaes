{% extends "_layout.html" %}
{% block content %}
  <section class="view" x-cloak x-transition.opacity.duration.150ms>
    <div class="grid two">
      <div class="panel">
        <div class="panel-head">
          <div class="head-block">
            <h2>扫描</h2>
            <span x-text="'每日 ' + (cfg.rate_limit?.max_per_day || 30) + ' 次'"></span>
          </div>
        </div>
        <div class="panel-body">
          <div class="grid3">
            <div class="field">
              <label>每日最多</label>
              <input type="number" x-model.number="cfg.rate_limit.max_per_day" min="1">
            </div>
            <div class="field">
              <label>最小间隔</label>
              <input type="number" x-model.number="cfg.rate_limit.min_interval_sec" min="1">
            </div>
            <div class="field">
              <label>最大间隔</label>
              <input type="number" x-model.number="cfg.rate_limit.max_interval_sec" min="1">
            </div>
          </div>
          <div class="actions">
            <button type="button" class="btn primary" @click="saveRate()">保存</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="head-block">
            <h2>Bot</h2>
            <span x-text="botCfg.has_token ? '已配置' : '未配置'"></span>
          </div>
        </div>
        <div class="panel-body">
          <div class="field">
            <label>Bot Token</label>
            <input x-model="botCfg.token" type="text" :placeholder="botCfg.has_token ? (botCfg.token_preview || '已配置 · 留空不修改') : '123456:ABC-DEF1234gh...'">
          </div>
          <div class="field">
            <label>USER_ID 白名单</label>
            <input x-model="botCfg.user_ids_text" type="text" placeholder="123456789, 987654321">
          </div>
          <div class="actions" style="margin-top:10px">
            <label class="checkline"><input type="checkbox" x-model="botCfg.enabled"> 启用</label>
          </div>
          <div class="status-line" style="margin-top:12px">
            <span class="dot" :class="{on:botCfg.has_token}"></span>
            <span x-text="botCfg.has_token ? '已连接' : '未连接'"></span>
            <span class="code" x-show="botCfg.has_token" x-cloak x-text="botCfg.token_preview || '***'"></span>
          </div>
          <div class="actions">
            <button type="button" class="btn primary" @click="saveBot()" :disabled="botSaving" x-text="botSaving ? '保存中' : '保存'"></button>
            <button type="button" class="btn" @click="testBot()" :disabled="botTesting || !botCfg.has_token" x-show="botCfg.has_token" x-cloak x-text="botTesting ? '测试中' : '测试'"></button>
          </div>
          <div x-show="botTestResult" x-cloak class="result-box" :class="botTestResult && botTestResult.ok ? 'ok' : 'err'">
            <template x-if="botTestResult && botTestResult.ok">
              <div>连接正常</div>
            </template>
            <template x-if="botTestResult && !botTestResult.ok">
              <div x-text="botTestResult.error"></div>
            </template>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="head-block">
            <h2>软件源地址</h2>
            <span x-text="repoInfo.url ? '已配置' : '未配置'"></span>
          </div>
        </div>
        <div class="panel-body">
          <div class="muted" style="margin-bottom:10px; line-height:1.6">
            在客户端（轻松签 / 全能签 / AltStore）添加此地址即可订阅 IPA 源。点击复制按钮一键获取。
          </div>
          <div class="field" style="position:relative">
            <label>订阅地址</label>
            <div style="display:flex;gap:8px;align-items:center">
              <input x-ref="repoUrlInput" :value="repoInfo.url" readonly style="flex:1;cursor:text;font-family:monospace,Consolas,'Courier New',monospace;font-size:13px" @click="$event.target.select()">
              <button type="button" class="btn primary sm" style="flex:0 0 auto;white-space:nowrap" @click="copyRepoUrl()" :disabled="!repoInfo.url" x-text="repoUrlCopied ? '✓ 已复制' : '复制'"></button>
            </div>
          </div>
          <div class="status-line" style="margin-top:12px">
            <span class="dot" :class="{on: !!repoInfo.url}"></span>
            <span x-text="repoInfo.url ? '源在线' : '未配置 REPO_BASE_URL'"></span>
          </div>
          <div class="field" style="margin-top:16px">
            <label>访问鉴权码 <span class="muted" style="font-weight:400">（订阅地址末段，6-32 位字母/数字/下划线/短横线）</span></label>
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
              <input x-model="repoPath.draft" :placeholder="repoPath.current || '未设置'" maxlength="32"
                     style="flex:1;min-width:160px;font-family:monospace,Consolas,'Courier New',monospace;font-size:13px">
              <button type="button" class="btn sm" @click="randomRepoPath()" :disabled="repoPath.saving" title="随机生成新鉴权码到输入框">随机生成</button>
              <button type="button" class="btn primary sm" @click="applyRepoPath()" :disabled="repoPath.saving || !repoPath.draft.trim()"
                      x-text="repoPath.saving ? '应用中…' : '应用并同步订阅地址'"></button>
            </div>
          </div>
          <div class="muted" style="margin-top:8px;line-height:1.6;font-size:12px">
            当前生效末段：<span class="code" x-text="repoPath.current || '(无)'"></span>
            <template x-if="repoPath.updatedAt"><span> · 上次更换：<span x-text="repoPath.updatedAt"></span></span></template>
          </div>
          <div x-show="repoPath.result" x-cloak class="result-box" :class="repoPath.result && repoPath.result.ok ? 'ok' : 'err'" style="margin-top:10px">
            <template x-if="repoPath.result"><div x-text="repoPath.result.msg || repoPath.result.error"></div></template>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="head-block">
            <h2>代理</h2>
            <span x-text="proxyCfg.enabled ? '已启用' : '未启用'"></span>
          </div>
        </div>
        <div class="panel-body">
          <div class="field">
            <label>代理地址</label>
            <input :value="proxyCfg.url" @input="proxyCfg.url=$event.target.value; proxyCfg.source='custom'" placeholder="socks5://127.0.0.1:1080">
          </div>
          <div class="actions" style="margin-top:10px">
            <label class="checkline"><input type="checkbox" x-model="proxyCfg.enabled"> 启用</label>
          </div>
          <div class="preset-grid" x-show="proxyPresets.length" x-cloak>
            <template x-for="p in proxyPresets" :key="p.url">
              <button type="button" class="btn sm" :class="{active:proxyCfg.url===p.url}" @click="proxyCfg.url=p.url; proxyCfg.source='preset'" x-text="p.name" :title="p.desc"></button>
            </template>
          </div>
          <div class="actions">
            <button type="button" class="btn primary" @click="saveProxy()" :disabled="proxySaving" x-text="proxySaving ? '保存中' : '保存'"></button>
            <button type="button" class="btn" @click="testProxy()" :disabled="proxyTesting" x-text="proxyTesting ? '测试中' : '测试'"></button>
          </div>
          <div x-show="proxyTestResult" x-cloak class="result-box" :class="proxyTestResult && proxyTestResult.ok ? 'ok' : 'err'">
            <template x-if="proxyTestResult">
              <div>
                <div><b x-text="proxyTestResult.ok ? '代理可用' : '代理不可用'"></b></div>
                <template x-if="proxyTestResult.tests">
                  <div class="muted" style="margin-top:8px">
                    <div>Telegram: <span x-text="proxyTestResult.tests.telegram_via_proxy?.ok ? '✓ ' + proxyTestResult.tests.telegram_via_proxy?.latency_ms + 'ms' : '✗'"></span></div>
                    <div>Google: <span x-text="proxyTestResult.tests.google_via_proxy?.ok ? '✓ ' + proxyTestResult.tests.google_via_proxy?.latency_ms + 'ms' : '✗'"></span></div>
                    <div>直连 TG: <span x-text="proxyTestResult.tests.telegram_direct?.ok ? '✓ ' + proxyTestResult.tests.telegram_direct?.latency_ms + 'ms' : '✗'"></span></div>
                  </div>
                </template>
                <template x-if="proxyTestResult.error">
                  <div style="margin-top:8px" x-text="proxyTestResult.error"></div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="head-block">
            <h2>账户</h2>
            <span x-text="account.username ? account.username : '当前账号'"></span>
          </div>
        </div>
        <div class="panel-body">
          <div class="field">
            <label>用户名</label>
            <input type="text" x-model="account.username" maxlength="32" autocomplete="username">
          </div>
          <div class="field" style="margin-top:12px">
            <label>新密码</label>
            <div class="password-wrap">
              <input :type="account.showNewPassword ? 'text' : 'password'" x-model="account.newPassword" maxlength="64" autocomplete="new-password" placeholder="不修改可留空">
              <button type="button" class="eye-btn" @click="account.showNewPassword=!account.showNewPassword" :aria-label="account.showNewPassword ? '隐藏密码' : '显示密码'" :title="account.showNewPassword ? '隐藏密码' : '显示密码'">
                <svg x-show="!account.showNewPassword" x-cloak viewBox="0 0 24 24"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path><circle cx="12" cy="12" r="2.8"></circle></svg>
                <svg x-show="account.showNewPassword" x-cloak viewBox="0 0 24 24"><path d="M10.6 5.2A10.7 10.7 0 0 1 12 5c6 0 9.5 7 9.5 7a15.2 15.2 0 0 1-3.1 3.8"></path><path d="M14.1 14.2A3 3 0 0 1 9.8 9.9"></path><path d="M3 3l18 18"></path><path d="M6.6 6.7C3.8 8.6 2.5 12 2.5 12s3.5 7 9.5 7c1.5 0 2.9-.4 4.1-1"></path></svg>
              </button>
            </div>
          </div>
          <div class="field" style="margin-top:12px">
            <label>确认新密码</label>
            <div class="password-wrap">
              <input :type="account.showConfirmPassword ? 'text' : 'password'" x-model="account.confirmPassword" maxlength="64" autocomplete="new-password" placeholder="不修改可留空">
              <button type="button" class="eye-btn" @click="account.showConfirmPassword=!account.showConfirmPassword" :aria-label="account.showConfirmPassword ? '隐藏密码' : '显示密码'" :title="account.showConfirmPassword ? '隐藏密码' : '显示密码'">
                <svg x-show="!account.showConfirmPassword" x-cloak viewBox="0 0 24 24"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path><circle cx="12" cy="12" r="2.8"></circle></svg>
                <svg x-show="account.showConfirmPassword" x-cloak viewBox="0 0 24 24"><path d="M10.6 5.2A10.7 10.7 0 0 1 12 5c6 0 9.5 7 9.5 7a15.2 15.2 0 0 1-3.1 3.8"></path><path d="M14.1 14.2A3 3 0 0 1 9.8 9.9"></path><path d="M3 3l18 18"></path><path d="M6.6 6.7C3.8 8.6 2.5 12 2.5 12s3.5 7 9.5 7c1.5 0 2.9-.4 4.1-1"></path></svg>
              </button>
            </div>
          </div>
          <div class="actions">
            <button type="button" class="btn primary" @click="saveAccount()" :disabled="accountSaving" x-text="accountSaving ? '保存中' : '保存账户'"></button>
          </div>
        </div>
      </div>
    </div>
  </section>
{% endblock %}
