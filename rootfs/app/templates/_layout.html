<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark light">
<title>IPA Self-Host 控制台</title>
<link rel="icon" href="/static/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/static/icon-512.png">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<script>
(function() {
  try {
    const mode = localStorage.getItem('ipa-theme-mode') || 'dark';
    const systemTheme = () => {
      try {
        if (window.matchMedia) {
          if (window.matchMedia('(prefers-color-scheme: light)').matches) return 'light';
          if (window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
        }
      } catch (e) {}
      const hour = new Date().getHours();
      return (hour >= 7 && hour < 19) ? 'light' : 'dark';
    };
    const theme = mode === 'auto' ? systemTheme() : mode;
    document.documentElement.setAttribute('data-theme', theme === 'light' ? 'light' : 'dark');
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>
<script defer src="/static/vendor/alpine-3.13.5.min.js"></script>
<style>
  :root {
    color-scheme: dark;
    --bg:#0a0e14;
    --bg-2:#101722;
    --surface:rgba(18,25,38,.88);
    --panel:#141d2a;
    --panel-2:#192434;
    --line:#30405a;
    --line-2:#415273;
    --text:#f5f7fb;
    --text-2:#d8e1ee;
    --muted:#a6b3c8;
    --accent:#5b8cff;
    --accent-strong:#3d73f2;
    --accent-soft:rgba(91,140,255,.18);
    --good:#38c277;
    --good-soft:rgba(56,194,119,.16);
    --danger:#ff6b78;
    --danger-soft:rgba(255,107,120,.16);
    --input:#101824;
    --log-bg:#0c1420;
    --log-text:#dde7f5;
    --shadow:0 18px 44px rgba(0,0,0,.28);
  }
  [data-theme="light"] {
    color-scheme: light;
    --bg:#f3f6fb;
    --bg-2:#edf2f8;
    --surface:rgba(255,255,255,.9);
    --panel:#ffffff;
    --panel-2:#f7f9fc;
    --line:#d9e1ec;
    --line-2:#bac7da;
    --text:#111827;
    --text-2:#334155;
    --muted:#637188;
    --accent:#295cff;
    --accent-strong:#1f4fe8;
    --accent-soft:rgba(41,92,255,.12);
    --good:#15803d;
    --good-soft:rgba(21,128,61,.12);
    --danger:#dc2626;
    --danger-soft:rgba(220,38,38,.12);
    --input:#ffffff;
    --log-bg:#f8fafc;
    --log-text:#0f172a;
    --shadow:0 14px 36px rgba(15,23,42,.1);
  }

  * { box-sizing:border-box }
  [x-cloak] { display:none !important }
  html { min-height:100%; background:var(--bg); color:var(--text) }
  body {
    margin:0;
    min-height:100vh;
    color:var(--text);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;
    background:
      radial-gradient(circle at top right, var(--accent-soft), transparent 28%),
      linear-gradient(180deg, var(--bg), var(--bg-2));
  }
  button, input, select, textarea { font:inherit; color:inherit }
  button { border:0; cursor:pointer }
  button:disabled { cursor:not-allowed; opacity:.62 }
  a { color:var(--accent); text-decoration:none }
  a:hover { text-decoration:underline }

  .app-shell {
    min-height:100vh;
    padding:14px;
    display:grid;
    grid-template-columns:216px minmax(0, 1fr);
    gap:10px;
    align-content:start;
  }
  .topbar,
  .sidebar,
  .panel {
    border:1px solid var(--line);
    background:var(--surface);
    backdrop-filter:blur(18px);
    box-shadow:var(--shadow);
  }
  .topbar {
    grid-column:2;
    grid-row:1;
    position:sticky;
    top:12px;
    z-index:20;
    border-radius:22px;
    padding:14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
  }
  .brand {
    display:flex;
    align-items:center;
    gap:12px;
    min-width:220px;
  }
  .brand-mark {
    width:44px;
    height:44px;
    border-radius:14px;
    display:block;
    object-fit:cover;
    background:var(--accent);
    box-shadow:0 12px 28px var(--accent-soft);
  }
  .brand h1 {
    margin:0;
    font-size:16px;
    line-height:1.1;
  }
  .brand span {
    display:block;
    margin-top:4px;
    color:var(--muted);
    font-size:12px;
  }
  .header-actions {
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:10px;
    flex-wrap:wrap;
  }
  .theme-switch,
  .tabs {
    display:inline-flex;
    align-items:center;
    gap:4px;
    padding:4px;
    border:1px solid var(--line);
    border-radius:14px;
    background:var(--panel);
  }
  .theme-switch button,
  .tabs button,
  .tabs a {
    min-height:34px;
    border-radius:10px;
    padding:0 12px;
    background:transparent;
    color:var(--muted);
    white-space:nowrap;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    text-decoration:none;
    cursor:pointer;
    transition:background .18s ease, color .18s ease, transform .18s ease;
  }
  .tabs a .tab-icon {
    font-size:16px;
    line-height:1;
    display:inline-flex;
    align-items:center;
  }
  .theme-switch button:hover,
  .tabs button:hover,
  .tabs a:hover {
    color:var(--text);
    background:var(--panel-2);
  }
  .theme-switch button.active,
  .tabs button.active {
    color:#fff;
    background:linear-gradient(135deg, var(--accent), var(--accent-strong));
  }
  .btn {
    min-height:38px;
    padding:0 14px;
    border-radius:12px;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--text);
    transition:transform .18s ease, border-color .18s ease, background .18s ease;
  }
  .btn:hover {
    transform:translateY(-1px);
    border-color:var(--line-2);
  }
  .btn.primary {
    border-color:transparent;
    color:#fff;
    background:linear-gradient(135deg, var(--accent), var(--accent-strong));
  }
  .btn.danger {
    color:var(--danger);
    background:var(--danger-soft);
    border-color:rgba(255,107,120,.24);
  }
  .btn.danger:hover {
    background:var(--danger);
    color:#fff;
    border-color:var(--danger);
  }
  .btn.ghost {
    background:transparent;
    box-shadow:none;
  }
  .btn.sm {
    min-height:30px;
    padding:0 10px;
    border-radius:10px;
    font-size:12px;
  }
  .btn.icon {
    width:32px;
    padding:0;
    display:grid;
    place-items:center;
  }
  .btn.icon.sm { width:30px; }
  .btn.icon svg { display:block }
  .btn.danger.icon {
    color:var(--danger);
  }
  .btn.danger.icon:hover svg { color:#fff }
  .btn.icon.star { color:var(--muted); }
  .btn.icon.star.active { color:#f4b740; border-color:rgba(244,183,64,.45); background:rgba(244,183,64,.12); }

  .sidebar {
    grid-column:1;
    grid-row:1 / span 2;
    position:sticky;
    top:20px;
    align-self:start;
    min-height:calc(100vh - 40px);
    border-radius:22px;
    padding:16px;
    display:flex;
    flex-direction:column;
    gap:22px;
  }
  .side-brand {
    display:flex;
    align-items:center;
    gap:12px;
    padding:2px 2px 14px;
    border-bottom:1px solid var(--line);
  }
  .side-brand strong {
    display:block;
    font-size:15px;
    line-height:1.2;
  }
  .side-brand span {
    display:block;
    margin-top:4px;
    color:var(--muted);
    font-size:12px;
  }
  .top-title {
    min-width:160px;
  }
  .top-title h1 {
    margin:0;
    font-size:16px;
    line-height:1.1;
  }
  .top-title span {
    display:block;
    margin-top:4px;
    color:var(--muted);
    font-size:12px;
  }
  .tabs {
    width:100%;
    overflow:visible;
    padding:0;
    border:0;
    background:transparent;
    flex-direction:column;
    gap:8px;
  }
  .tabs button,
  .tabs a {
    width:100%;
    min-height:44px;
    justify-content:flex-start;
    padding:0 14px;
  }
  .tabs button.active,
  .tabs a.active {
    box-shadow:0 12px 24px var(--accent-soft);
  }

  /* ===== Sidebar footer (actions) ===== */
  .side-toggle {
    margin-left:auto;
    width:28px;
    height:28px;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--muted);
    cursor:pointer;
    font-size:14px;
    line-height:1;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    transition:background .18s ease, color .18s ease;
  }
  .side-toggle:hover { color:var(--text); background:var(--panel-2); }
  .side-footer {
    margin-top:auto;
    padding-top:14px;
    border-top:1px solid var(--line);
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .side-footer .theme-switch {
    width:100%;
    justify-content:space-between;
  }
  .side-footer .theme-switch button {
    flex:1;
    min-height:28px;
    font-size:13px;
    padding:0 6px;
  }
  .btn.side-btn {
    display:flex;
    align-items:center;
    justify-content:flex-start;
    gap:8px;
    min-height:30px;
    padding:0 10px;
    font-size:13px;
  }
  .btn.side-btn .side-btn-icon {
    font-size:14px;
    line-height:1;
    display:inline-flex;
    align-items:center;
  }
  .head-actions {
    display:inline-flex;
    align-items:center;
    gap:8px;
  }

  /* ===== Sidebar collapsed state ===== */
  .app-shell:has(.sidebar.collapsed) {
    grid-template-columns:72px minmax(0, 1fr);
  }
  .sidebar.collapsed {
    padding:12px 10px;
  }
  .sidebar.collapsed .side-brand-text,
  .sidebar.collapsed .tab-label,
  .sidebar.collapsed .side-btn-label {
    display:none;
  }
  .sidebar.collapsed .side-brand {
    flex-direction:column;
    gap:8px;
    padding-bottom:10px;
  }
  .sidebar.collapsed .brand-mark {
    width:36px;
    height:36px;
  }
  .sidebar.collapsed .side-toggle {
    margin-left:0;
  }
  .sidebar.collapsed .tabs a,
  .sidebar.collapsed .btn.side-btn {
    justify-content:center;
    padding:0;
    gap:0;
  }
  .sidebar.collapsed .theme-switch {
    flex-direction:column;
    gap:4px;
  }
  .sidebar.collapsed .theme-switch button {
    width:100%;
    padding:0;
  }

  .view {
    grid-column:2;
    min-width:0;
    width:100%;
    animation:viewIn .18s ease both;
  }
  .apps-view {
    width:100%;
  }
  .panel {
    border-radius:22px;
    overflow:hidden;
  }
  .apps-panel {
    overflow:visible;
  }
  .apps-panel .panel-body {
    position:relative;
  }
  .workspace-head {
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:16px;
    margin:0 2px 14px;
  }
  .workspace-title {
    min-width:0;
  }
  .workspace-title h1 {
    margin:0;
    font-size:20px;
    line-height:1.15;
    letter-spacing:0;
  }
  .workspace-title p {
    margin:6px 0 0;
    color:var(--muted);
    font-size:13px;
  }
  .workspace-kpis {
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:8px;
    flex-wrap:wrap;
  }
  .kpi-chip {
    min-height:34px;
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:0 11px;
    border:1px solid var(--line);
    border-radius:999px;
    color:var(--text-2);
    background:var(--panel);
    white-space:nowrap;
  }
  .kpi-chip strong {
    color:var(--text);
    font-size:13px;
  }
  .kpi-chip span {
    color:var(--muted);
    font-size:12px;
  }
  .kpi-chip.good {
    border-color:rgba(56,194,119,.28);
    background:var(--good-soft);
  }
  .kpi-chip.accent {
    border-color:rgba(91,140,255,.34);
    background:var(--accent-soft);
  }
  .panel-head {
    padding:16px 18px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .head-block h2 {
    margin:0;
    font-size:16px;
    line-height:1.2;
  }
  .head-block span {
    display:block;
    margin-top:4px;
    color:var(--muted);
    font-size:12px;
  }
  .panel-body { padding:16px 18px 18px }

  .head-actions {
    display:flex;
    align-items:center;
    gap:8px;
    flex:0 1 auto;
    min-width:0;
  }
  .head-actions.wl { flex:1 1 460px; max-width:560px }
  .head-input {
    min-width:140px;
    height:30px;
    padding:4px 10px;
    font-size:12px;
    border-radius:8px;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .head-input:focus {
    outline:none;
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(91,140,255,.16);
  }
  .head-actions.wl .head-input:first-child { flex:0 0 110px; min-width:0 }
  .head-actions.wl .head-input:nth-child(2) { flex:1 1 0; min-width:0 }
  @media (max-width: 760px) {
    .panel-head { flex-wrap:wrap }
    .head-actions, .head-actions.wl { width:100%; flex:1 1 100% }
    .head-actions.wl .head-input:first-child { flex:0 0 100px }
  }

  .group-chips {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .group-chip {
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:5px 8px 5px 6px;
    border:1px solid var(--line);
    border-radius:999px;
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    transition:border-color .15s ease, box-shadow .15s ease, transform .15s ease;
    max-width:100%;
  }
  .group-chip:hover {
    border-color:var(--line-2);
    box-shadow:0 4px 14px rgba(0,0,0,.08);
    transform:translateY(-1px);
  }
  .group-chip.prio {
    border-color:rgba(91,140,255,.45);
    background:linear-gradient(180deg, rgba(91,140,255,.12), rgba(91,140,255,.04));
  }
  .chip-star {
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:22px; height:22px;
    padding:0;
    border-radius:50%;
    background:transparent;
    color:var(--muted);
    border:0;
    min-height:0;
  }
  .chip-star:hover { color:var(--accent) }
  .chip-star.active { color:#f5b400 }
  .chip-link {
    font-size:12.5px;
    color:var(--text);
    text-decoration:none;
    max-width:200px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .chip-link:hover { color:var(--accent) }
  .chip-del {
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:20px; height:20px;
    padding:0;
    border-radius:50%;
    background:transparent;
    color:var(--muted);
    border:0;
    font-size:14px;
    line-height:1;
    min-height:0;
    transition:background .15s ease, color .15s ease;
  }
  .chip-del:hover { background:rgba(255,69,58,.14); color:var(--danger) }

  /* APP 同步按钮组 */
  .sync-cluster { gap:8px; align-items:center }
  .sync-pill {
    display:inline-flex;
    align-items:center;
    gap:6px;
    height:28px;
    padding:0 10px 0 9px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--panel-2);
    color:var(--muted);
    font-size:11.5px;
    line-height:1;
    white-space:nowrap;
    transition:border-color .18s ease, color .18s ease, background .18s ease;
  }
  .sync-pill.is-busy { color:var(--accent); border-color:rgba(91,140,255,.4); background:rgba(91,140,255,.08) }
  .sync-pill.is-ok { color:#22a06b; border-color:rgba(34,160,107,.35); background:rgba(34,160,107,.08) }
  .sync-pill.is-err { color:var(--danger); border-color:rgba(255,69,58,.4); background:rgba(255,69,58,.08) }
  .sync-pill .dot { width:6px; height:6px; border-radius:50%; background:currentColor; opacity:.7 }
  .sync-pill.is-busy .dot { animation:pulse-dot 1s ease-in-out infinite }
  @keyframes pulse-dot {
    0%,100% { transform:scale(1); opacity:.5 }
    50%     { transform:scale(1.35); opacity:1 }
  }

  .btn.icon.spin svg { animation:spin-rev .9s linear infinite }
  @keyframes spin-rev { from { transform:rotate(0) } to { transform:rotate(-360deg) } }

  .pulse-btn { display:inline-flex; align-items:center; gap:6px; position:relative; overflow:hidden }
  .pulse-btn.loading { opacity:.85 }
  .pulse-btn .spinner {
    width:12px; height:12px; border-radius:50%;
    border:2px solid currentColor;
    border-right-color:transparent;
    animation:spin .7s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg) } }

  /* 面板顶部进度条带（indeterminate） */
  .topbar-progress {
    position:relative;
    height:2px;
    margin:-1px -18px 12px;
    overflow:hidden;
    background:rgba(91,140,255,.10);
  }
  .topbar-progress span {
    position:absolute; inset:0;
    width:35%;
    background:linear-gradient(90deg, transparent, var(--accent), transparent);
    animation:topbar-slide 1.2s ease-in-out infinite;
  }
  @keyframes topbar-slide {
    0%   { left:-40% }
    100% { left:100% }
  }

  input,
  select,
  textarea {
    width:100%;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:12px;
    background:var(--input);
    color:var(--text);
    outline:none;
    transition:border-color .18s ease, box-shadow .18s ease;
  }
  input:focus,
  select:focus,
  textarea:focus {
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft);
  }
  input::placeholder,
  textarea::placeholder { color:var(--muted) }
  .password-wrap {
    position:relative;
  }
  .password-wrap input {
    padding-right:46px;
  }
  .eye-btn {
    position:absolute;
    right:8px;
    top:50%;
    width:34px;
    height:34px;
    border-radius:10px;
    display:grid;
    place-items:center;
    color:var(--muted);
    background:transparent;
    transform:translateY(-50%);
    transition:background .18s ease, color .18s ease, transform .18s ease;
  }
  .eye-btn:hover {
    color:var(--text);
    background:var(--panel-2);
    transform:translateY(-50%) scale(1.02);
  }
  .eye-btn svg {
    width:18px;
    height:18px;
    fill:none;
    stroke:currentColor;
    stroke-width:1.8;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  .toolbar {
    display:grid;
    grid-template-columns:minmax(220px,1fr) auto;
    gap:10px;
    align-items:center;
    margin-bottom:14px;
  }
  .search {
    position:relative;
  }
  .search:before {
    content:"⌕";
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    color:var(--muted);
    font-size:17px;
  }
  .search input { padding-left:34px }

  .app-list {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
    gap:10px;
    align-items:start;
    overflow:visible;
  }

  /* ===== Apps page: stats + charts ===== */
  .stats-row {
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(160px, 1fr));
    gap:10px;
    margin-bottom:14px;
  }
  .stat-card {
    display:flex;
    align-items:center;
    gap:12px;
    padding:12px 14px;
    border:1px solid var(--line);
    border-radius:14px;
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
  }
  .stat-icon {
    width:38px;
    height:38px;
    border-radius:10px;
    display:grid;
    place-items:center;
    font-size:18px;
    flex-shrink:0;
  }
  .stat-body { min-width:0; }
  .stat-value {
    font-size:20px;
    font-weight:700;
    line-height:1.1;
    color:var(--text);
  }
  .stat-label {
    margin-top:2px;
    color:var(--muted);
    font-size:12px;
  }
  .charts-row {
    display:grid;
    grid-template-columns:minmax(0, 1.2fr) minmax(0, 1fr);
    gap:14px;

      flex-direction:column;
    }
    .header-actions {
      width:100%;
      justify-content:space-between;
    }
    .sidebar,
    .panel {
      border-radius:18px;
    }
    .workspace-title h1 {
      font-size:18px;
    }
    .head-actions.wl {
      display:grid;
      grid-template-columns:1fr;
    }
    .head-actions.wl .head-input:first-child,
    .head-actions.wl .head-input:nth-child(2) {
      flex:auto;
      width:100%;
    }
    .head-actions.wl .btn.icon {

    .scan-grid .field {

    .url-control,

</style>

<body>
<script>window.__PAGE_ID__ = "{{ page_id }}";</script>
<div class="app-shell" x-data="ipaApp()" x-init="init()">
  <aside class="sidebar" :class="{collapsed: sidebarCollapsed}">
    <div class="side-brand">
      <img class="brand-mark" src="/static/brand-icon.png" alt="">
      <div class="side-brand-text">
        <strong>IPA源管理</strong>
        <span x-text="workspaceLabel()"></span>
      </div>
      <button type="button" class="side-toggle" @click="toggleSidebar()"
              :title="sidebarCollapsed ? '展开侧边栏' : '收起侧边栏'"
              :aria-label="sidebarCollapsed ? '展开侧边栏' : '收起侧边栏'"
              x-text="sidebarCollapsed ? '»' : '«'"></button>
    </div>
    <nav class="tabs" aria-label="工作区">
      <template x-for="w in workspaces" :key="w.id">
        <a :href="'/' + w.id" :class="{active:workspace===w.id}" :title="w.name">
          <span class="tab-icon" x-text="w.icon"></span>
          <span class="tab-label" x-text="w.name"></span>
        </a>
      </template>
    </nav>
    <div class="side-footer">
      <div class="theme-switch" aria-label="主题切换">
        <button type="button" :class="{active:themeMode==='dark'}" @click="setTheme('dark')" title="深色">☾</button>
        <button type="button" :class="{active:themeMode==='light'}" @click="setTheme('light')" title="浅色">☀</button>
        <button type="button" :class="{active:themeMode==='auto'}" @click="setTheme('auto')" title="自动">A</button>
      </div>
      <button type="button" class="btn ghost side-btn" @click="logout()" title="退出">
        <span class="side-btn-icon">🚪</span><span class="side-btn-label">退出</span>
      </button>
    </div>
  </aside>

  {% block content %}{% endblock %}


  <div x-show="toast.msg" x-cloak x-transition class="toast" :class="toast.type" @click="toast.msg=''" x-text="toast.msg"></div>

  <!-- 破解点描述编辑器 -->
  <div x-show="descEditor.open" x-cloak class="modal-mask" @click.self="closeDescEditor()">
    <div class="modal-card">
      <header>
        <h3 x-text="descEditor.filename || '编辑破解点'"></h3>
        <button type="button" class="btn ghost sm" @click="closeDescEditor()" aria-label="关闭">×</button>
      </header>
      <div class="modal-body">
        <div class="muted" style="font-size:12px;line-height:1.6">
          每行一条破解点说明，最多保存 6 条。来源 TG 消息时会自动归纳；保存后会被记为「人工编辑」，
          此后 TG 自动入库不会再覆盖此条。如果想恢复自动模式，点击「恢复自动」。
        </div>
        <div>
          <label class="muted" style="font-size:12px">破解点（每行一条）</label>
          <textarea x-model="descEditor.text" rows="6" placeholder="例如：&#10;已解锁 Premium&#10;去除横幅广告&#10;支持深色模式"></textarea>
        </div>
        <details x-show="descEditor.rawText" x-cloak>
          <summary class="muted" style="font-size:12px;cursor:pointer">查看 TG 原始消息（仅供参考，不会保存）</summary>
          <pre style="white-space:pre-wrap;font-size:12px;color:var(--muted);margin-top:6px;max-height:160px;overflow:auto" x-text="descEditor.rawText"></pre>
        </details>
        <div x-show="descEditor.source" x-cloak class="muted" style="font-size:12px">
          原始消息：<a :href="descEditor.source" target="_blank" rel="noopener" x-text="descEditor.source"></a>
        </div>
      </div>
      <footer>
        <button type="button" class="btn ghost" @click="resetDescAuto()" :disabled="descEditor.saving" title="清除手动标记，恢复 TG 自动覆盖">恢复自动</button>
        <button type="button" class="btn" @click="closeDescEditor()" :disabled="descEditor.saving">取消</button>
        <button type="button" class="btn primary" @click="saveDescEditor()" :disabled="descEditor.saving" x-text="descEditor.saving ? '保存中…' : '保存'"></button>
      </footer>
    </div>
  </div>
</div>

<script>
const APP_DESC = {
  '小红书': '笔记、攻略、本地生活。',
  'YouTube': '视频、订阅、播放列表。',
  'YouTube Music': '音乐、歌单、播客。',
  '哔哩哔哩': '番剧、视频、直播。',
  'Spotify': '音乐、歌单、播客。',
  '高德地图': '路线、导航、实时路况。',
  '百度地图': '路线、公交、位置搜索。',
  '闲鱼': '二手交易和闲置转让。',
  'Swiftgram': 'Telegram 第三方客户端。',
  'Infuse': '本地和网络视频播放器。',
  '知乎': '问答、讨论、知识社区。',
  'PiliPlus': '清爽的哔哩哔哩第三方客户端。',
  '抖音': '短视频、直播、创作。',
  'Facebook': '社交动态和好友联系。',
  'X': '实时信息和社交讨论。',
  'Shadowrocket': 'iOS 网络代理工具。',
  'Bit远控助手': '远程控制工具。',
};

function describeApp(name) {
  const n = String(name || '').trim();
  if (APP_DESC[n]) return APP_DESC[n];
  const lower = n.toLowerCase();
  if (lower.includes('pili')) return APP_DESC.PiliPlus;
  if (lower.includes('youtube')) return APP_DESC.YouTube;
  if (lower.includes('bili')) return APP_DESC['哔哩哔哩'];
  return 'iOS 应用安装包。';
}

function normalizeThemeMode(mode) {
  return ['dark', 'light', 'auto'].includes(mode) ? mode : 'dark';
}

function resolveSystemTheme() {
  try {
    if (window.matchMedia) {
      if (window.matchMedia('(prefers-color-scheme: light)').matches) return 'light';
      if (window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
    }
  } catch (e) {}
  const hour = new Date().getHours();
  return (hour >= 7 && hour < 19) ? 'light' : 'dark';
}

function resolveTheme(mode) {
  const next = normalizeThemeMode(mode);
  if (next !== 'auto') return next;
  return resolveSystemTheme();
}

function normalizeWorkspace(name) {
  const next = String(name || '');
  const map = {
    overview: 'apps',
    library: 'apps',
    sources: 'rules',
    automation: 'ops',
    logs: 'logs',
  };
  return ['apps', 'rules', 'ops', 'logs'].includes(next) ? next : (map[next] || 'apps');
}

function ipaApp() {
  return {
    workspaces: [
      { id: 'apps', name: 'APP', icon: '📱' },
      { id: 'rules', name: '规则', icon: '📋' },
      { id: 'ops', name: '设置', icon: '⚙️' },
      { id: 'logs', name: '日志', icon: '📝' },
    ],
    workspace: 'apps',
    cfg: { groups: [], priority_groups: [], whitelist: [], rate_limit: {} },
    status: {},
    account: { username: '', newPassword: '', confirmPassword: '', showNewPassword: false, showConfirmPassword: false },
    accountSaving: false,
    ipaList: [],
    appGroups: [],
    reloading: false,
    reindexing: false,
    lastSyncAt: 0,
    lastSyncStatus: '',  // '' | 'ok' | 'busy' | 'err'
    lastSyncMsg: '',
    _pollTimer: null,
    _tickTimer: null,
    _themeMedia: null,
    _nowTick: 0,
    newGroup: '',
    newApp: { name: '', keywords: '' },
    newKw: {},
    scanning: false,
    loading: true,
    logName: 'tg-cron',
    logContent: '',
    autoRefresh: true,
    toast: { msg: '', type: 'ok' },
    themeMode: 'dark',
    currentTheme: 'dark',
    sidebarCollapsed: false,
    appSearch: '',
    appSort: 'recent',
    botCfg: { token: '', enabled: true, token_preview: '', has_token: false, bot_username: '', chat_id: '', user_ids: [], user_ids_text: '' },
    botSaving: false,
    botTesting: false,
    botTestResult: null,
    proxyCfg: { url: '', enabled: true, source: '', env_tg_proxy: '', env_forward_proxy: '' },
    proxyPresets: [],
    proxySaving: false,
    proxyTesting: false,
    proxyTestResult: null,
    unlockCfg: { code: '', enabled: true, expires: 'never', expires_at: '', remaining_seconds: null, expired: false, token_preview: '', has_token: false },
    unlockExpiresOptions: [
      { value: 'never', label: '永久' },
      { value: '1d', label: '1 天' },
      { value: '7d', label: '7 天' },
      { value: '30d', label: '30 天' },
      { value: '90d', label: '90 天' },
      { value: '365d', label: '1 年' },
    ],
    unlockSaving: false,
    unlockResult: null,
    repoInfo: { url: '' },
    repoUrlCopied: false,
    repoPath: { current: '', draft: '', updatedAt: '', saving: false, result: null },
    descEditor: { open: false, filename: '', text: '', rawText: '', source: '', saving: false, manual: false },

    async init() {
      this.workspace = normalizeWorkspace(window.__PAGE_ID__ || 'apps');
      this.themeMode = normalizeThemeMode(localStorage.getItem('ipa-theme-mode') || 'dark');
      this.sidebarCollapsed = localStorage.getItem('ipa-sidebar-collapsed') === '1';
      this.applyTheme();
      this.watchSystemTheme();
      setInterval(() => {
        if (this.themeMode === 'auto') this.applyTheme();
      }, 60000);
      try {
        await this.loadAll();
      } finally {
        this.loading = false;
      }
      await Promise.allSettled([this.loadProxy(), this.loadBot(), this.loadAccount(), this.loadUnlock(), this.loadRepoInfo(), this.loadRepoPath()]);
      setInterval(() => {
        if (this.workspace === 'logs' && this.autoRefresh) this.loadLog();
        if (this.workspace === 'apps') this.loadStatus();
      }, 3000);
      this.startAutoSync();
    },

    workspaceLabel() {
      return this.workspaces.find((w) => w.id === this.workspace)?.name || '控制台';
    },

    toggleSidebar() {
      this.sidebarCollapsed = !this.sidebarCollapsed;
      localStorage.setItem('ipa-sidebar-collapsed', this.sidebarCollapsed ? '1' : '0');
    },

    setWorkspace(next) {
      const ws = normalizeWorkspace(next);
      localStorage.setItem('ipa-workspace', ws);
      window.location.assign('/' + ws);
    },

    setTheme(mode) {
      this.themeMode = normalizeThemeMode(mode);
      this.applyTheme();
    },

    applyTheme() {
      this.currentTheme = resolveTheme(this.themeMode);
      document.documentElement.setAttribute('data-theme', this.currentTheme);
      localStorage.setItem('ipa-theme-mode', this.themeMode);
    },

    watchSystemTheme() {
      if (this._themeMedia) return;
      try {
        if (!window.matchMedia) return;
        const media = window.matchMedia('(prefers-color-scheme: dark)');
        const handler = () => {
          if (this.themeMode === 'auto') this.applyTheme();
        };
        if (media.addEventListener) media.addEventListener('change', handler);
        else if (media.addListener) media.addListener(handler);
        this._themeMedia = { media, handler };
      } catch (e) {}
    },

    toggleApp(app) {
      const shouldOpen = !app.expanded;
      for (const item of this.appGroups) item.expanded = false;
      app.expanded = shouldOpen;
    },

    appIconSrc(app) {
      if (app.icon && !app.iconFailed) return '/icons/' + encodeURIComponent(app.icon);
      return '';
    },

    handleIconError(_event, app) {
      app.iconFailed = true;
    },

    versionLabel(v) {
      return v && v.version ? 'v' + v.version : '版本未知';
    },

    versionTail(app, v) {
      const name = (v && v.filename) || '';
      if (!name) return '';
      // strip trailing .ipa for display
      let tail = name.replace(/\.ipa$/i, '');
      // strip the app name prefix (case insensitive, common separators)
      const an = (app && app.name) ? app.name.trim() : '';
      if (an) {
        const safe = an.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        tail = tail.replace(new RegExp('^' + safe + '[\\s_\\-·]*', 'i'), '');
      }
      // strip leading version like "8.0.50_" so it's not echoing versionLabel
      const ver = (v && v.version) ? String(v.version) : '';
      if (ver) {
        const safeVer = ver.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        tail = tail.replace(new RegExp('^' + safeVer + '[\\s_\\-·]*', 'i'), '');
      }
      tail = tail.replace(/^[\s_\-·]+/, '').trim();
      return tail;
    },

    appSummary(app) {
      const latest = app.versions[0] || {};
      const status = latest.scan_status === 'invalid' ? ' · 文件损坏' : (latest.scan_status === 'unscanned' ? ' · 未入库' : '');
      return app.versions.length + ' 个版本 · 最新 ' + this.versionLabel(latest) + status;
    },

    appsSummary() {
      const apps = this.appGroups || [];
      if (!apps.length) return '暂无 IPA';
      let totalFiles = 0;
      for (const app of apps) {
        for (const v of (app.versions || [])) {
          totalFiles++;
        }
      }
      return apps.length + ' 个 APP · ' + totalFiles + ' 个文件';
    },

    /* ========== 统计卡 / 趋势 / 热力图 ========== */
    _allVersions() {
      const arr = [];
      for (const a of (this.appGroups || [])) {
        for (const v of (a.versions || [])) arr.push(v);
      }
      return arr;
    },

    statsOverview() {
      const apps = this.appGroups || [];
      const files = this._allVersions();
      const now = Date.now() / 1000;
      const cut7 = now - 7 * 86400;
      let bytes = 0;
      let last7 = 0;
      for (const v of files) {
        const mb = Number(v.size_mb) || 0;
        bytes += mb;
        if ((v.mtime || 0) >= cut7) last7++;
      }
      const fmtSize = (mb) => {
        if (mb >= 1024) return (mb / 1024).toFixed(1) + ' GB';
        return Math.round(mb) + ' MB';
      };
      return {
        appCount: apps.length,
        fileCount: files.length,
        totalSize: fmtSize(bytes),
        last7d: last7,
      };
    },

    trendStats() {
      const days = 30;
      const W = 600, H = 110, padTop = 8, padBottom = 4;
      const now = new Date();
      now.setHours(23, 59, 59, 999);
      const todayMs = now.getTime();
      const dayMs = 86400 * 1000;
      const counts = new Array(days).fill(0);
      for (const v of this._allVersions()) {
        const t = (v.mtime || 0) * 1000;
        const diff = Math.floor((todayMs - t) / dayMs);
        if (diff >= 0 && diff < days) counts[days - 1 - diff]++;
      }
      const maxV = Math.max(1, ...counts);
      const slot = W / days;
      const bw = Math.max(4, slot * 0.7);
      const innerH = H - padTop - padBottom;
      const labels = [];
      // 构造 SVG 字符串（绕过 Alpine 在 SVG 命名空间下 <template x-for> 不生效的坑）
      let bars = '';
      for (let i = 0; i < days; i++) {
        const c = counts[i];
        const bh = (c / maxV) * innerH;
        const d = new Date(todayMs - (days - 1 - i) * dayMs);
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        labels.push(`${mm}-${dd}`);
        const x = i * slot + (slot - bw) / 2;
        const y = padTop + (innerH - bh);
        const h = Math.max(bh, c > 0 ? 2 : 1);
        const fill = c > 0 ? 'url(#trendGrad)' : 'rgba(148,163,184,.18)';
        bars += `<rect x="${x.toFixed(2)}" y="${y.toFixed(2)}" width="${bw.toFixed(2)}" height="${h.toFixed(2)}" rx="2" fill="${fill}"><title>${mm}-${dd}：${c} 个 IPA</title></rect>`;
      }
      const svg = `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">`
        + '<defs><linearGradient id="trendGrad" x1="0" y1="0" x2="0" y2="1">'
        + '<stop offset="0%" stop-color="#6366f1" stop-opacity="1"/>'
        + '<stop offset="100%" stop-color="#6366f1" stop-opacity=".55"/>'
        + '</linearGradient></defs>'
        + bars + '</svg>';
      const total = counts.reduce((a, b) => a + b, 0);
      return {
        svg,
        total,
        firstLabel: labels[0] || '',
        midLabel: labels[Math.floor(days / 2)] || '',
        lastLabel: labels[days - 1] || '',
      };
    },

    heatmapStats() {
      const days = 30;
      const now = new Date();
      now.setHours(23, 59, 59, 999);
      const todayMs = now.getTime();
      const dayMs = 86400 * 1000;
      const counts = new Array(days).fill(0);
      for (const v of this._allVersions()) {
        const t = (v.mtime || 0) * 1000;
        const diff = Math.floor((todayMs - t) / dayMs);
        if (diff >= 0 && diff < days) counts[days - 1 - diff]++;
      }
      const maxV = Math.max(1, ...counts);
      const firstD = new Date(todayMs - (days - 1) * dayMs);
      const firstLabel = String(firstD.getMonth() + 1).padStart(2, '0')
        + '-' + String(firstD.getDate()).padStart(2, '0');
      const cells = counts.map((c, i) => {
        const d = new Date(todayMs - (days - 1 - i) * dayMs);
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        let level = 0;
        if (c > 0) {
          const ratio = c / maxV;
          if (ratio > 0.75) level = 4;
          else if (ratio > 0.5) level = 3;
          else if (ratio > 0.25) level = 2;
          else level = 1;
        }
        return { level, count: c, title: `${mm}-${dd}：${c} 个 IPA` };
      });
      const total = counts.reduce((a, b) => a + b, 0);
      const activeDays = counts.filter((c) => c > 0).length;
      return { cells, activeDays, total, firstLabel };
    },

    groupLabel(g) {
      if (!g) return '';
      let s = String(g).trim();
      s = s.replace(/^https?:\/\//i, '').replace(/^t\.me\//i, '').replace(/\/+$/, '');
      return s || g;
    },

    whitelistKeywordTotal() {
      const wl = (this.cfg && this.cfg.whitelist) || [];
      let n = 0;
      for (const app of wl) n += (app.keywords || []).length;
      return n;
    },

    filteredApps() {
      const q = this.appSearch.trim().toLowerCase();
      let arr = this.appGroups.filter((app) => !q ||
        app.name.toLowerCase().includes(q) ||
        app.description.toLowerCase().includes(q) ||
        app.versions.some((v) =>
          (v.filename || '').toLowerCase().includes(q) ||
          String(v.version || '').toLowerCase().includes(q)
        ));
      arr = [...arr];
      if (this.appSort === 'name') {
        arr.sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'));
      }
      if (this.appSort === 'count') {
        arr.sort((a, b) => b.versions.length - a.versions.length || a.name.localeCompare(b.name, 'zh-CN'));
      }
      if (this.appSort === 'recent') {
        arr.sort((a, b) => (b.versions[0]?.mtime || 0) - (a.versions[0]?.mtime || 0));
      }
      return arr;
    },

    groupApps() {
      const map = {};
      for (const f of this.ipaList) {
        const name = f.app_name || f.filename.replace(/_\d+[\.\d]*_.+\.ipa$/, '');
        if (!map[name]) {
          map[name] = {
            name,
            description: describeApp(name),
            icon: null,
            iconFailed: false,
            versions: [],
            expanded: false,
          };
        }
        if (f.icon && !map[name].icon) map[name].icon = f.icon;
        map[name].versions.push(f);
      }
      const arr = Object.values(map);
      for (const g of arr) g.versions.sort((a, b) => b.mtime - a.mtime);
      arr.sort((a, b) => (b.versions[0]?.mtime || 0) - (a.versions[0]?.mtime || 0));
      this.appGroups = arr;
    },

    async api(method, url, body) {
      try {
        const r = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: body ? JSON.stringify(body) : undefined,
        });
        if (r.status === 401) {
          window.location.href = '/login';
          throw new Error('登录已过期');
        }
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || r.statusText);
        return j;
      } catch (e) {
        this.showToast(e.message, 'err');
        throw e;
      }
    },

    showToast(msg, type = 'ok') {
      this.toast = { msg, type };
      setTimeout(() => { this.toast.msg = ''; }, 3000);
    },

    async loadAll() {
      await Promise.all([this.loadConfig(), this.loadStatus(), this.loadIpa()]);
    },

    async loadConfig() {
      const c = await this.api('GET', '/api/config');
      this.cfg = {
        groups: c.groups || [],
        priority_groups: c.priority_groups || [],
        whitelist: c.whitelist || [],
        rate_limit: c.rate_limit || { max_per_day: 30, min_interval_sec: 30, max_interval_sec: 120 },
      };
    },

    async loadStatus() {
      this.status = await this.api('GET', '/api/status');
    },

    async loadIpa() {
      const r = await this.api('GET', '/api/ipa');
      this.ipaList = r.files || [];
      this.groupApps();
      this.lastSyncAt = Date.now();
      if (this.lastSyncStatus !== 'busy') this.lastSyncStatus = 'ok';
    },

    async quickReload() {
      if (this.reloading || this.reindexing) return;
      this.reloading = true;
      try {
        await this.loadIpa();
        this.lastSyncStatus = 'ok';
        this.lastSyncMsg = '已刷新页面数据';
      } catch (e) {
        this.lastSyncStatus = 'err';
        this.lastSyncMsg = '刷新失败：' + (e?.message || e);
        this.showToast(this.lastSyncMsg, 'err');
      } finally {
        this.reloading = false;
      }
    },

    async reindexNow() {
      if (this.reindexing) return;
      this.reindexing = true;
      this.lastSyncStatus = 'busy';
      this.lastSyncMsg = '正在扫描磁盘并重建索引…';
      const t0 = performance.now();
      try {
        const r = await this.api('POST', '/api/reindex');
        await this.loadIpa();
        const ms = Math.max(1, Math.round(performance.now() - t0));
        if (r && r.ok) {
          this.lastSyncStatus = 'ok';
          this.lastSyncMsg = `索引重建完成 · ${r.cache_count || 0} 个 IPA · 用时 ${ms}ms`;
          this.showToast(this.lastSyncMsg);
        } else {
          this.lastSyncStatus = 'err';
          this.lastSyncMsg = '重建失败' + (r?.error ? '：' + r.error : '');
          this.showToast(this.lastSyncMsg, 'err');
        }
      } catch (e) {
        this.lastSyncStatus = 'err';
        this.lastSyncMsg = '重建失败：' + (e?.message || e);
        this.showToast(this.lastSyncMsg, 'err');
      } finally {
        this.reindexing = false;
      }
    },

    startAutoSync() {
      // 每 1s 让 syncLabel 的"几秒前"自动重算
      if (this._tickTimer) clearInterval(this._tickTimer);
      this._tickTimer = setInterval(() => { this._nowTick = Date.now(); }, 1000);
      // 后台轻量轮询：每 30s 在 APP 页且页面可见时拉一次 /api/ipa
      const tick = async () => {
        if (document.visibilityState !== 'visible') return;
        if (this.workspace !== 'apps') return;
        if (this.reindexing || this.reloading) return;
        try { await this.loadIpa(); } catch (e) {}
      };
      if (this._pollTimer) clearInterval(this._pollTimer);
      this._pollTimer = setInterval(tick, 30000);
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') tick();
      });
    },

    get syncLabel() {
      if (this.reindexing) return '索引中…';
      if (this.reloading) return '刷新中…';
      if (!this.lastSyncAt) return '尚未同步';
      const now = this._nowTick || Date.now();
      const sec = Math.max(0, Math.round((now - this.lastSyncAt) / 1000));
      if (sec < 5) return '已就绪 · 刚刚';
      if (sec < 60) return `已就绪 · ${sec}s 前`;
      const m = Math.round(sec / 60);
      if (m < 60) return `已就绪 · ${m}m 前`;
      const h = Math.round(m / 60);
      return `已就绪 · ${h}h 前`;
    },
    get syncStatusClass() {
      if (this.reindexing || this.reloading) return 'is-busy';
      if (this.lastSyncStatus === 'err') return 'is-err';
      if (this.lastSyncStatus === 'ok') return 'is-ok';
      return '';
    },
    get syncDotClass() {
      return this.syncStatusClass;
    },
    get syncTooltip() {
      return this.lastSyncMsg || '点击重建索引以扫描磁盘并刷新 IPA 元信息';
    },

    async loadLog() {
      const r = await fetch('/api/logs/' + this.logName + '?lines=300');
      if (r.status === 401) {
        window.location.href = '/login';
        return;
      }
      const j = await r.json();
      this.logContent = (j.lines || []).join('');
      this.$nextTick(() => {
        const pre = document.querySelector('pre.log');
        if (pre) pre.scrollTop = pre.scrollHeight;
      });
    },

    async addGroup() {
      if (!this.newGroup.trim()) return;
      await this.api('POST', '/api/groups', { url: this.newGroup.trim() });
      this.newGroup = '';
      await this.loadConfig();
      this.showToast('已添加群组');
    },

    async delGroup(url) {
      if (!confirm('删除：' + url + '？')) return;
      await this.api('DELETE', '/api/groups', { url });
      await this.loadConfig();
      this.showToast('已删除');
    },

    async togglePriority(url) {
      await this.api('POST', '/api/groups/priority', { url });
      await this.loadConfig();
    },

    async addApp() {
      const name = this.newApp.name.trim();
      const kws = this.newApp.keywords.split(',').map((s) => s.trim()).filter(Boolean);
      if (!name || !kws.length) {
        this.showToast('请填写应用名和关键词', 'err');
        return;
      }
      await this.api('POST', '/api/whitelist', { name, keywords: kws });
      this.newApp = { name: '', keywords: '' };
      await this.loadConfig();
      this.showToast('已添加');
    },

    async delApp(name) {
      if (!confirm('删除 "' + name + '" 的规则？')) return;
      await this.api('DELETE', '/api/whitelist', { name });
      await this.loadConfig();
      this.showToast('已删除');
    },

    async addKeyword(app) {
      const k = (this.newKw[app.name] || '').trim();
      if (!k) return;
      if (app.keywords.includes(k)) {
        this.showToast('关键词已存在', 'err');
        return;
      }
      await this.api('PUT', '/api/whitelist', { name: app.name, keywords: [...app.keywords, k] });
      this.newKw[app.name] = '';
      await this.loadConfig();
    },

    async delKeyword(app, idx) {
      const next = app.keywords.filter((_, i) => i !== idx);
      if (!next.length) {
        if (!confirm('删除最后一个关键词会移除整个应用规则，继续？')) return;
        await this.api('DELETE', '/api/whitelist', { name: app.name });
      } else {
        await this.api('PUT', '/api/whitelist', { name: app.name, keywords: next });
      }
      await this.loadConfig();
    },

    async delIpaSingle(filename) {
      if (!confirm('确认删除 "' + filename + '"？')) return;
      await this.api('DELETE', '/api/ipa', { filenames: [filename] });
      await this.loadIpa();
      await this.loadStatus();
      this.showToast('已删除');
    },

    downloadIpa(v) {
      if (!v || v.downloadable === false) {
        this.showToast('这个 IPA 文件损坏，不能下载；建议删除后重新扫描。', 'err');
        return;
      }
      window.location.href = '/_ipa_proxy/' + encodeURIComponent(v.filename);
    },

    async saveRate() {
      await this.api('PUT', '/api/rate_limit', this.cfg.rate_limit);
      this.showToast('速率已保存');
    },

    async loadAccount() {
      try {
        const r = await this.api('GET', '/api/account');
        this.account.username = r.username || '';
      } catch (e) {}
    },

    async saveAccount() {
      const username = this.account.username.trim();
      const newPassword = this.account.newPassword;
      const confirmPassword = this.account.confirmPassword;
      if (!username) {
        this.showToast('请填写用户名', 'err');
        return;
      }
      if (newPassword || confirmPassword) {
        if (newPassword !== confirmPassword) {
          this.showToast('两次密码不一致', 'err');
          return;
        }
        if (newPassword.length < 4) {
          this.showToast('新密码至少 4 位', 'err');
          return;
        }
      }
      this.accountSaving = true;
      try {
        await this.api('PUT', '/api/account', {
          username,
          new_password: newPassword,
        });
        this.showToast('账号已更新，3 秒后跳转登录');
        localStorage.setItem('ipa-login-user', username);
        setTimeout(() => { window.location.href = '/login'; }, 3000);
      } catch (e) {}
      this.accountSaving = false;
    },

    async changePassword() {
      if (!this.account.newPassword || !this.account.confirmPassword) {
        this.showToast('请填写新密码', 'err');
        return;
      }
      if (this.account.newPassword !== this.account.confirmPassword) {
        this.showToast('两次密码不一致', 'err');
        return;
      }
      if (this.account.newPassword.length < 4) {
        this.showToast('新密码至少 4 位', 'err');
        return;
      }
      try {
        await this.api('PUT', '/api/password', {
          new_password: this.account.newPassword,
        });
        this.showToast('已修改，3 秒后跳转登录');
        setTimeout(() => { window.location.href = '/login'; }, 3000);
      } catch (e) {}
    },

    async logout() {
      try {
        await fetch('/api/logout', { method: 'POST' });
      } catch (e) {}
      window.location.href = '/login';
    },

    async loadBot() {
      try {
        const r = await this.api('GET', '/api/bot');
        this.botCfg = {
          token: r.token || '',
          enabled: r.enabled !== false,
          token_preview: r.token_preview || '',
          has_token: r.has_token,
          bot_username: r.bot_username || '',
          chat_id: r.chat_id || '',
          user_ids: Array.isArray(r.user_ids) ? r.user_ids.map(String) : [],
          user_ids_text: Array.isArray(r.user_ids) ? r.user_ids.map(String).join(', ') : '',
        };
      } catch (e) {}
    },

    async saveBot() {
      const token = this.botCfg.token.trim();
      if (this.botCfg.enabled && !token && !this.botCfg.has_token) {
        this.showToast('请输入 Bot Token', 'err');
        return;
      }
      this.botSaving = true;
      try {
        const payload = { enabled: this.botCfg.enabled, user_ids: this.botCfg.user_ids_text };
        if (token) payload.bot_token = token;
        const r = await this.api('PUT', '/api/bot', payload);
        this.showToast(r.msg || '已保存');
        this.botCfg.token = '';
        await this.loadBot();
      } catch (e) {}
      this.botSaving = false;
    },

    async testBot() {
      this.botTesting = true;
      this.botTestResult = null;
      try {
        this.botTestResult = await this.api('POST', '/api/bot/test');
      } catch (e) {
        this.botTestResult = { ok: false, error: e.message };
      }
      this.botTesting = false;
    },

    async loadUnlock() {
      try {
        const r = await this.api('GET', '/api/unlock');
        // 从 expires_at 反推 preset；找不到就标 custom
        let preset = 'never';
        if (r.expires_at && r.remaining_seconds && r.remaining_seconds > 0) {
          const days = Math.round(r.remaining_seconds / 86400);
          const map = { 1: '1d', 7: '7d', 30: '30d', 90: '90d', 365: '365d' };
          preset = map[days] || 'custom';
        }
        this.unlockCfg = {
          code: r.code || '',
          enabled: r.enabled !== false,
          expires: preset,
          expires_at: r.expires_at || '',
          remaining_seconds: r.remaining_seconds,
          expired: !!r.expired,
          token_preview: r.token_preview || '',
          has_token: r.has_token,
        };
      } catch (e) {}
    },

    async loadRepoInfo() {
      try {
        const r = await this.api('GET', '/api/repo_info');
        this.repoInfo = { url: r.repo_url || '' };
      } catch (e) {}
    },

    async loadRepoPath() {
      try {
        const r = await this.api('GET', '/api/repo_path');
        this.repoPath.current = r.current || '';
        this.repoPath.updatedAt = r.updated_at ? this.formatExpires(r.updated_at) : '';
        if (!this.repoPath.draft) this.repoPath.draft = r.current || '';
      } catch (e) {}
    },

    async randomRepoPath() {
      try {
        const r = await this.api('POST', '/api/repo_path/regenerate');
        if (r && r.candidate) {
          this.repoPath.draft = r.candidate;
          this.repoPath.result = null;
          this.showToast('已生成候选鉴权码，确认无误后点击「应用并同步订阅地址」');
        }
      } catch (e) {}
    },

    async applyRepoPath() {
      const code = (this.repoPath.draft || '').trim();
      if (!/^[A-Za-z0-9_-]{6,32}$/.test(code)) {
        this.repoPath.result = { ok: false, error: '鉴权码必须是 6-32 位字母/数字/下划线/短横线' };
        return;
      }
      if (code === this.repoPath.current) {
        this.repoPath.result = { ok: false, error: '新鉴权码与当前一致，无需应用' };
        return;
      }
      if (!confirm('应用新鉴权码后，原来的订阅 URL 会立刻失效，所有客户端需要重新订阅。继续？')) return;
      this.repoPath.saving = true;
      this.repoPath.result = null;
      try {
        const r = await this.api('PUT', '/api/repo_path', { code });
        this.repoPath.result = { ok: true, msg: r.msg || '已应用' };
        this.showToast(r.msg || '已应用');
        if (r.repo_url) this.repoInfo = { url: r.repo_url };
        await this.loadRepoPath();
      } catch (e) {
        this.repoPath.result = { ok: false, error: e.message };
      }
      this.repoPath.saving = false;
    },

    openDescEditor(v) {
      const initialList = (v.highlights || []).slice(0, 6);
      this.descEditor = {
        open: true,
        filename: v.filename,
        text: initialList.join('\n'),
        rawText: v.raw_message || '',
        source: v.source_message || '',
        manual: !!v.manual_description,
        saving: false,
      };
    },

    closeDescEditor() {
      this.descEditor.open = false;
      this.descEditor.saving = false;
    },

    async saveDescEditor() {
      const filename = this.descEditor.filename;
      if (!filename) return;
      const lines = (this.descEditor.text || '')
        .split(/\r?\n/)
        .map((s) => s.trim())
        .filter(Boolean)
        .slice(0, 6);
      this.descEditor.saving = true;
      try {
        await this.api('PUT', '/api/ipa/description', { filename, highlights: lines });
        this.showToast('破解点已保存，订阅源已刷新');
        this.closeDescEditor();
        await this.loadIpa();
      } catch (e) {
        // api() 已弹 toast
      } finally {
        this.descEditor.saving = false;
      }
    },

    async resetDescAuto() {
      const filename = this.descEditor.filename;
      if (!filename) return;
      if (!confirm('恢复自动模式后，下次 TG 入库会用 TG 消息覆盖目前手动写的破解点。是否继续？')) return;
      this.descEditor.saving = true;
      try {
        await this.api('POST', '/api/ipa/description/auto', { filename });
        this.showToast('已恢复自动模式');
        this.closeDescEditor();
        await this.loadIpa();
      } finally {
        this.descEditor.saving = false;
      }
    },

    async copyRepoUrl() {
      if (!this.repoInfo.url) return;
      const text = this.repoInfo.url;
      const copied = () => {
        this.repoUrlCopied = true;
        this.showToast('已复制到剪贴板');
        setTimeout(() => { this.repoUrlCopied = false; }, 2000);
      };
      // 1) Clipboard API（仅安全上下文：HTTPS / localhost）
      try {
        if (window.isSecureContext && navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
          await navigator.clipboard.writeText(text);
          copied();
          return;
        }
      } catch (e) {
        // 继续走 fallback
      }
      // 2) 临时 textarea fallback（脱离 Alpine refs，兼容 HTTP 内网访问）
      try {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.setAttribute('readonly', '');
        ta.style.position = 'fixed';
        ta.style.top = '0';
        ta.style.left = '-9999px';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        const prevSelection = document.getSelection().rangeCount > 0
          ? document.getSelection().getRangeAt(0)
          : null;
        ta.focus();
        ta.select();
        ta.setSelectionRange(0, text.length);
        let ok = false;
        try { ok = document.execCommand && document.execCommand('copy'); } catch (e) { ok = false; }
        document.body.removeChild(ta);
        if (prevSelection) {
          document.getSelection().removeAllRanges();
          document.getSelection().addRange(prevSelection);
        }
        if (ok) { copied(); return; }
      } catch (e) {}
      // 3) 最后兜底：选中原 input，让用户 Ctrl+C
      try {
        const input = this.$refs && this.$refs.repoUrlInput;
        if (input) { input.focus(); input.select(); }
      } catch (e) {}
      this.showToast('复制失败，已选中地址，请按 Ctrl+C / ⌘+C', 'err');
    },

    async saveUnlock() {
      const code = (this.unlockCfg.code || '').trim();
      if (this.unlockCfg.enabled && !/^[A-Za-z0-9]{4,32}$/.test(code)) {
        this.showToast('解锁码需 4-32 位字母数字', 'err');
        return;
      }
      this.unlockSaving = true;
      this.unlockResult = null;
      try {
        const r = await this.api('PUT', '/api/unlock', {
          enabled: this.unlockCfg.enabled,
          code,
          expires: this.unlockCfg.expires || 'never',
        });
        this.unlockResult = { ok: true, msg: r.msg || '已保存' };
        this.showToast(r.msg || '已保存');
        await this.loadUnlock();
      } catch (e) {
        this.unlockResult = { ok: false, error: e.message };
      }
      this.unlockSaving = false;
    },

    formatExpires(iso) {
      if (!iso) return '';
      try {
        const d = new Date(iso);
        const pad = (n) => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      } catch (e) { return iso; }
    },

    formatRemaining(sec) {
      if (sec == null) return '';
      if (sec <= 0) return '0';
      const days = Math.floor(sec / 86400);
      const hours = Math.floor((sec % 86400) / 3600);
      const mins = Math.floor((sec % 3600) / 60);
      if (days >= 1) return `${days} 天 ${hours} 小时`;
      if (hours >= 1) return `${hours} 小时 ${mins} 分钟`;
      return `${mins} 分钟`;
    },

    async loadProxy() {
      try {
        const r = await this.api('GET', '/api/proxy');
        this.proxyCfg = {
          url: r.url || '',
          enabled: r.enabled !== false,
          source: r.source || '',
          env_tg_proxy: r.env_tg_proxy || '',
          env_forward_proxy: r.env_forward_proxy || '',
        };
        this.proxyPresets = r.presets || [];
      } catch (e) {}
    },

    async saveProxy() {
      this.proxySaving = true;
      try {
        const r = await this.api('PUT', '/api/proxy', {
          url: this.proxyCfg.url,
          enabled: this.proxyCfg.enabled,
          source: this.proxyCfg.source || 'custom',
        });
        this.showToast(r.msg || '已保存');
      } catch (e) {}
      this.proxySaving = false;
    },

    async testProxy() {
      this.proxyTesting = true;
      this.proxyTestResult = null;
      try {
        this.proxyTestResult = await this.api('POST', '/api/proxy/test', { url: this.proxyCfg.url });
      } catch (e) {
        this.proxyTestResult = { ok: false, error: e.message };
      }
      this.proxyTesting = false;
    },

    async triggerScan() {
      this.scanning = true;
      try {
        await this.api('POST', '/api/scan');
        this.showToast('扫描已触发');
        this.setWorkspace('logs');
        this.autoRefresh = true;
        this.loadLog();
      } finally {
        setTimeout(() => { this.scanning = false; }, 3000);
      }
    },
  };
}
</script>
