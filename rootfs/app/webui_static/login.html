<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark">
<title>IPA Self-Host - 登录</title>
<!-- Inspired by gokuscraper/Eyes-Follow-Mouse-Login-Website, Apache-2.0. Adapted for IPA Self-Host. -->
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:#0f1419;color:#e6edf3}
  .login-layout{display:grid;grid-template-columns:1fr 1fr;height:100vh}
  .left-panel{
    position:relative;display:flex;flex-direction:column;justify-content:space-between;
    align-items:center;padding:40px;background:linear-gradient(135deg,#3a1c71,#d76d77,#ffaf7b);overflow:hidden;
  }
  .left-panel .logo{font-size:22px;font-weight:700;color:#fff;z-index:2;align-self:flex-start;display:flex;align-items:center;gap:8px}
  .left-panel .logo span{background:rgba(255,255,255,.15);backdrop-filter:blur(4px);padding:4px 10px;border-radius:8px;font-size:16px}
  .scene{position:relative;width:100%;max-width:480px;height:380px;z-index:2;margin-bottom:60px}
  .char{position:absolute;bottom:0;border-radius:8px 8px 0 0;transition:all .5s ease-in-out;transform-origin:bottom center}
  .eye-row{position:absolute;display:flex;transition:all .5s ease-in-out}
  .eye-ball{display:flex;align-items:center;justify-content:center;border-radius:50%;overflow:hidden;transition:all .15s}
  .pupil{border-radius:50%;transition:transform .08s ease-out}
  .char-purple{left:10%;width:160px;height:340px;background:#7c3aed;z-index:1;border-radius:12px 12px 0 0}
  .char-purple .eye-row{left:40px;top:36px;gap:28px}
  .char-purple .eye-ball{width:20px;height:20px;background:#fff}
  .char-purple .pupil{width:8px;height:8px;background:#1a1a2e}
  .char-black{left:40%;width:110px;height:260px;background:#1a1a2e;z-index:2;border-radius:10px 10px 0 0}
  .char-black .eye-row{left:22px;top:28px;gap:20px}
  .char-black .eye-ball{width:16px;height:16px;background:#fff}
  .char-black .pupil{width:6px;height:6px;background:#1a1a2e}
  .char-orange{left:0;width:200px;height:160px;background:#ff9b6b;z-index:3;border-radius:100px 100px 0 0}
  .char-orange .eye-row{left:68px;top:70px;gap:24px}
  .char-orange .pupil{width:10px;height:10px;background:#1a1a2e}
  .char-yellow{right:5%;width:120px;height:190px;background:#fde047;z-index:4;border-radius:60px 60px 0 0}
  .char-yellow .eye-row{left:42px;top:34px;gap:18px}
  .char-yellow .pupil{width:10px;height:10px;background:#1a1a2e}
  .char-yellow .mouth{position:absolute;width:60px;height:3px;background:#1a1a2e;border-radius:2px;transition:all .2s}
  .arm{position:absolute;width:60px;height:16px;border-radius:8px;transition:all .4s ease-in-out;opacity:0;z-index:5}
  .char-purple .arm-l{left:-20px;top:60px;background:#7c3aed;transform:rotate(30deg)}
  .char-purple .arm-r{right:-20px;top:60px;background:#7c3aed;transform:rotate(-30deg)}
  .char-black .arm-l{left:-16px;top:50px;background:#1a1a2e;transform:rotate(30deg)}
  .char-black .arm-r{right:-16px;top:50px;background:#1a1a2e;transform:rotate(-30deg)}
  .left-panel .footer{z-index:2;color:rgba(255,255,255,.56);font-size:12px;align-self:flex-start}
  .bg-dots{position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.08) 1px,transparent 1px);background-size:20px 20px}
  .bg-blur1{position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,.08);filter:blur(60px);top:15%;right:10%}
  .bg-blur2{position:absolute;width:400px;height:400px;border-radius:50%;background:rgba(0,0,0,.08);filter:blur(80px);bottom:10%;left:5%}
  .right-panel{display:flex;align-items:center;justify-content:center;padding:40px;background:#0f1419;overflow:auto}
  .login-box{width:100%;max-width:400px;padding:24px 0}
  .login-box h1{font-size:28px;font-weight:700;color:#e6edf3;margin-bottom:6px}
  .login-box .sub{font-size:14px;color:#7d8590;margin-bottom:32px}
  .field{margin-bottom:20px}
  .field label{display:block;font-size:13px;font-weight:500;color:#7d8590;margin-bottom:6px}
  .field input{width:100%;height:48px;padding:0 16px;font-size:15px;color:#e6edf3;background:#0d1117;border:1px solid #252d38;border-radius:24px;outline:none;transition:border-color .2s,box-shadow .2s}
  .field input:focus{border-color:#388bfd;box-shadow:0 0 0 4px rgba(56,139,253,.12)}
  .field input::placeholder{color:#484f58}
  .password-wrap{position:relative}
  .password-wrap input{padding-right:48px}
  .eye-btn{position:absolute;right:8px;top:50%;width:34px;height:34px;border:0;border-radius:50%;display:grid;place-items:center;color:#7d8590;background:transparent;transform:translateY(-50%);cursor:pointer;transition:background .2s,color .2s}
  .eye-btn:hover,.eye-btn.is-on{background:#161b22;color:#e6edf3}
  .eye-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .eye-btn .eye-off{display:none}
  .eye-btn.is-on .eye-open{display:none}
  .eye-btn.is-on .eye-off{display:block}
  .login-meta{display:flex;justify-content:flex-end;margin:-6px 0 18px}
  .link-btn{border:0;background:transparent;color:#58a6ff;font-size:13px;cursor:pointer;padding:0}
  .link-btn:hover{text-decoration:underline}
  .login-btn{width:100%;height:48px;border-radius:24px;font-size:15px;font-weight:600;color:#fff;cursor:pointer;position:relative;overflow:hidden;background:transparent;border:1px solid #252d38;transition:all .3s}
  .login-btn .text-default{transition:all .3s;display:block}
  .login-btn .text-hover{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:8px;background:#388bfd;opacity:0;transition:all .3s;border-radius:24px}
  .login-btn:hover .text-default{transform:translateX(120px);opacity:0}
  .login-btn:hover .text-hover{opacity:1}
  .login-btn:disabled{opacity:.7;cursor:not-allowed}
  .error-msg{display:none;padding:10px 14px;background:#2a1f1f;border:1px solid #f85149;border-radius:8px;font-size:13px;color:#f85149;margin-bottom:16px}
  .error-msg.show{display:block}
  .reset-panel{display:none;margin-top:18px;padding:18px;border:1px solid #252d38;border-radius:24px;background:rgba(13,17,23,.72);box-shadow:0 16px 34px rgba(0,0,0,.18)}
  .reset-panel.show{display:block;animation:panelIn .2s ease both}
  .reset-panel h2{font-size:18px;margin:0 0 6px;color:#e6edf3}
  .form-note{font-size:13px;line-height:1.55;color:#7d8590;margin-bottom:16px}
  .form-note.ok{color:#3fb950}
  .form-note.err{color:#f85149}
  .reset-step{display:none}
  .reset-step.show{display:block}
  .mini-btn{height:42px;border-radius:21px;border:1px solid #252d38;background:#0d1117;color:#e6edf3;padding:0 16px;font-weight:600;cursor:pointer;transition:all .2s}
  .mini-btn:hover{border-color:#388bfd;transform:translateY(-1px)}
  .mini-btn.primary{border-color:transparent;background:#388bfd;color:#fff}
  .reset-actions{display:flex;gap:10px;flex-wrap:wrap}
  @keyframes panelIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @media(max-width:768px){.login-layout{grid-template-columns:1fr}.left-panel{display:none}}
  @media (prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="login-layout">
  <div class="left-panel">
    <div class="logo"><span>📱</span> IPA Self-Host</div>
    <div class="scene" id="scene">
      <div class="char char-purple" id="char-purple">
        <div class="eye-row" id="purple-eyes"><div class="eye-ball"><div class="pupil" id="purple-pupil1"></div></div><div class="eye-ball"><div class="pupil" id="purple-pupil2"></div></div></div>
        <div class="arm arm-l" id="purple-arm-l"></div><div class="arm arm-r" id="purple-arm-r"></div>
      </div>
      <div class="char char-black" id="char-black">
        <div class="eye-row" id="black-eyes"><div class="eye-ball"><div class="pupil" id="black-pupil1"></div></div><div class="eye-ball"><div class="pupil" id="black-pupil2"></div></div></div>
        <div class="arm arm-l" id="black-arm-l"></div><div class="arm arm-r" id="black-arm-r"></div>
      </div>
      <div class="char char-orange" id="char-orange"><div class="eye-row" id="orange-eyes"><div class="pupil" id="orange-pupil1"></div><div class="pupil" id="orange-pupil2"></div></div></div>
      <div class="char char-yellow" id="char-yellow"><div class="eye-row" id="yellow-eyes"><div class="pupil" id="yellow-pupil1"></div><div class="pupil" id="yellow-pupil2"></div></div><div class="mouth" id="yellow-mouth" style="left:30px;top:78px"></div></div>
    </div>
    <div class="footer">IPA 私有源管理系统</div>
    <div class="bg-dots"></div><div class="bg-blur1"></div><div class="bg-blur2"></div>
  </div>

  <div class="right-panel">
    <div class="login-box">
      <h1>欢迎回来！</h1>
      <div class="sub">请输入登录信息</div>
      <div class="error-msg" id="error-msg"></div>
      <form id="login-form">
        <div class="field"><label>用户名</label><input type="text" id="username" placeholder="请输入用户名" autocomplete="username"></div>
        <div class="field"><label>密码</label><input type="password" id="password" placeholder="请输入密码" autocomplete="current-password"></div>
        <div class="login-meta"><button type="button" class="link-btn" id="forgot-open">忘记密码？</button></div>
        <button type="submit" class="login-btn" id="login-btn"><span class="text-default" id="btn-text">登 录</span><span class="text-hover"><span id="btn-hover-text">登 录</span> →</span></button>
      </form>
      <div class="reset-panel" id="reset-panel">
        <h2>找回密码</h2>
        <div class="form-note" id="reset-note">输入用户名，验证码会发送到你的 Telegram Bot 白名单用户。</div>
        <div class="field"><label>用户名</label><input type="text" id="reset-username" placeholder="请输入用户名" autocomplete="username"></div>
        <div class="reset-actions" style="margin-bottom:16px">
          <button type="button" class="mini-btn primary" id="reset-send">发送验证码</button>
          <button type="button" class="mini-btn" id="reset-back">返回登录</button>
        </div>
        <div class="reset-step" id="reset-step2">
          <div class="field"><label>验证码</label><input type="text" id="reset-code" inputmode="numeric" maxlength="6" placeholder="6 位数字"></div>
          <div class="field">
            <label>新密码</label>
            <div class="password-wrap">
              <input type="password" id="reset-new-password" maxlength="64" autocomplete="new-password" placeholder="输入新密码">
              <button type="button" class="eye-btn" id="reset-show-new" aria-label="显示密码" title="显示密码">
                <svg class="eye-open" viewBox="0 0 24 24"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path><circle cx="12" cy="12" r="2.8"></circle></svg>
                <svg class="eye-off" viewBox="0 0 24 24"><path d="M10.6 5.2A10.7 10.7 0 0 1 12 5c6 0 9.5 7 9.5 7a15.2 15.2 0 0 1-3.1 3.8"></path><path d="M14.1 14.2A3 3 0 0 1 9.8 9.9"></path><path d="M3 3l18 18"></path><path d="M6.6 6.7C3.8 8.6 2.5 12 2.5 12s3.5 7 9.5 7c1.5 0 2.9-.4 4.1-1"></path></svg>
              </button>
            </div>
          </div>
          <div class="field">
            <label>确认新密码</label>
            <div class="password-wrap">
              <input type="password" id="reset-confirm-password" maxlength="64" autocomplete="new-password" placeholder="再输入一次">
              <button type="button" class="eye-btn" id="reset-show-confirm" aria-label="显示密码" title="显示密码">
                <svg class="eye-open" viewBox="0 0 24 24"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path><circle cx="12" cy="12" r="2.8"></circle></svg>
                <svg class="eye-off" viewBox="0 0 24 24"><path d="M10.6 5.2A10.7 10.7 0 0 1 12 5c6 0 9.5 7 9.5 7a15.2 15.2 0 0 1-3.1 3.8"></path><path d="M14.1 14.2A3 3 0 0 1 9.8 9.9"></path><path d="M3 3l18 18"></path><path d="M6.6 6.7C3.8 8.6 2.5 12 2.5 12s3.5 7 9.5 7c1.5 0 2.9-.4 4.1-1"></path></svg>
              </button>
            </div>
          </div>
          <button type="button" class="mini-btn primary" id="reset-confirm">重置密码</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const S = { mx: window.innerWidth / 2, my: window.innerHeight / 2, pwLen: 0, isLoading: false, blinkPurple: false, blinkBlack: false };
  const $ = id => document.getElementById(id);
  const refs = {
    form:$('login-form'), username:$('username'), password:$('password'), error:$('error-msg'), btnText:$('btn-text'), btnHover:$('btn-hover-text'),
    forgotOpen:$('forgot-open'), resetPanel:$('reset-panel'), resetNote:$('reset-note'), resetUsername:$('reset-username'), resetSend:$('reset-send'), resetBack:$('reset-back'),
    resetStep2:$('reset-step2'), resetCode:$('reset-code'), resetNewPassword:$('reset-new-password'), resetConfirmPassword:$('reset-confirm-password'), resetConfirm:$('reset-confirm'),
    resetShowNew:$('reset-show-new'), resetShowConfirm:$('reset-show-confirm'),
    charPurple:$('char-purple'), charBlack:$('char-black'), charOrange:$('char-orange'), charYellow:$('char-yellow'),
    purpleEyes:$('purple-eyes'), blackEyes:$('black-eyes'), orangeEyes:$('orange-eyes'), yellowEyes:$('yellow-eyes'),
    purplePupil1:$('purple-pupil1'), purplePupil2:$('purple-pupil2'), blackPupil1:$('black-pupil1'), blackPupil2:$('black-pupil2'),
    orangePupil1:$('orange-pupil1'), orangePupil2:$('orange-pupil2'), yellowPupil1:$('yellow-pupil1'), yellowPupil2:$('yellow-pupil2'),
    purpleArmL:$('purple-arm-l'), purpleArmR:$('purple-arm-r'), blackArmL:$('black-arm-l'), blackArmR:$('black-arm-r'), yellowMouth:$('yellow-mouth')
  };
  refs.username.value = localStorage.getItem('ipa-login-user') || '';
  refs.resetUsername.value = refs.username.value;
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function setResetNote(msg, type) {
    refs.resetNote.textContent = msg;
    refs.resetNote.className = 'form-note' + (type ? ' ' + type : '');
  }
  async function postJson(url, body) {
    const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    let j = {};
    try { j = await r.json(); } catch (e) {}
    if (!r.ok) throw new Error(j.error || r.statusText || '请求失败');
    return j;
  }
  function bindEye(btn, input) {
    btn.addEventListener('click', () => {
      const show = input.type === 'password';
      input.type = show ? 'text' : 'password';
      btn.classList.toggle('is-on', show);
      const label = show ? '隐藏密码' : '显示密码';
      btn.setAttribute('aria-label', label);
      btn.setAttribute('title', label);
      input.focus();
    });
  }
  bindEye(refs.resetShowNew, refs.resetNewPassword);
  bindEye(refs.resetShowConfirm, refs.resetConfirmPassword);
  function pupilPos(el, maxDist, fx, fy) {
    if (fx !== undefined && fy !== undefined) return { x: fx, y: fy };
    if (!el) return { x: 0, y: 0 };
    const r = el.getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    const dx = S.mx - cx, dy = S.my - cy;
    const dist = Math.min(Math.hypot(dx, dy), maxDist);
    const ang = Math.atan2(dy, dx);
    return { x: Math.cos(ang) * dist, y: Math.sin(ang) * dist };
  }
  function setTranslate(el, pos) { el.style.transform = `translate(${pos.x}px,${pos.y}px)`; }
  function faceOffset(charEl) {
    const r = charEl.getBoundingClientRect();
    const dx = S.mx - (r.left + r.width / 2);
    const dy = S.my - (r.top + r.height / 3);
    return { fx: clamp(dx / 20, -12, 12), fy: clamp(dy / 30, -8, 8), skew: clamp(-dx / 120, -5, 5) };
  }
  function render() {
    const isHiding = S.pwLen > 0;
    const pf = faceOffset(refs.charPurple);
    refs.charPurple.style.transform = isHiding ? `skewX(${pf.skew - 10}deg) translateX(30px)` : `skewX(${pf.skew}deg)`;
    refs.charPurple.style.height = (S.isLoading || isHiding) ? '370px' : '340px';
    refs.purpleEyes.style.left = isHiding ? '25px' : `${40 + pf.fx}px`;
    refs.purpleEyes.style.top = isHiding ? '50px' : `${36 + pf.fy}px`;
    refs.purpleArmL.style.opacity = isHiding ? 1 : 0; refs.purpleArmR.style.opacity = isHiding ? 1 : 0;
    refs.purpleArmL.style.top = isHiding ? '42px' : '60px'; refs.purpleArmR.style.top = isHiding ? '42px' : '60px';
    if (isHiding) { refs.purpleArmL.style.transform = 'rotate(15deg) translateX(20px)'; refs.purpleArmR.style.transform = 'rotate(-15deg) translateX(-20px)'; }
    const purpleForce = isHiding ? { x: -3, y: -3 } : {};
    setTranslate(refs.purplePupil1, pupilPos(refs.purplePupil1.parentElement, 5, purpleForce.x, purpleForce.y));
    setTranslate(refs.purplePupil2, pupilPos(refs.purplePupil2.parentElement, 5, purpleForce.x, purpleForce.y));
    refs.purplePupil1.parentElement.style.height = S.blinkPurple ? '2px' : '20px';
    refs.purplePupil2.parentElement.style.height = S.blinkPurple ? '2px' : '20px';
    refs.purplePupil1.style.display = S.blinkPurple ? 'none' : ''; refs.purplePupil2.style.display = S.blinkPurple ? 'none' : '';

    const bf = faceOffset(refs.charBlack);
    refs.charBlack.style.transform = isHiding ? `skewX(${bf.skew - 8}deg)` : `skewX(${bf.skew}deg)`;
    refs.blackEyes.style.left = isHiding ? '14px' : `${22 + bf.fx}px`;
    refs.blackEyes.style.top = isHiding ? '40px' : `${28 + bf.fy}px`;
    refs.blackArmL.style.opacity = isHiding ? 1 : 0; refs.blackArmR.style.opacity = isHiding ? 1 : 0;
    refs.blackArmL.style.top = isHiding ? '36px' : '50px'; refs.blackArmR.style.top = isHiding ? '36px' : '50px';
    if (isHiding) { refs.blackArmL.style.transform = 'rotate(12deg) translateX(16px)'; refs.blackArmR.style.transform = 'rotate(-12deg) translateX(-16px)'; }
    const blackForce = isHiding ? { x: -3, y: -3 } : {};
    setTranslate(refs.blackPupil1, pupilPos(refs.blackPupil1.parentElement, 4, blackForce.x, blackForce.y));
    setTranslate(refs.blackPupil2, pupilPos(refs.blackPupil2.parentElement, 4, blackForce.x, blackForce.y));
    refs.blackPupil1.parentElement.style.height = S.blinkBlack ? '2px' : '16px';
    refs.blackPupil2.parentElement.style.height = S.blinkBlack ? '2px' : '16px';
    refs.blackPupil1.style.display = S.blinkBlack ? 'none' : ''; refs.blackPupil2.style.display = S.blinkBlack ? 'none' : '';

    const of = faceOffset(refs.charOrange);
    refs.charOrange.style.transform = `skewX(${of.skew}deg)`;
    refs.orangeEyes.style.left = `${68 + of.fx}px`; refs.orangeEyes.style.top = `${70 + of.fy}px`;
    const oForce = isHiding ? { x: -4, y: -3 } : {};
    setTranslate(refs.orangePupil1, pupilPos(refs.orangePupil1, 5, oForce.x, oForce.y));
    setTranslate(refs.orangePupil2, pupilPos(refs.orangePupil2, 5, oForce.x, oForce.y));

    const yf = faceOffset(refs.charYellow);
    refs.charYellow.style.transform = `skewX(${yf.skew}deg)`;
    refs.yellowEyes.style.left = isHiding ? '18px' : `${42 + yf.fx}px`;
    refs.yellowEyes.style.top = isHiding ? '32px' : `${34 + yf.fy}px`;
    refs.yellowMouth.style.left = isHiding ? '10px' : `${30 + yf.fx}px`;
    refs.yellowMouth.style.top = isHiding ? '78px' : `${78 + yf.fy}px`;
    const yForce = isHiding ? { x: -4, y: -3 } : {};
    setTranslate(refs.yellowPupil1, pupilPos(refs.yellowPupil1, 5, yForce.x, yForce.y));
    setTranslate(refs.yellowPupil2, pupilPos(refs.yellowPupil2, 5, yForce.x, yForce.y));
  }
  function scheduleBlink(key) {
    setTimeout(() => {
      S[key] = true; render();
      setTimeout(() => { S[key] = false; render(); scheduleBlink(key); }, 150);
    }, 3000 + Math.random() * 4000);
  }
  scheduleBlink('blinkPurple'); scheduleBlink('blinkBlack');
  window.addEventListener('mousemove', e => { S.mx = e.clientX; S.my = e.clientY; render(); });
  refs.password.addEventListener('input', e => { S.pwLen = e.target.value.length; render(); });
  refs.username.addEventListener('focus', render); refs.password.addEventListener('focus', render); refs.password.addEventListener('blur', render);
  refs.forgotOpen.addEventListener('click', () => {
    refs.resetPanel.classList.add('show');
    refs.resetUsername.value = refs.username.value.trim() || localStorage.getItem('ipa-login-user') || '';
    setResetNote('输入用户名，验证码会发送到你的 Telegram Bot 白名单用户。');
    hideError();
    refs.resetUsername.focus();
  });
  refs.resetBack.addEventListener('click', () => {
    refs.resetPanel.classList.remove('show');
    refs.resetStep2.classList.remove('show');
    refs.resetCode.value = '';
    refs.resetNewPassword.value = '';
    refs.resetConfirmPassword.value = '';
  });
  refs.resetSend.addEventListener('click', async () => {
    const username = refs.resetUsername.value.trim();
    if (!username) { setResetNote('请先填写用户名。', 'err'); return; }
    refs.resetSend.disabled = true;
    refs.resetSend.textContent = '发送中...';
    try {
      const j = await postJson('/api/password/forgot/request', { username });
      setResetNote(j.msg || '验证码已发送。', j.delivery === 'log' ? 'err' : 'ok');
      refs.resetStep2.classList.add('show');
      refs.resetCode.focus();
    } catch (err) {
      setResetNote(err.message, 'err');
    } finally {
      refs.resetSend.disabled = false;
      refs.resetSend.textContent = '发送验证码';
    }
  });
  refs.resetConfirm.addEventListener('click', async () => {
    const username = refs.resetUsername.value.trim();
    const code = refs.resetCode.value.trim();
    const newPassword = refs.resetNewPassword.value;
    const confirmPassword = refs.resetConfirmPassword.value;
    if (!username || !code || !newPassword || !confirmPassword) { setResetNote('请填完验证码和新密码。', 'err'); return; }
    if (newPassword !== confirmPassword) { setResetNote('两次密码不一致。', 'err'); return; }
    if (newPassword.length < 4) { setResetNote('新密码至少 4 位。', 'err'); return; }
    refs.resetConfirm.disabled = true;
    refs.resetConfirm.textContent = '重置中...';
    try {
      const j = await postJson('/api/password/forgot/confirm', { username, code, new_password: newPassword });
      localStorage.setItem('ipa-login-user', username);
      refs.username.value = username;
      refs.password.value = '';
      S.pwLen = 0;
      setResetNote(j.msg || '密码已重置，请重新登录。', 'ok');
      render();
      setTimeout(() => {
        refs.resetPanel.classList.remove('show');
        refs.resetStep2.classList.remove('show');
      }, 1400);
    } catch (err) {
      setResetNote(err.message, 'err');
    } finally {
      refs.resetConfirm.disabled = false;
      refs.resetConfirm.textContent = '重置密码';
    }
  });
  refs.form.addEventListener('submit', async e => {
    e.preventDefault();
    const username = refs.username.value.trim();
    const password = refs.password.value;
    if (!username || !password) { showError('请输入用户名和密码'); return; }
    S.isLoading = true; refs.btnText.textContent = '登录中...'; refs.btnHover.textContent = '登录中...'; refs.form.querySelector('button').disabled = true; hideError(); render();
    try {
      const r = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ username, password }) });
      const j = await r.json();
      if (!r.ok) { showError(j.error || '登录失败'); resetLoading(); return; }
      localStorage.setItem('ipa-login-user', username);
      window.location.href = '/';
    } catch (err) { showError('网络错误，请重试'); resetLoading(); }
  });
  function resetLoading() { S.isLoading = false; refs.btnText.textContent = '登 录'; refs.btnHover.textContent = '登 录'; refs.form.querySelector('button').disabled = false; render(); }
  function showError(msg) { refs.error.textContent = msg; refs.error.classList.add('show'); }
  function hideError() { refs.error.classList.remove('show'); }
  render();
})();
</script>
</body>
</html>
