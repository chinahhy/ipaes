<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark light">
<title>IPA Self-Host - 登录</title>
<script>
(function() {
  try {
    const mode = localStorage.getItem('ipa-theme-mode') || 'dark';
    const now = new Date();
    const mins = now.getHours() * 60 + now.getMinutes();
    const theme = mode === 'auto' ? (mins >= 360 && mins < 1080 ? 'light' : 'dark') : mode;
    document.documentElement.setAttribute('data-theme', theme === 'light' ? 'light' : 'dark');
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>
<style>
  :root{
    color-scheme:dark;
    --bg:#0a0f16; --surface:#121a25; --surface-2:#182231; --line:#2b3748;
    --text:#f3f7fb; --muted:#93a2b5; --faint:#6d7a8e;
    --primary:#4f8cff; --primary-strong:#2f6fed; --accent:#32d5a9;
    --error:#ff7a7a; --error-bg:rgba(255,122,122,.12); --input:#0d141e;
    --shadow:0 24px 70px rgba(0,0,0,.34);
  }
  [data-theme="light"]{
    color-scheme:light;
    --bg:#f4f7fb; --surface:#fff; --surface-2:#f7f9fc; --line:#dbe3ee;
    --text:#172033; --muted:#5e6d83; --faint:#8290a3;
    --primary:#2563eb; --primary-strong:#1d4ed8; --accent:#0f9f77;
    --error:#d92d3a; --error-bg:rgba(217,45,58,.1); --input:#fff;
    --shadow:0 24px 70px rgba(20,33,55,.13);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%;background:var(--bg);color:var(--text)}
  body{
    min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;
    background:
      radial-gradient(circle at 16% 12%, color-mix(in srgb,var(--primary) 24%, transparent), transparent 32%),
      radial-gradient(circle at 84% 18%, color-mix(in srgb,var(--accent) 18%, transparent), transparent 28%),
      linear-gradient(180deg,var(--bg),color-mix(in srgb,var(--bg) 76%, var(--surface-2)));
  }
  .login-shell{min-height:100vh;display:grid;grid-template-columns:minmax(430px,.95fr) minmax(360px,1.05fr);padding:22px;gap:22px}
  .visual-panel,.form-panel{
    position:relative;overflow:hidden;border:1px solid var(--line);border-radius:28px;background:color-mix(in srgb,var(--surface) 84%, transparent);
    box-shadow:var(--shadow);backdrop-filter:blur(20px);
  }
  .visual-panel{padding:28px;display:flex;flex-direction:column;justify-content:space-between;min-height:calc(100vh - 44px)}
  .visual-panel:before{
    content:"";position:absolute;inset:auto -12% -22% auto;width:480px;height:360px;
    background:linear-gradient(135deg,var(--primary),var(--accent));opacity:.18;filter:blur(36px);transform:rotate(-8deg);
  }
  .brand{position:relative;display:flex;align-items:center;gap:13px}
  .brand-mark{
    width:50px;height:50px;border-radius:16px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-weight:800;letter-spacing:.5px;
    box-shadow:0 16px 34px color-mix(in srgb,var(--primary) 28%, transparent);
  }
  .brand h1{font-size:20px;line-height:1.15}
  .brand p{color:var(--muted);font-size:13px;margin-top:3px}
  .showcase{position:relative;margin:52px 0;display:grid;place-items:center;min-height:330px}
  .device{
    width:min(78%,360px);aspect-ratio:1.65;border-radius:30px;padding:18px;
    background:linear-gradient(145deg,var(--surface),var(--surface-2));border:1px solid var(--line);
    box-shadow:0 28px 70px color-mix(in srgb,var(--primary) 18%, transparent);
    transform:perspective(900px) rotateX(9deg) rotateY(-12deg);animation:float 5s ease-in-out infinite;
  }
  .device-top{display:flex;gap:8px;margin-bottom:18px}
  .device-top span{width:10px;height:10px;border-radius:50%;background:var(--line)}
  .device-top span:first-child{background:var(--error)}
  .device-top span:nth-child(2){background:#f2bd4b}
  .device-top span:nth-child(3){background:var(--accent)}
  .device-row{height:13px;border-radius:999px;background:var(--line);margin:12px 0;overflow:hidden}
  .device-row:before{content:"";display:block;height:100%;width:62%;border-radius:inherit;background:linear-gradient(90deg,var(--primary),var(--accent));animation:loadbar 2.8s ease-in-out infinite}
  .device-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:18px}
  .device-card{height:58px;border-radius:16px;background:color-mix(in srgb,var(--primary) 11%, var(--surface));border:1px solid var(--line)}
  .feature-list{position:relative;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .feature{padding:13px;border-radius:17px;background:color-mix(in srgb,var(--surface-2) 78%, transparent);border:1px solid var(--line)}
  .feature b{display:block;font-size:14px}
  .feature span{display:block;color:var(--muted);font-size:12px;margin-top:4px}
  .form-panel{display:grid;place-items:center;padding:34px}
  .login-box{width:100%;max-width:430px}
  .login-box .eyebrow{color:var(--primary);font-size:12px;font-weight:760;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
  .login-box h2{font-size:32px;line-height:1.12;margin-bottom:10px}
  .login-box .sub{color:var(--muted);margin-bottom:28px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;font-weight:680;color:var(--muted);margin-bottom:7px}
  .field input{
    width:100%;height:50px;padding:0 15px;border:1px solid var(--line);border-radius:16px;outline:none;
    background:var(--input);color:var(--text);font-size:15px;transition:border-color .18s ease,box-shadow .18s ease,transform .18s ease;
  }
  .field input:focus{border-color:var(--primary);box-shadow:0 0 0 4px color-mix(in srgb,var(--primary) 16%, transparent);transform:translateY(-1px)}
  .field input::placeholder{color:var(--faint)}
  .login-btn{
    width:100%;height:52px;border:0;border-radius:17px;margin-top:8px;cursor:pointer;
    background:linear-gradient(135deg,var(--primary),var(--primary-strong));color:#fff;font-size:15px;font-weight:760;
    box-shadow:0 18px 42px color-mix(in srgb,var(--primary) 32%, transparent);
    transition:transform .18s ease,box-shadow .18s ease,opacity .18s ease;
  }
  .login-btn:hover{transform:translateY(-2px);box-shadow:0 24px 54px color-mix(in srgb,var(--primary) 38%, transparent)}
  .login-btn:disabled{opacity:.7;cursor:not-allowed;transform:none}
  .error-msg{
    display:none;margin-bottom:16px;padding:11px 13px;border-radius:14px;background:var(--error-bg);
    border:1px solid color-mix(in srgb,var(--error) 56%, var(--line));color:var(--error);font-size:13px;
  }
  .error-msg.show{display:block;animation:shake .25s ease}
  .footnote{margin-top:18px;color:var(--faint);font-size:12px;text-align:center}
  @keyframes float{50%{transform:perspective(900px) rotateX(7deg) rotateY(-8deg) translateY(-10px)}}
  @keyframes loadbar{50%{width:92%}}
  @keyframes shake{25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  @media (prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;transition:none!important}}
  @media(max-width:860px){
    .login-shell{grid-template-columns:1fr;padding:14px}
    .visual-panel{min-height:auto;padding:20px}
    .showcase{display:none}
    .feature-list{grid-template-columns:1fr}
    .form-panel{padding:24px}
    .login-box h2{font-size:27px}
  }
</style>
</head>
<body>
<main class="login-shell">
  <section class="visual-panel">
    <div class="brand">
      <div class="brand-mark">IPA</div>
      <div>
        <h1>IPA Self-Host</h1>
        <p>私人 iOS 应用源管理系统</p>
      </div>
    </div>
    <div class="showcase" aria-hidden="true">
      <div class="device">
        <div class="device-top"><span></span><span></span><span></span></div>
        <div class="device-row"></div>
        <div class="device-row" style="width:82%"></div>
        <div class="device-grid"><div class="device-card"></div><div class="device-card"></div><div class="device-card"></div></div>
      </div>
    </div>
    <div class="feature-list">
      <div class="feature"><b>TG 自动扫描</b><span>按白名单精准下载 IPA</span></div>
      <div class="feature"><b>私有源生成</b><span>Esign / AltStore 兼容</span></div>
      <div class="feature"><b>Bot 与日志</b><span>状态反馈更清楚</span></div>
    </div>
  </section>

  <section class="form-panel">
    <div class="login-box">
      <div class="eyebrow">Secure Console</div>
      <h2>欢迎回来</h2>
      <p class="sub">登录后管理 IPA 仓库、Telegram 来源和运行状态。</p>
      <div class="error-msg" id="error-msg"></div>
      <form id="login-form">
        <div class="field">
          <label for="username">用户名</label>
          <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" value="admin">
        </div>
        <div class="field">
          <label for="password">密码</label>
          <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
        </div>
        <button type="submit" class="login-btn" id="login-btn">登录控制台</button>
      </form>
      <div class="footnote">登录会话保存在浏览器 Cookie 中，默认 7 天有效。</div>
    </div>
  </section>
</main>

<script>
(function(){
  const form = document.getElementById('login-form');
  const username = document.getElementById('username');
  const password = document.getElementById('password');
  const error = document.getElementById('error-msg');
  const button = document.getElementById('login-btn');
  const defaultText = button.textContent;

  function showError(msg) {
    error.textContent = msg;
    error.classList.add('show');
  }
  function hideError() {
    error.classList.remove('show');
  }
  function setLoading(on) {
    button.disabled = on;
    button.textContent = on ? '登录中...' : defaultText;
  }

  form.addEventListener('submit', async e => {
    e.preventDefault();
    const user = username.value.trim();
    const pass = password.value;
    if (!user || !pass) {
      showError('请输入用户名和密码');
      return;
    }
    hideError();
    setLoading(true);
    try {
      const r = await fetch('/api/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ username: user, password: pass }),
      });
      const j = await r.json();
      if (!r.ok) {
        showError(j.error || '登录失败');
        setLoading(false);
        return;
      }
      window.location.href = '/';
    } catch (err) {
      showError('网络错误，请重试');
      setLoading(false);
    }
  });
})();
</script>
</body>
</html>
