<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark light">
<title>IPA Self-Host 控制台</title>
<link rel="icon" type="image/svg+xml" href="/static/brand-icon.svg">
<link rel="apple-touch-icon" href="/static/brand-icon.svg">
<script>
(function() {
  try {
    const mode = localStorage.getItem('ipa-theme-mode') || 'dark';
    const hour = new Date().getHours();
    const theme = mode === 'auto' ? ((hour >= 7 && hour < 19) ? 'light' : 'dark') : mode;
    document.documentElement.setAttribute('data-theme', theme === 'light' ? 'light' : 'dark');
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>
<script defer src="/static/vendor/alpine-3.13.5.min.js"></script>
<style>
  :root {
    color-scheme: dark;
    --bg:#0a0e14;
    --bg-2:#101722;
    --surface:rgba(18,25,38,.88);
    --panel:#141d2a;
    --panel-2:#192434;
    --line:#30405a;
    --line-2:#415273;
    --text:#f5f7fb;
    --text-2:#d8e1ee;
    --muted:#a6b3c8;
    --accent:#5b8cff;
    --accent-strong:#3d73f2;
    --accent-soft:rgba(91,140,255,.18);
    --good:#38c277;
    --good-soft:rgba(56,194,119,.16);
    --danger:#ff6b78;
    --danger-soft:rgba(255,107,120,.16);
    --input:#101824;
    --log-bg:#0c1420;
    --log-text:#dde7f5;
    --shadow:0 18px 44px rgba(0,0,0,.28);
  }
  [data-theme="light"] {
    color-scheme: light;
    --bg:#f3f6fb;
    --bg-2:#edf2f8;
    --surface:rgba(255,255,255,.9);
    --panel:#ffffff;
    --panel-2:#f7f9fc;
    --line:#d9e1ec;
    --line-2:#bac7da;
    --text:#111827;
    --text-2:#334155;
    --muted:#637188;
    --accent:#295cff;
    --accent-strong:#1f4fe8;
    --accent-soft:rgba(41,92,255,.12);
    --good:#15803d;
    --good-soft:rgba(21,128,61,.12);
    --danger:#dc2626;
    --danger-soft:rgba(220,38,38,.12);
    --input:#ffffff;
    --log-bg:#f8fafc;
    --log-text:#0f172a;
    --shadow:0 14px 36px rgba(15,23,42,.1);
  }

  * { box-sizing:border-box }
  [x-cloak] { display:none !important }
  html { min-height:100%; background:var(--bg); color:var(--text) }
  body {
    margin:0;
    min-height:100vh;
    color:var(--text);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;
    background:
      radial-gradient(circle at top right, var(--accent-soft), transparent 28%),
      linear-gradient(180deg, var(--bg), var(--bg-2));
  }
  button, input, select, textarea { font:inherit; color:inherit }
  button { border:0; cursor:pointer }
  button:disabled { cursor:not-allowed; opacity:.62 }
  a { color:var(--accent); text-decoration:none }
  a:hover { text-decoration:underline }

  .app-shell {
    min-height:100vh;
    padding:20px;
    display:grid;
    grid-template-columns:216px minmax(0, 1fr);
    grid-template-rows:auto 1fr;
    gap:14px;
    align-content:start;
  }
  .topbar,
  .sidebar,
  .panel {
    border:1px solid var(--line);
    background:var(--surface);
    backdrop-filter:blur(18px);
    box-shadow:var(--shadow);
  }
  .topbar {
    grid-column:2;
    grid-row:1;
    position:sticky;
    top:12px;
    z-index:20;
    border-radius:22px;
    padding:14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
  }
  .brand {
    display:flex;
    align-items:center;
    gap:12px;
    min-width:220px;
  }
  .brand-mark {
    width:44px;
    height:44px;
    border-radius:14px;
    display:block;
    object-fit:cover;
    background:var(--accent);
    box-shadow:0 12px 28px var(--accent-soft);
  }
  .brand h1 {
    margin:0;
    font-size:16px;
    line-height:1.1;
  }
  .brand span {
    display:block;
    margin-top:4px;
    color:var(--muted);
    font-size:12px;
  }
  .header-actions {
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:10px;
    flex-wrap:wrap;
  }
  .theme-switch,
  .tabs {
    display:inline-flex;
    align-items:center;
    gap:4px;
    padding:4px;
    border:1px solid var(--line);
    border-radius:14px;
    background:var(--panel);
  }
  .theme-switch button,
  .tabs button {
    min-height:34px;
    border-radius:10px;
    padding:0 12px;
    background:transparent;
    color:var(--muted);
    white-space:nowrap;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:background .18s ease, color .18s ease, transform .18s ease;
  }
  .theme-switch button:hover,
  .tabs button:hover {
    color:var(--text);
    background:var(--panel-2);
  }
  .theme-switch button.active,
  .tabs button.active {
    color:#fff;
    background:linear-gradient(135deg, var(--accent), var(--accent-strong));
  }
  .btn {
    min-height:38px;
    padding:0 14px;
    border-radius:12px;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--text);
    transition:transform .18s ease, border-color .18s ease, background .18s ease;
  }
  .btn:hover {
    transform:translateY(-1px);
    border-color:var(--line-2);
  }
  .btn.primary {
    border-color:transparent;
    color:#fff;
    background:linear-gradient(135deg, var(--accent), var(--accent-strong));
  }
  .btn.danger {
    color:var(--danger);
    background:var(--danger-soft);
    border-color:rgba(255,107,120,.24);
  }
  .btn.danger:hover {
    background:var(--danger);
    color:#fff;
    border-color:var(--danger);
  }
  .btn.ghost {
    background:transparent;
    box-shadow:none;
  }
  .btn.sm {
    min-height:30px;
    padding:0 10px;
    border-radius:10px;
    font-size:12px;
  }
  .btn.icon {
    width:32px;
    padding:0;
    display:grid;
    place-items:center;
  }
  .btn.icon.sm { width:30px; }
  .btn.icon svg { display:block }
  .btn.danger.icon {
    color:var(--danger);
  }
  .btn.danger.icon:hover svg { color:#fff }
  .btn.icon.star { color:var(--muted); }
  .btn.icon.star.active { color:#f4b740; border-color:rgba(244,183,64,.45); background:rgba(244,183,64,.12); }

  .sidebar {
    grid-column:1;
    grid-row:1 / span 2;
    position:sticky;
    top:20px;
    align-self:start;
    min-height:calc(100vh - 40px);
    border-radius:22px;
    padding:16px;
    display:flex;
    flex-direction:column;
    gap:22px;
  }
  .side-brand {
    display:flex;
    align-items:center;
    gap:12px;
    padding:2px 2px 14px;
    border-bottom:1px solid var(--line);
  }
  .side-brand strong {
    display:block;
    font-size:15px;
    line-height:1.2;
  }
  .side-brand span {
    display:block;
    margin-top:4px;
    color:var(--muted);
    font-size:12px;
  }
  .top-title {
    min-width:160px;
  }
  .top-title h1 {
    margin:0;
    font-size:16px;
    line-height:1.1;
  }
  .top-title span {
    display:block;
    margin-top:4px;
    color:var(--muted);
    font-size:12px;
  }
  .tabs {
    width:100%;
    overflow:visible;
    padding:0;
    border:0;
    background:transparent;
    flex-direction:column;
    gap:8px;
  }
  .tabs button {
    width:100%;
    min-height:44px;
    justify-content:flex-start;
    padding:0 14px;
  }
  .tabs button.active {
    box-shadow:0 12px 24px var(--accent-soft);
  }

  .view {
    grid-column:2;
    grid-row:2;
    min-width:0;
    width:min(1180px, 100%);
    margin:0 auto;
    animation:viewIn .18s ease both;
  }
  .apps-view {
    width:min(1120px, 100%);
  }
  .panel {
    border-radius:22px;
    overflow:hidden;
  }
  .apps-panel {
    overflow:visible;
  }
  .apps-panel .panel-body {
    position:relative;
  }
  .panel-head {
    padding:16px 18px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .head-block h2 {
    margin:0;
    font-size:16px;
    line-height:1.2;
  }
  .head-block span {
    display:block;
    margin-top:4px;
    color:var(--muted);
    font-size:12px;
  }
  .panel-body { padding:16px 18px 18px }

  .head-actions {
    display:flex;
    align-items:center;
    gap:8px;
    flex:0 1 auto;
    min-width:0;
  }
  .head-actions.wl { flex:1 1 460px; max-width:560px }
  .head-input {
    min-width:140px;
    height:30px;
    padding:4px 10px;
    font-size:12px;
    border-radius:8px;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--text);
    transition:border-color .15s ease, box-shadow .15s ease;
  }
  .head-input:focus {
    outline:none;
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(91,140,255,.16);
  }
  .head-actions.wl .head-input:first-child { flex:0 0 110px; min-width:0 }
  .head-actions.wl .head-input:nth-child(2) { flex:1 1 0; min-width:0 }
  @media (max-width: 760px) {
    .panel-head { flex-wrap:wrap }
    .head-actions, .head-actions.wl { width:100%; flex:1 1 100% }
    .head-actions.wl .head-input:first-child { flex:0 0 100px }
  }

  .group-chips {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .group-chip {
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:5px 8px 5px 6px;
    border:1px solid var(--line);
    border-radius:999px;
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    transition:border-color .15s ease, box-shadow .15s ease, transform .15s ease;
    max-width:100%;
  }
  .group-chip:hover {
    border-color:var(--line-2);
    box-shadow:0 4px 14px rgba(0,0,0,.08);
    transform:translateY(-1px);
  }
  .group-chip.prio {
    border-color:rgba(91,140,255,.45);
    background:linear-gradient(180deg, rgba(91,140,255,.12), rgba(91,140,255,.04));
  }
  .chip-star {
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:22px; height:22px;
    padding:0;
    border-radius:50%;
    background:transparent;
    color:var(--muted);
    border:0;
    min-height:0;
  }
  .chip-star:hover { color:var(--accent) }
  .chip-star.active { color:#f5b400 }
  .chip-link {
    font-size:12.5px;
    color:var(--text);
    text-decoration:none;
    max-width:200px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .chip-link:hover { color:var(--accent) }
  .chip-del {
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:20px; height:20px;
    padding:0;
    border-radius:50%;
    background:transparent;
    color:var(--muted);
    border:0;
    font-size:14px;
    line-height:1;
    min-height:0;
    transition:background .15s ease, color .15s ease;
  }
  .chip-del:hover { background:rgba(255,69,58,.14); color:var(--danger) }

  /* APP 同步按钮组 */
  .sync-cluster { gap:8px; align-items:center }
  .sync-pill {
    display:inline-flex;
    align-items:center;
    gap:6px;
    height:28px;
    padding:0 10px 0 9px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--panel-2);
    color:var(--muted);
    font-size:11.5px;
    line-height:1;
    white-space:nowrap;
    transition:border-color .18s ease, color .18s ease, background .18s ease;
  }
  .sync-pill.is-busy { color:var(--accent); border-color:rgba(91,140,255,.4); background:rgba(91,140,255,.08) }
  .sync-pill.is-ok { color:#22a06b; border-color:rgba(34,160,107,.35); background:rgba(34,160,107,.08) }
  .sync-pill.is-err { color:var(--danger); border-color:rgba(255,69,58,.4); background:rgba(255,69,58,.08) }
  .sync-pill .dot { width:6px; height:6px; border-radius:50%; background:currentColor; opacity:.7 }
  .sync-pill.is-busy .dot { animation:pulse-dot 1s ease-in-out infinite }
  @keyframes pulse-dot {
    0%,100% { transform:scale(1); opacity:.5 }
    50%     { transform:scale(1.35); opacity:1 }
  }

  .btn.icon.spin svg { animation:spin-rev .9s linear infinite }
  @keyframes spin-rev { from { transform:rotate(0) } to { transform:rotate(-360deg) } }

  .pulse-btn { display:inline-flex; align-items:center; gap:6px; position:relative; overflow:hidden }
  .pulse-btn.loading { opacity:.85 }
  .pulse-btn .spinner {
    width:12px; height:12px; border-radius:50%;
    border:2px solid currentColor;
    border-right-color:transparent;
    animation:spin .7s linear infinite;
  }
  @keyframes spin { to { transform:rotate(360deg) } }

  /* 面板顶部进度条带（indeterminate） */
  .topbar-progress {
    position:relative;
    height:2px;
    margin:-1px -18px 12px;
    overflow:hidden;
    background:rgba(91,140,255,.10);
  }
  .topbar-progress span {
    position:absolute; inset:0;
    width:35%;
    background:linear-gradient(90deg, transparent, var(--accent), transparent);
    animation:topbar-slide 1.2s ease-in-out infinite;
  }
  @keyframes topbar-slide {
    0%   { left:-40% }
    100% { left:100% }
  }

  input,
  select,
  textarea {
    width:100%;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:12px;
    background:var(--input);
    color:var(--text);
    outline:none;
    transition:border-color .18s ease, box-shadow .18s ease;
  }
  input:focus,
  select:focus,
  textarea:focus {
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft);
  }
  input::placeholder,
  textarea::placeholder { color:var(--muted) }
  .password-wrap {
    position:relative;
  }
  .password-wrap input {
    padding-right:46px;
  }
  .eye-btn {
    position:absolute;
    right:8px;
    top:50%;
    width:34px;
    height:34px;
    border-radius:10px;
    display:grid;
    place-items:center;
    color:var(--muted);
    background:transparent;
    transform:translateY(-50%);
    transition:background .18s ease, color .18s ease, transform .18s ease;
  }
  .eye-btn:hover {
    color:var(--text);
    background:var(--panel-2);
    transform:translateY(-50%) scale(1.02);
  }
  .eye-btn svg {
    width:18px;
    height:18px;
    fill:none;
    stroke:currentColor;
    stroke-width:1.8;
    stroke-linecap:round;
    stroke-linejoin:round;
  }

  .toolbar {
    display:grid;
    grid-template-columns:minmax(220px,1fr) auto;
    gap:10px;
    align-items:center;
    margin-bottom:14px;
  }
  .search {
    position:relative;
  }
  .search:before {
    content:"⌕";
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    color:var(--muted);
    font-size:17px;
  }
  .search input { padding-left:34px }

  .app-list {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:14px;
    align-items:start;
    overflow:visible;
  }
  .app-row {
    position:relative;
    border:1px solid var(--line);
    border-radius:20px;
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    overflow:visible;
    min-height:190px;
    transition:border-color .18s ease, transform .18s ease, box-shadow .18s ease;
  }
  .app-row.expanded {
    z-index:30;
    border-color:var(--accent);
    box-shadow:0 18px 40px rgba(0,0,0,.22);
  }
  .app-row:hover {
    transform:translateY(-2px);
    border-color:var(--line-2);
    box-shadow:0 16px 34px rgba(0,0,0,.16);
  }
  .app-main {
    width:100%;
    padding:16px;
    background:transparent;
    display:grid;
    grid-template-columns:58px minmax(0,1fr) auto;
    grid-template-areas:
      "icon info chev"
      "meta meta meta";
    gap:12px 14px;
    align-items:start;
    text-align:left;
  }
  .app-icon {
    grid-area:icon;
    width:58px;
    height:58px;
    border-radius:16px;
    overflow:hidden;
    display:grid;
    place-items:center;
    flex-shrink:0;
    font-weight:800;
    color:var(--accent);
    background:var(--accent-soft);
    border:1px solid var(--line);
  }
  .app-icon img {
    width:100%;
    height:100%;
    object-fit:cover;
  }
  .app-icon.missing {
    background:transparent;
    border-style:dashed;
  }
  .app-info {
    grid-area:info;
    min-width:0;
    padding-top:2px;
  }
  .app-info h3 {
    margin:0;
    font-size:16px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .app-info p {
    margin:5px 0 0;
    color:var(--muted);
    font-size:13px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .app-info .app-desc {
    color:var(--text-2);
  }
  .app-meta-line {
    display:block;
    margin-top:6px;
    color:var(--muted);
    font-size:12px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .app-pill,
  .app-time {
    color:var(--text-2);
    font-size:12px;
    white-space:nowrap;
  }
  .app-pill {
    padding:6px 10px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--panel);
  }
  .app-card-meta {
    grid-area:meta;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-top:4px;
  }
  .app-card-meta-left {
    display:flex;
    align-items:center;
    gap:8px;
    min-width:0;
  }
  .chev {
    grid-area:chev;
    justify-self:end;
    color:var(--muted);
    font-size:18px;
    transition:transform .18s ease;
  }
  .chev.open { transform:rotate(90deg) }
  .version-list {
    position:absolute;
    left:12px;
    right:12px;
    top:calc(100% - 8px);
    z-index:12;
    max-height:0;
    opacity:0;
    pointer-events:none;
    transform:translateY(-6px) scale(.99);
    overflow:hidden;
    border:1px solid var(--line);
    border-radius:16px;
    background:var(--panel);
    box-shadow:0 18px 38px rgba(0,0,0,.24);
    transition:max-height .22s ease, opacity .18s ease, transform .18s ease;
  }
  .version-list.open {
    max-height:min(380px, 55vh);
    opacity:1;
    pointer-events:auto;
    transform:translateY(0) scale(1);
    overflow:auto;
  }
  .version-row {
    display:grid;
    grid-template-columns:minmax(0,1fr) auto;
    gap:12px;
    align-items:start;
    padding:12px 16px 14px;
    border-top:1px solid var(--line);
    font-size:12px;
  }
  .version-row:first-child {
    border-top:0;
  }
  .version-row.invalid {
    background:var(--danger-soft);
  }
  .version-row .ver {
    font-weight:800;
    color:var(--text);
  }
  .version-row .file {
    display:block;
    margin-top:3px;
    min-width:0;
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .version-title,
  .version-actions {
    display:flex;
    align-items:center;
    gap:8px;
  }
  .version-actions {
    justify-content:flex-end;
    flex-wrap:wrap;
  }
  .bad-badge {
    padding:2px 7px;
    border-radius:999px;
    color:var(--danger);
    background:var(--danger-soft);
    border:1px solid rgba(255,107,120,.24);
    font-size:11px;
    line-height:1.4;
  }
  .bad-badge.warn {
    color:var(--accent);
    background:var(--accent-soft);
    border-color:rgba(91,140,255,.24);
  }

  .grid {
    display:grid;
    gap:14px;
  }
  .grid.two {
    grid-template-columns:repeat(2, minmax(0,1fr));
  }
  .grid.rules {
    grid-template-columns:1fr;
    align-items:start;
  }
  @media (max-width: 900px) {
    .grid.rules {
      grid-template-columns:1fr;
    }
  }
  .list { display:flex; flex-direction:column }
  .list-row {
    display:grid;
    grid-template-columns:auto minmax(0,1fr) auto;
    gap:10px;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid var(--line);
  }
  .list-row:last-child { border-bottom:0 }
  .grow {
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .muted { color:var(--muted) }
  .addbar {
    display:grid;
    grid-template-columns:minmax(0,1fr) auto;
    gap:10px;
    margin-top:14px;
  }
  .addbar.three {
    grid-template-columns:minmax(130px,.9fr) minmax(0,1.4fr) auto;
  }
  .whitelist-grid {
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:12px;
  }
  .whitelist-item {
    position:relative;
    padding:14px 14px 14px 18px;
    border:1px solid var(--line);
    border-radius:14px;
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    overflow:hidden;
    transition:border-color .18s ease, box-shadow .18s ease, transform .18s ease;
  }
  .whitelist-item::before {
    content:"";
    position:absolute;
    left:0; top:14px; bottom:14px; width:3px;
    border-radius:3px;
    background:linear-gradient(180deg, var(--accent), rgba(91,140,255,.35));
    opacity:.55;
    transition:opacity .18s ease;
  }
  .whitelist-item:hover::before { opacity:.9 }
  .whitelist-item:hover {
    border-color:var(--line-2);
    box-shadow:0 8px 20px rgba(0,0,0,.10);
    transform:translateY(-1px);
  }
  .whitelist-top {
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }
  .whitelist-top b {
    font-size:14px;
    color:var(--text);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .kw-count {
    display:inline-block;
    margin-left:8px;
    padding:1px 8px;
    font-size:11px;
    line-height:1.5;
    color:var(--muted);
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:999px;
    vertical-align:middle;
  }
  .tag-cloud {
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:10px;
  }
  .tag {
    display:inline-flex;
    align-items:center;
    gap:4px;
    padding:3px 9px 3px 10px;
    border-radius:999px;
    border:1px solid transparent;
    background:var(--accent-soft);
    color:var(--text);
    font-size:12px;
    line-height:1.6;
    transition:background .15s ease, color .15s ease;
  }
  .tag:hover {
    background:rgba(91,140,255,.28);
  }
  .tag button {
    padding:0 0 0 2px;
    background:transparent;
    color:var(--muted);
    font-size:14px;
    line-height:1;
    min-height:0;
    border:0;
  }
  .tag button:hover { color:var(--danger) }
  .inline-add {
    width:auto;
    min-width:140px;
    max-width:220px;
    padding:4px 10px;
    min-height:28px;
    border-radius:999px;
    font-size:12px;
    background:transparent;
    border:1px dashed var(--line);
  }

  .field { display:grid; gap:6px }
  .field + .field { margin-top:12px }
  .field label,
  .mini-label {
    color:var(--muted);
    font-size:12px;
  }
  .grid3 {
    display:grid;
    grid-template-columns:repeat(3, minmax(0,1fr));
    gap:10px;
  }
  .actions {
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-top:14px;
  }
  .checkline {
    display:inline-flex;
    align-items:center;
    gap:7px;
    color:var(--muted);
    font-size:12px;
    white-space:nowrap;
  }
  .checkline input {
    width:auto;
    margin:0;
  }
  .status-line {
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
    font-size:13px;
  }
  .dot {
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--muted);
  }
  .dot.on { background:var(--good) }
  .code {
    display:inline-block;
    padding:4px 8px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--panel);
    font:12px/1.3 Menlo,Monaco,monospace;
  }
  .result-box {
    margin-top:14px;
    padding:12px 14px;
    border-radius:14px;
    border:1px solid var(--line);
    background:var(--panel);
    font-size:13px;
  }
  .result-box.ok { border-color:rgba(56,194,119,.28) }
  .result-box.err { border-color:rgba(255,107,120,.28) }
  .preset-grid {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
  }
  .preset-grid .active {
    color:var(--accent);
    border-color:var(--accent);
    background:var(--accent-soft);
  }

  .log-tools {
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .log-tools select {
    width:auto;
    min-width:126px;
  }
  pre.log {
    margin:0;
    min-height:460px;
    max-height:68vh;
    overflow:auto;
    padding:16px 18px;
    background:var(--log-bg);
    color:var(--log-text);
    border-top:1px solid var(--line);
    font:12px/1.6 Menlo,Monaco,Consolas,monospace;
    white-space:pre-wrap;
  }

  .empty {
    min-height:120px;
    display:grid;
    place-items:center;
    text-align:center;
    color:var(--muted);
    border:1px dashed var(--line);
    border-radius:18px;
    background:rgba(127,127,127,.04);
  }
  .empty strong {
    display:block;
    margin-bottom:4px;
    color:var(--text);
  }
  .skeleton-grid {
    display:grid;
    gap:10px;
  }
  .skeleton {
    height:78px;
    border-radius:16px;
    background:linear-gradient(90deg, var(--panel), var(--panel-2), var(--panel));
    background-size:240% 100%;
    animation:shimmer 1.2s linear infinite;
  }
  .toast {
    position:fixed;
    top:88px;
    right:20px;
    z-index:99;
    max-width:360px;
    padding:12px 14px;
    border-radius:14px;
    border:1px solid var(--line);
    background:var(--panel);
    box-shadow:var(--shadow);
    animation:toastIn .18s ease both;
  }
  .toast.ok { border-color:rgba(56,194,119,.28) }
  .toast.err {
    color:var(--danger);
    border-color:rgba(255,107,120,.28);
  }

  @keyframes viewIn {
    from { opacity:0; transform:translateY(6px) }
    to { opacity:1; transform:translateY(0) }
  }
  @keyframes toastIn {
    from { opacity:0; transform:translateY(-6px) }
    to { opacity:1; transform:translateY(0) }
  }
  @keyframes shimmer {
    to { background-position:-240% 0 }
  }
  @media (prefers-reduced-motion:reduce) {
    *, *:before, *:after {
      animation-duration:.01ms !important;
      animation-iteration-count:1 !important;
      transition-duration:.01ms !important;
    }
  }
  @media (max-width:1080px) {
    .app-shell {
      grid-template-columns:196px minmax(0, 1fr);
    }
    .grid.two {
      grid-template-columns:1fr;
    }
  }
  @media (max-width:820px) {
    .app-shell {
      grid-template-columns:1fr;
      grid-template-rows:auto auto 1fr;
    }
    .sidebar,
    .topbar,
    .view {
      grid-column:1;
    }
    .sidebar {
      grid-row:2;
      position:relative;
      top:0;
      min-height:auto;
      padding:10px;
      justify-content:flex-start;
      border-radius:18px;
    }
    .side-brand {
      display:none;
    }
    .topbar {
      grid-row:1;
    }
    .view {
      grid-row:3;
    }
    .tabs {
      flex-direction:row;
      overflow:auto;
      gap:6px;
    }
    .tabs button {
      width:auto;
      justify-content:center;
    }
    .toolbar,
    .grid3,
    .addbar,
    .addbar.three {
      grid-template-columns:1fr;
    }
    .app-list {
      grid-template-columns:1fr;
    }
    .app-main {
      grid-template-columns:54px minmax(0,1fr) auto;
    }
    .app-icon {
      width:54px;
      height:54px;
    }
    .version-row {
      grid-template-columns:1fr;
    }
    .version-row .file {
      grid-column:auto;
      grid-row:auto;
    }
    .version-row .time {
      color:var(--muted);
    }
    .version-actions {
      justify-content:flex-start;
    }
  }
  @media (max-width:720px) {
    .app-shell { padding:12px }
    .topbar {
      position:relative;
      top:0;
      border-radius:18px;
      align-items:flex-start;
      flex-direction:column;
    }
    .header-actions {
      width:100%;
      justify-content:space-between;
    }
    .sidebar,
    .panel {
      border-radius:18px;
    }
    .toast {
      top:auto;
      right:12px;
      left:12px;
      bottom:12px;
      max-width:none;
    }
  }
</style>
</head>
<body>
<div class="app-shell" x-data="ipaApp()" x-init="init()">
  <aside class="sidebar">
    <div class="side-brand">
      <img class="brand-mark" src="/static/brand-icon.svg" alt="">
      <div>
        <strong>IPA Self-Host</strong>
        <span x-text="workspaceLabel()"></span>
      </div>
    </div>
    <nav class="tabs" aria-label="工作区">
      <template x-for="w in workspaces" :key="w.id">
        <button type="button" :class="{active:workspace===w.id}" @click="setWorkspace(w.id)" x-text="w.name"></button>
      </template>
    </nav>
  </aside>

  <header class="topbar">
    <div class="top-title">
      <h1 x-text="workspaceLabel()"></h1>
      <span>IPA 私有源管理</span>
    </div>
    <div class="header-actions">
      <div class="theme-switch" aria-label="主题切换">
        <button type="button" :class="{active:themeMode==='dark'}" @click="setTheme('dark')" title="深色">☾</button>
        <button type="button" :class="{active:themeMode==='light'}" @click="setTheme('light')" title="浅色">☀</button>
        <button type="button" :class="{active:themeMode==='auto'}" @click="setTheme('auto')" title="自动">A</button>
      </div>
      <button type="button" class="btn" @click="loadAll()">刷新</button>
      <button type="button" class="btn primary" @click="triggerScan()" :disabled="scanning" x-text="scanning ? '扫描中' : '扫描'"></button>
      <button type="button" class="btn ghost" @click="logout()">退出</button>
    </div>
  </header>

  <section class="view apps-view" x-show="workspace==='apps'" x-cloak x-transition.opacity.duration.150ms>
    <div class="panel apps-panel">
      <div class="panel-head">
        <div class="head-block">
          <h2>APP</h2>
          <span x-text="appSearch ? '筛选中' : appsSummary()"></span>
        </div>
        <button type="button" class="btn sm primary pulse-btn" @click="reindexNow()" :disabled="reindexing" :class="{loading:reindexing}" title="重新扫描磁盘并重建 IPA 元信息缓存">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" x-show="!reindexing"><path d="M3 12a9 9 0 0 1 15.5-6.3L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15.5 6.3L3 16"/><path d="M3 21v-5h5"/></svg>
          <span class="spinner" x-show="reindexing" x-cloak aria-hidden="true"></span>
          <span x-text="reindexing ? '索引中…' : '重建索引'"></span>
        </button>
      </div>
      <div class="panel-body">
        <div class="topbar-progress" x-show="reindexing" x-cloak><span></span></div>
        <div class="toolbar">
          <div class="search"><input x-model="appSearch" placeholder="搜索 APP / 文件 / 版本"></div>
          <select x-model="appSort">
            <option value="recent">最近更新</option>
            <option value="name">名称</option>
            <option value="count">版本数</option>
          </select>
        </div>

        <div class="skeleton-grid" x-show="loading" x-cloak>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>

        <template x-if="!loading && !filteredApps().length">
          <div class="empty">
            <div>
              <strong>没有匹配内容</strong>
              <span>换个关键词，或先执行一次扫描。</span>
            </div>
          </div>
        </template>

        <div class="app-list" x-show="!loading && filteredApps().length" x-cloak>
          <template x-for="app in filteredApps()" :key="app.name">
            <article class="app-row" :class="{expanded:app.expanded}">
              <button type="button" class="app-main" @click="toggleApp(app)">
                <div class="app-icon" :class="{missing: !appIconSrc(app)}">
                  <template x-if="appIconSrc(app)">
                    <img :src="appIconSrc(app)" @error="handleIconError($event, app)" alt="">
                  </template>
                </div>
                <div class="app-info">
                  <h3 x-text="app.name"></h3>
                  <p class="app-desc" x-text="app.description" x-show="!app.expanded"></p>
                  <span class="app-meta-line" x-text="appSummary(app)" x-show="!app.expanded"></span>
                </div>
                <div class="app-card-meta">
                  <div class="app-card-meta-left">
                    <span class="app-time" x-text="app.versions[0]?.mtime_str || '-'"></span>
                  </div>
                </div>
                <span class="chev" :class="{open:app.expanded}">›</span>
              </button>
              <div class="version-list" :class="{open:app.expanded}">
                <template x-for="v in app.versions" :key="v.filename">
                  <div class="version-row" :class="{invalid:v.scan_status==='invalid'}">
                    <div class="version-info">
                      <div class="version-title">
                        <span class="ver" x-text="versionLabel(v)"></span>
                        <span class="bad-badge" x-show="v.scan_status==='invalid'" x-cloak>损坏</span>
                        <span class="bad-badge warn" x-show="v.scan_status==='unscanned'" x-cloak>未入库</span>
                      </div>
                    </div>
                    <div class="version-actions">
                      <button type="button" class="btn sm icon" @click.stop="downloadIpa(v)" :disabled="v.downloadable===false" title="下载" aria-label="下载">
                        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 4v12"/><path d="m6 12 6 6 6-6"/><path d="M5 20h14"/></svg>
                      </button>
                      <template x-if="v.protected">
                        <span class="btn sm icon" title="受保护文件，禁止删除" aria-label="受保护" style="cursor:not-allowed;opacity:.55;">
                          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
                        </span>
                      </template>
                      <template x-if="!v.protected">
                        <button type="button" class="btn danger sm icon" @click.stop="delIpaSingle(v.filename)" title="删除" aria-label="删除">
                          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 7h16"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M6 7l1 12a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-12"/><path d="M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </article>
          </template>
        </div>
      </div>
    </div>
  </section>

  <section class="view" x-show="workspace==='rules'" x-cloak x-transition.opacity.duration.150ms>
    <div class="grid rules">
      <div class="panel">
        <div class="panel-head">
          <div class="head-block">
            <h2>群组</h2>
            <span x-text="(cfg.groups || []).length + ' 个来源 · ' + (cfg.priority_groups || []).length + ' 优先'"></span>
          </div>
          <div class="head-actions">
            <input class="head-input" x-model="newGroup" placeholder="https://t.me/xxx" @keydown.enter.prevent="addGroup()">
            <button type="button" class="btn primary sm icon" @click="addGroup()" title="添加群组" aria-label="添加群组">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            </button>
          </div>
        </div>
        <div class="panel-body">
          <template x-if="!cfg.groups || !cfg.groups.length">
            <div class="empty">
              <div>
                <strong>还没有群组</strong>
                <span>添加 `t.me` 链接后即可扫描。</span>
              </div>
            </div>
          </template>
          <div class="group-chips" x-show="cfg.groups && cfg.groups.length" x-cloak>
            <template x-for="g in (cfg.groups || [])" :key="g">
              <div class="group-chip" :class="{prio:(cfg.priority_groups || []).includes(g)}">
                <button
                  type="button"
                  class="chip-star"
                  :class="{active:(cfg.priority_groups || []).includes(g)}"
                  @click="togglePriority(g)"
                  :title="(cfg.priority_groups || []).includes(g) ? '取消优先' : '设为优先'"
                  :aria-label="(cfg.priority_groups || []).includes(g) ? '取消优先' : '设为优先'">
                  <svg viewBox="0 0 24 24" width="14" height="14" :fill="(cfg.priority_groups || []).includes(g) ? 'currentColor' : 'none'" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                </button>
                <a class="chip-link" :href="g" target="_blank" x-text="groupLabel(g)" :title="g"></a>
                <button type="button" class="chip-del" @click="delGroup(g)" title="移除" aria-label="移除">×</button>
              </div>
            </template>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="head-block">
            <h2>白名单</h2>
            <span x-text="(cfg.whitelist || []).length + ' 个 APP · ' + whitelistKeywordTotal() + ' 个关键词'"></span>
          </div>
          <div class="head-actions wl">
            <input class="head-input" x-model="newApp.name" placeholder="应用名">
            <input class="head-input" x-model="newApp.keywords" placeholder="关键词 1, 关键词 2">
            <button type="button" class="btn primary sm icon" @click="addApp()" title="添加白名单" aria-label="添加白名单">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
            </button>
          </div>
        </div>
        <div class="panel-body">
          <template x-if="!cfg.whitelist || !cfg.whitelist.length">
            <div class="empty">
              <div>
                <strong>还没有规则</strong>
                <span>应用名和关键词会一起参与筛选。</span>
              </div>
            </div>
          </template>
          <div class="whitelist-grid" x-show="cfg.whitelist && cfg.whitelist.length" x-cloak>
            <template x-for="app in (cfg.whitelist || [])" :key="app.name">
              <div class="whitelist-item">
                <div class="whitelist-top">
                  <div class="grow">
                    <b x-text="app.name"></b>
                    <span class="kw-count" x-text="app.keywords.length + ' 词'"></span>
                  </div>
                  <button type="button" class="btn danger sm icon" @click="delApp(app.name)" title="删除" aria-label="删除">
                    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 7h16"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M6 7l1 12a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-12"/><path d="M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
                  </button>
                </div>
                <div class="tag-cloud">
                  <template x-for="(k,i) in app.keywords" :key="k">
                    <span class="tag"><span x-text="k"></span><button type="button" @click="delKeyword(app,i)">×</button></span>
                  </template>
                  <input class="inline-add" x-model="newKw[app.name]" placeholder="+ 关键词" @keydown.enter.prevent="addKeyword(app)">
                </div>
              </div>
            </template>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="view" x-show="workspace==='ops'" x-cloak x-transition.opacity.duration.150ms>
    <div class="grid two">
      <div class="panel">
        <div class="panel-head">
          <div class="head-block">
            <h2>扫描</h2>
            <span x-text="'每日 ' + (cfg.rate_limit?.max_per_day || 30) + ' 次'"></span>
          </div>
        </div>
        <div class="panel-body">
          <div class="grid3">
            <div class="field">
              <label>每日最多</label>
              <input type="number" x-model.number="cfg.rate_limit.max_per_day" min="1">
            </div>
            <div class="field">
              <label>最小间隔</label>
              <input type="number" x-model.number="cfg.rate_limit.min_interval_sec" min="1">
            </div>
            <div class="field">
              <label>最大间隔</label>

            在客户端（轻松签 / 全能签 / AltStore）添加此地址即可订阅 IPA 源。点击复制按钮一键获取。

            <button type="button" class="btn" @click="testProxy()" :disabled="proxyTesting" x-text="proxyTesting ? '测试中' : '测试'"></button>

            <template x-if="proxyTestResult">

                    <div>Google: <span x-text="proxyTestResult.tests.google_via_proxy?.ok ? '✓ ' + proxyTestResult.tests.google_via_proxy?.latency_ms + 'ms' : '✗'"></span></div>
                    <div>直连 TG: <span x-text="proxyTestResult.tests.telegram_direct?.ok ? '✓ ' + proxyTestResult.tests.telegram_direct?.latency_ms + 'ms' : '✗'"></span></div>

              <button type="button" class="eye-btn" @click="account.showNewPassword=!account.showNewPassword" :aria-label="account.showNewPassword ? '隐藏密码' : '显示密码'" :title="account.showNewPassword ? '隐藏密码' : '显示密码'">
                <svg x-show="!account.showNewPassword" x-cloak viewBox="0 0 24 24"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path><circle cx="12" cy="12" r="2.8"></circle></svg>
                <svg x-show="account.showNewPassword" x-cloak viewBox="0 0 24 24"><path d="M10.6 5.2A10.7 10.7 0 0 1 12 5c6 0 9.5 7 9.5 7a15.2 15.2 0 0 1-3.1 3.8"></path><path d="M14.1 14.2A3 3 0 0 1 9.8 9.9"></path><path d="M3 3l18 18"></path><path d="M6.6 6.7C3.8 8.6 2.5 12 2.5 12s3.5 7 9.5 7c1.5 0 2.9-.4 4.1-1"></path></svg>
              </button>

            <div class="password-wrap">

              <button type="button" class="eye-btn" @click="account.showConfirmPassword=!account.showConfirmPassword" :aria-label="account.showConfirmPassword ? '隐藏密码' : '显示密码'" :title="account.showConfirmPassword ? '隐藏密码' : '显示密码'">
                <svg x-show="!account.showConfirmPassword" x-cloak viewBox="0 0 24 24"><path d="M2.5 12s3.5-6 9.5-6 9.5 6 9.5 6-3.5 6-9.5 6-9.5-6-9.5-6Z"></path><circle cx="12" cy="12" r="2.8"></circle></svg>
                <svg x-show="account.showConfirmPassword" x-cloak viewBox="0 0 24 24"><path d="M10.6 5.2A10.7 10.7 0 0 1 12 5c6 0 9.5 7 9.5 7a15.2 15.2 0 0 1-3.1 3.8"></path><path d="M14.1 14.2A3 3 0 0 1 9.8 9.9"></path><path d="M3 3l18 18"></path><path d="M6.6 6.7C3.8 8.6 2.5 12 2.5 12s3.5 7 9.5 7c1.5 0 2.9-.4 4.1-1"></path></svg>
              </button>
            </div>

  <section class="view" x-show="workspace==='logs'" x-cloak x-transition.opacity.duration.150ms>

          <h2>日志</h2>
          <span x-text="autoRefresh ? '自动刷新' : '手动刷新'"></span>
        </div>
        <div class="log-tools">
          <select x-model="logName" @change="loadLog()">
            <option value="tg-cron">TG 扫描</option>
            <option value="scanner">仓库扫描</option>
            <option value="nginx-error">Nginx 错误</option>
          </select>
          <button type="button" class="btn sm" @click="loadLog()">刷新</button>
          <label class="checkline"><input type="checkbox" x-model="autoRefresh"> 自动刷新</label>
        </div>
      </div>
      <pre class="log" x-text="logContent || '(空)'"></pre>
    </div>
  </section>

  <div x-show="toast.msg" x-cloak x-transition class="toast" :class="toast.type" @click="toast.msg=''" x-text="toast.msg"></div>
</div>

<script>
const APP_DESC = {
  '小红书': '笔记、攻略、本地生活。',
  'YouTube': '视频、订阅、播放列表。',
  'YouTube Music': '音乐、歌单、播客。',
  '哔哩哔哩': '番剧、视频、直播。',
  'Spotify': '音乐、歌单、播客。',
  '高德地图': '路线、导航、实时路况。',
  '百度地图': '路线、公交、位置搜索。',
  '闲鱼': '二手交易和闲置转让。',
  'Swiftgram': 'Telegram 第三方客户端。',
  'Infuse': '本地和网络视频播放器。',
  '知乎': '问答、讨论、知识社区。',
  'PiliPlus': '清爽的哔哩哔哩第三方客户端。',
  '抖音': '短视频、直播、创作。',
  'Facebook': '社交动态和好友联系。',
  'X': '实时信息和社交讨论。',
  'Shadowrocket': 'iOS 网络代理工具。',
  'Bit远控助手': '远程控制工具。',
};

function describeApp(name) {
  const n = String(name || '').trim();
  if (APP_DESC[n]) return APP_DESC[n];
  const lower = n.toLowerCase();
  if (lower.includes('pili')) return APP_DESC.PiliPlus;
  if (lower.includes('youtube')) return APP_DESC.YouTube;
  if (lower.includes('bili')) return APP_DESC['哔哩哔哩'];
  return 'iOS 应用安装包。';
}

function normalizeThemeMode(mode) {
  return ['dark', 'light', 'auto'].includes(mode) ? mode : 'dark';
}

function resolveTheme(mode) {
  const next = normalizeThemeMode(mode);
  if (next !== 'auto') return next;
  const hour = new Date().getHours();
  return (hour >= 7 && hour < 19) ? 'light' : 'dark';
}

function normalizeWorkspace(name) {
  const next = String(name || '');
  const map = {
    overview: 'apps',
    library: 'apps',
    sources: 'rules',
    automation: 'ops',
    logs: 'logs',
  };
  return ['apps', 'rules', 'ops', 'logs'].includes(next) ? next : (map[next] || 'apps');
}

function ipaApp() {
  return {
    workspaces: [
      { id: 'apps', name: 'APP' },
      { id: 'rules', name: '规则' },
      { id: 'ops', name: '设置' },
      { id: 'logs', name: '日志' },
    ],
    workspace: 'apps',
    cfg: { groups: [], priority_groups: [], whitelist: [], rate_limit: {} },
    status: {},
    account: { username: '', newPassword: '', confirmPassword: '', showNewPassword: false, showConfirmPassword: false },
    accountSaving: false,
    ipaList: [],
    appGroups: [],
    reloading: false,
    reindexing: false,
    lastSyncAt: 0,
    lastSyncStatus: '',  // '' | 'ok' | 'busy' | 'err'
    lastSyncMsg: '',
    _pollTimer: null,
    _tickTimer: null,
    _nowTick: 0,
    newGroup: '',
    newApp: { name: '', keywords: '' },
    newKw: {},
    scanning: false,
    loading: true,
    logName: 'tg-cron',
    logContent: '',
    autoRefresh: false,
    toast: { msg: '', type: 'ok' },
    themeMode: 'dark',
    currentTheme: 'dark',
    appSearch: '',
    appSort: 'recent',
    botCfg: { token: '', enabled: true, token_preview: '', has_token: false, bot_username: '', chat_id: '', user_ids: [], user_ids_text: '' },
    botSaving: false,
    botTesting: false,
    botTestResult: null,
    proxyCfg: { url: '', enabled: true, source: '', env_tg_proxy: '', env_forward_proxy: '' },
    proxyPresets: [],
    proxySaving: false,
    proxyTesting: false,
    proxyTestResult: null,
    unlockCfg: { code: '', enabled: true, expires: 'never', expires_at: '', remaining_seconds: null, expired: false, token_preview: '', has_token: false },
    unlockExpiresOptions: [
      { value: 'never', label: '永久' },
      { value: '1d', label: '1 天' },
      { value: '7d', label: '7 天' },
      { value: '30d', label: '30 天' },
      { value: '90d', label: '90 天' },
      { value: '365d', label: '1 年' },
    ],
    unlockSaving: false,
    unlockResult: null,
    repoInfo: { url: '' },
    repoUrlCopied: false,

    async init() {
      this.workspace = normalizeWorkspace(localStorage.getItem('ipa-workspace') || 'apps');
      this.themeMode = normalizeThemeMode(localStorage.getItem('ipa-theme-mode') || 'dark');
      this.applyTheme();
      setInterval(() => {
        if (this.themeMode === 'auto') this.applyTheme();
      }, 60000);
      try {
        await this.loadAll();
      } finally {
        this.loading = false;
      }
      await Promise.allSettled([this.loadProxy(), this.loadBot(), this.loadAccount(), this.loadUnlock(), this.loadRepoInfo()]);
      setInterval(() => {
        if (this.workspace === 'logs' && this.autoRefresh) this.loadLog();
        if (this.workspace === 'apps') this.loadStatus();
      }, 3000);
      this.startAutoSync();
    },

    workspaceLabel() {
      return this.workspaces.find((w) => w.id === this.workspace)?.name || '控制台';
    },

    setWorkspace(next) {
      this.workspace = normalizeWorkspace(next);
      localStorage.setItem('ipa-workspace', this.workspace);
      if (this.workspace === 'logs' && !this.logContent) this.loadLog();
    },

    setTheme(mode) {
      this.themeMode = normalizeThemeMode(mode);
      this.applyTheme();
    },

    applyTheme() {
      this.currentTheme = resolveTheme(this.themeMode);
      document.documentElement.setAttribute('data-theme', this.currentTheme);
      localStorage.setItem('ipa-theme-mode', this.themeMode);
    },

    toggleApp(app) {
      const shouldOpen = !app.expanded;
      for (const item of this.appGroups) item.expanded = false;
      app.expanded = shouldOpen;
    },

    appIconSrc(app) {
      if (app.icon && !app.iconFailed) return '/icons/' + encodeURIComponent(app.icon);
      return '';
    },

    handleIconError(_event, app) {
      app.iconFailed = true;
    },

    versionLabel(v) {
      return v && v.version ? 'v' + v.version : '版本未知';
    },

    versionTail(app, v) {
      const name = (v && v.filename) || '';
      if (!name) return '';
      // strip trailing .ipa for display
      let tail = name.replace(/\.ipa$/i, '');
      // strip the app name prefix (case insensitive, common separators)
      const an = (app && app.name) ? app.name.trim() : '';
      if (an) {
        const safe = an.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        tail = tail.replace(new RegExp('^' + safe + '[\\s_\\-·]*', 'i'), '');
      }
      // strip leading version like "8.0.50_" so it's not echoing versionLabel
      const ver = (v && v.version) ? String(v.version) : '';
      if (ver) {
        const safeVer = ver.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        tail = tail.replace(new RegExp('^' + safeVer + '[\\s_\\-·]*', 'i'), '');
      }
      tail = tail.replace(/^[\s_\-·]+/, '').trim();
      return tail;
    },

    appSummary(app) {
      const latest = app.versions[0] || {};
      const status = latest.scan_status === 'invalid' ? ' · 文件损坏' : (latest.scan_status === 'unscanned' ? ' · 未入库' : '');
      return app.versions.length + ' 个版本 · 最新 ' + this.versionLabel(latest) + status;
    },

    appsSummary() {
      const apps = this.appGroups || [];
      if (!apps.length) return '暂无 IPA';
      let totalFiles = 0;
      for (const app of apps) {
        for (const v of (app.versions || [])) {
          totalFiles++;
        }
      }
      return apps.length + ' 个 APP · ' + totalFiles + ' 个文件';
    },

    groupLabel(g) {
      if (!g) return '';
      let s = String(g).trim();
      s = s.replace(/^https?:\/\//i, '').replace(/^t\.me\//i, '').replace(/\/+$/, '');
      return s || g;
    },

    whitelistKeywordTotal() {
      const wl = (this.cfg && this.cfg.whitelist) || [];
      let n = 0;
      for (const app of wl) n += (app.keywords || []).length;
      return n;
    },

    filteredApps() {
      const q = this.appSearch.trim().toLowerCase();
      let arr = this.appGroups.filter((app) => !q ||
        app.name.toLowerCase().includes(q) ||
        app.description.toLowerCase().includes(q) ||
        app.versions.some((v) =>
          (v.filename || '').toLowerCase().includes(q) ||
          String(v.version || '').toLowerCase().includes(q)
        ));
      arr = [...arr];
      if (this.appSort === 'name') {
        arr.sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'));
      }
      if (this.appSort === 'count') {
        arr.sort((a, b) => b.versions.length - a.versions.length || a.name.localeCompare(b.name, 'zh-CN'));
      }
      if (this.appSort === 'recent') {
        arr.sort((a, b) => (b.versions[0]?.mtime || 0) - (a.versions[0]?.mtime || 0));
      }
      return arr;
    },

    groupApps() {
      const map = {};
      for (const f of this.ipaList) {
        const name = f.app_name || f.filename.replace(/_\d+[\.\d]*_.+\.ipa$/, '');
        if (!map[name]) {
          map[name] = {
            name,
            description: describeApp(name),
            icon: null,
            iconFailed: false,
            versions: [],
            expanded: false,
          };
        }
        if (f.icon && !map[name].icon) map[name].icon = f.icon;
        map[name].versions.push(f);
      }
      const arr = Object.values(map);
      for (const g of arr) g.versions.sort((a, b) => b.mtime - a.mtime);
      arr.sort((a, b) => (b.versions[0]?.mtime || 0) - (a.versions[0]?.mtime || 0));
      this.appGroups = arr;
    },

    async api(method, url, body) {
      try {
        const r = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: body ? JSON.stringify(body) : undefined,
        });
        if (r.status === 401) {
          window.location.href = '/login';
          throw new Error('登录已过期');
        }
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || r.statusText);
        return j;
      } catch (e) {
        this.showToast(e.message, 'err');
        throw e;
      }
    },

    showToast(msg, type = 'ok') {
      this.toast = { msg, type };
      setTimeout(() => { this.toast.msg = ''; }, 3000);
    },

    async loadAll() {
      await Promise.all([this.loadConfig(), this.loadStatus(), this.loadIpa()]);
    },

    async loadConfig() {
      const c = await this.api('GET', '/api/config');
      this.cfg = {
        groups: c.groups || [],
        priority_groups: c.priority_groups || [],
        whitelist: c.whitelist || [],
        rate_limit: c.rate_limit || { max_per_day: 30, min_interval_sec: 30, max_interval_sec: 120 },
      };
    },

    async loadStatus() {
      this.status = await this.api('GET', '/api/status');
    },

    async loadIpa() {
      const r = await this.api('GET', '/api/ipa');
      this.ipaList = r.files || [];
      this.groupApps();
      this.lastSyncAt = Date.now();
      if (this.lastSyncStatus !== 'busy') this.lastSyncStatus = 'ok';
    },

    async quickReload() {
      if (this.reloading || this.reindexing) return;
      this.reloading = true;
      try {
        await this.loadIpa();
        this.lastSyncStatus = 'ok';
        this.lastSyncMsg = '已刷新页面数据';
      } catch (e) {
        this.lastSyncStatus = 'err';
        this.lastSyncMsg = '刷新失败：' + (e?.message || e);
        this.showToast(this.lastSyncMsg, 'err');
      } finally {
        this.reloading = false;
      }
    },

    async reindexNow() {
      if (this.reindexing) return;
      this.reindexing = true;
      this.lastSyncStatus = 'busy';
      this.lastSyncMsg = '正在扫描磁盘并重建索引…';
      const t0 = performance.now();
      try {
        const r = await this.api('POST', '/api/reindex');
        await this.loadIpa();
        const ms = Math.max(1, Math.round(performance.now() - t0));
        if (r && r.ok) {
          this.lastSyncStatus = 'ok';
          this.lastSyncMsg = `索引重建完成 · ${r.cache_count || 0} 个 IPA · 用时 ${ms}ms`;
          this.showToast(this.lastSyncMsg);
        } else {
          this.lastSyncStatus = 'err';
          this.lastSyncMsg = '重建失败' + (r?.error ? '：' + r.error : '');
          this.showToast(this.lastSyncMsg, 'err');
        }
      } catch (e) {
        this.lastSyncStatus = 'err';
        this.lastSyncMsg = '重建失败：' + (e?.message || e);
        this.showToast(this.lastSyncMsg, 'err');
      } finally {
        this.reindexing = false;
      }
    },

    startAutoSync() {
      // 每 1s 让 syncLabel 的"几秒前"自动重算
      if (this._tickTimer) clearInterval(this._tickTimer);
      this._tickTimer = setInterval(() => { this._nowTick = Date.now(); }, 1000);
      // 后台轻量轮询：每 30s 在 APP 页且页面可见时拉一次 /api/ipa
      const tick = async () => {
        if (document.visibilityState !== 'visible') return;
        if (this.workspace !== 'apps') return;
        if (this.reindexing || this.reloading) return;
        try { await this.loadIpa(); } catch (e) {}
      };
      if (this._pollTimer) clearInterval(this._pollTimer);
      this._pollTimer = setInterval(tick, 30000);
      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') tick();
      });
    },

    get syncLabel() {
      if (this.reindexing) return '索引中…';
      if (this.reloading) return '刷新中…';
      if (!this.lastSyncAt) return '尚未同步';
      const now = this._nowTick || Date.now();
      const sec = Math.max(0, Math.round((now - this.lastSyncAt) / 1000));
      if (sec < 5) return '已就绪 · 刚刚';
      if (sec < 60) return `已就绪 · ${sec}s 前`;
      const m = Math.round(sec / 60);
      if (m < 60) return `已就绪 · ${m}m 前`;
      const h = Math.round(m / 60);
      return `已就绪 · ${h}h 前`;
    },
    get syncStatusClass() {
      if (this.reindexing || this.reloading) return 'is-busy';
      if (this.lastSyncStatus === 'err') return 'is-err';
      if (this.lastSyncStatus === 'ok') return 'is-ok';
      return '';
    },
    get syncDotClass() {
      return this.syncStatusClass;
    },
    get syncTooltip() {
      return this.lastSyncMsg || '点击重建索引以扫描磁盘并刷新 IPA 元信息';
    },

    async loadLog() {
      const r = await fetch('/api/logs/' + this.logName + '?lines=300');
      if (r.status === 401) {
        window.location.href = '/login';
        return;
      }
      const j = await r.json();
      this.logContent = (j.lines || []).join('');
      this.$nextTick(() => {
        const pre = document.querySelector('pre.log');
        if (pre) pre.scrollTop = pre.scrollHeight;
      });
    },

    async addGroup() {
      if (!this.newGroup.trim()) return;
      await this.api('POST', '/api/groups', { url: this.newGroup.trim() });
      this.newGroup = '';
      await this.loadConfig();
      this.showToast('已添加群组');
    },

    async delGroup(url) {
      if (!confirm('删除：' + url + '？')) return;
      await this.api('DELETE', '/api/groups', { url });
      await this.loadConfig();
      this.showToast('已删除');
    },

    async togglePriority(url) {
      await this.api('POST', '/api/groups/priority', { url });
      await this.loadConfig();
    },

    async addApp() {
      const name = this.newApp.name.trim();
      const kws = this.newApp.keywords.split(',').map((s) => s.trim()).filter(Boolean);
      if (!name || !kws.length) {
        this.showToast('请填写应用名和关键词', 'err');
        return;
      }
      await this.api('POST', '/api/whitelist', { name, keywords: kws });
      this.newApp = { name: '', keywords: '' };
      await this.loadConfig();
      this.showToast('已添加');
    },

    async delApp(name) {
      if (!confirm('删除 "' + name + '" 的规则？')) return;
      await this.api('DELETE', '/api/whitelist', { name });
      await this.loadConfig();
      this.showToast('已删除');
    },

    async addKeyword(app) {
      const k = (this.newKw[app.name] || '').trim();
      if (!k) return;
      if (app.keywords.includes(k)) {
        this.showToast('关键词已存在', 'err');
        return;
      }
      await this.api('PUT', '/api/whitelist', { name: app.name, keywords: [...app.keywords, k] });
      this.newKw[app.name] = '';
      await this.loadConfig();
    },

    async delKeyword(app, idx) {
      const next = app.keywords.filter((_, i) => i !== idx);
      if (!next.length) {
        if (!confirm('删除最后一个关键词会移除整个应用规则，继续？')) return;
        await this.api('DELETE', '/api/whitelist', { name: app.name });
      } else {
        await this.api('PUT', '/api/whitelist', { name: app.name, keywords: next });
      }
      await this.loadConfig();
    },

    async delIpaSingle(filename) {
      if (!confirm('确认删除 "' + filename + '"？')) return;
      await this.api('DELETE', '/api/ipa', { filenames: [filename] });
      await this.loadIpa();
      await this.loadStatus();
      this.showToast('已删除');
    },

    downloadIpa(v) {
      if (!v || v.downloadable === false) {
        this.showToast('这个 IPA 文件损坏，不能下载；建议删除后重新扫描。', 'err');
        return;
      }
      window.location.href = '/_ipa_proxy/' + encodeURIComponent(v.filename);
    },

    async saveRate() {
      await this.api('PUT', '/api/rate_limit', this.cfg.rate_limit);
      this.showToast('速率已保存');
    },

    async loadAccount() {
      try {
        const r = await this.api('GET', '/api/account');
        this.account.username = r.username || '';
      } catch (e) {}
    },

    async saveAccount() {
      const username = this.account.username.trim();
      const newPassword = this.account.newPassword;
      const confirmPassword = this.account.confirmPassword;
      if (!username) {
        this.showToast('请填写用户名', 'err');
        return;
      }
      if (newPassword || confirmPassword) {
        if (newPassword !== confirmPassword) {
          this.showToast('两次密码不一致', 'err');
          return;
        }
        if (newPassword.length < 4) {
          this.showToast('新密码至少 4 位', 'err');
          return;
        }
      }
      this.accountSaving = true;
      try {
        await this.api('PUT', '/api/account', {
          username,
          new_password: newPassword,
        });
        this.showToast('账号已更新，3 秒后跳转登录');
        localStorage.setItem('ipa-login-user', username);
        setTimeout(() => { window.location.href = '/login'; }, 3000);
      } catch (e) {}
      this.accountSaving = false;
    },

    async changePassword() {
      if (!this.account.newPassword || !this.account.confirmPassword) {
        this.showToast('请填写新密码', 'err');
        return;
      }
      if (this.account.newPassword !== this.account.confirmPassword) {
        this.showToast('两次密码不一致', 'err');
        return;
      }
      if (this.account.newPassword.length < 4) {
        this.showToast('新密码至少 4 位', 'err');
        return;
      }
      try {
        await this.api('PUT', '/api/password', {
          new_password: this.account.newPassword,
        });
        this.showToast('已修改，3 秒后跳转登录');
        setTimeout(() => { window.location.href = '/login'; }, 3000);
      } catch (e) {}
    },

    async logout() {
      try {
        await fetch('/api/logout', { method: 'POST' });
      } catch (e) {}
      window.location.href = '/login';
    },

    async loadBot() {
      try {
        const r = await this.api('GET', '/api/bot');
        this.botCfg = {
          token: r.token || '',
          enabled: r.enabled !== false,
          token_preview: r.token_preview || '',
          has_token: r.has_token,
          bot_username: r.bot_username || '',
          chat_id: r.chat_id || '',
          user_ids: Array.isArray(r.user_ids) ? r.user_ids.map(String) : [],
          user_ids_text: Array.isArray(r.user_ids) ? r.user_ids.map(String).join(', ') : '',
        };
      } catch (e) {}
    },

    async saveBot() {
      const token = this.botCfg.token.trim();
      if (this.botCfg.enabled && !token && !this.botCfg.has_token) {
        this.showToast('请输入 Bot Token', 'err');
        return;
      }
      this.botSaving = true;
      try {
        const payload = { enabled: this.botCfg.enabled, user_ids: this.botCfg.user_ids_text };
        if (token) payload.bot_token = token;
        const r = await this.api('PUT', '/api/bot', payload);
        this.showToast(r.msg || '已保存');
        this.botCfg.token = '';
        await this.loadBot();
      } catch (e) {}
      this.botSaving = false;
    },

    async testBot() {
      this.botTesting = true;
      this.botTestResult = null;
      try {
        this.botTestResult = await this.api('POST', '/api/bot/test');
      } catch (e) {
        this.botTestResult = { ok: false, error: e.message };
      }
      this.botTesting = false;
    },

    async loadUnlock() {
      try {
        const r = await this.api('GET', '/api/unlock');
        // 从 expires_at 反推 preset；找不到就标 custom
        let preset = 'never';
        if (r.expires_at && r.remaining_seconds && r.remaining_seconds > 0) {
          const days = Math.round(r.remaining_seconds / 86400);
          const map = { 1: '1d', 7: '7d', 30: '30d', 90: '90d', 365: '365d' };
          preset = map[days] || 'custom';
        }
        this.unlockCfg = {
          code: r.code || '',
          enabled: r.enabled !== false,
          expires: preset,
          expires_at: r.expires_at || '',
          remaining_seconds: r.remaining_seconds,
          expired: !!r.expired,
          token_preview: r.token_preview || '',
          has_token: r.has_token,
        };
      } catch (e) {}
    },

    async loadRepoInfo() {
      try {
        const r = await this.api('GET', '/api/repo_info');
        this.repoInfo = { url: r.repo_url || '' };
      } catch (e) {}
    },

    async copyRepoUrl() {
      if (!this.repoInfo.url) return;
      try {
        await navigator.clipboard.writeText(this.repoInfo.url);
        this.repoUrlCopied = true;
        this.showToast('已复制到剪贴板');
        setTimeout(() => { this.repoUrlCopied = false; }, 2000);
      } catch (e) {
        // Fallback for older browsers
        const input = document.querySelector('[readonly][x-ref="repoUrlInput"]');
        if (input) { input.select(); document.execCommand('copy'); }
        this.showToast('已复制到剪贴板');
        this.repoUrlCopied = true;
        setTimeout(() => { this.repoUrlCopied = false; }, 2000);
      }
    },

    async saveUnlock() {
      const code = (this.unlockCfg.code || '').trim();
      if (this.unlockCfg.enabled && !/^[A-Za-z0-9]{4,32}$/.test(code)) {
        this.showToast('解锁码需 4-32 位字母数字', 'err');
        return;
      }
      this.unlockSaving = true;
      this.unlockResult = null;
      try {
        const r = await this.api('PUT', '/api/unlock', {
          enabled: this.unlockCfg.enabled,
          code,
          expires: this.unlockCfg.expires || 'never',
        });
        this.unlockResult = { ok: true, msg: r.msg || '已保存' };
        this.showToast(r.msg || '已保存');
        await this.loadUnlock();
      } catch (e) {
        this.unlockResult = { ok: false, error: e.message };
      }
      this.unlockSaving = false;
    },

    formatExpires(iso) {
      if (!iso) return '';
      try {
        const d = new Date(iso);
        const pad = (n) => String(n).padStart(2, '0');
        return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
      } catch (e) { return iso; }
    },

    formatRemaining(sec) {
      if (sec == null) return '';
      if (sec <= 0) return '0';
      const days = Math.floor(sec / 86400);
      const hours = Math.floor((sec % 86400) / 3600);
      const mins = Math.floor((sec % 3600) / 60);
      if (days >= 1) return `${days} 天 ${hours} 小时`;
      if (hours >= 1) return `${hours} 小时 ${mins} 分钟`;
      return `${mins} 分钟`;
    },

    async loadProxy() {
      try {
        const r = await this.api('GET', '/api/proxy');
        this.proxyCfg = {
          url: r.url || '',
          enabled: r.enabled !== false,
          source: r.source || '',
          env_tg_proxy: r.env_tg_proxy || '',
          env_forward_proxy: r.env_forward_proxy || '',
        };
        this.proxyPresets = r.presets || [];
      } catch (e) {}
    },

    async saveProxy() {
      this.proxySaving = true;
      try {
        const r = await this.api('PUT', '/api/proxy', {
          url: this.proxyCfg.url,
          enabled: this.proxyCfg.enabled,
          source: this.proxyCfg.source || 'custom',
        });
        this.showToast(r.msg || '已保存');
      } catch (e) {}
      this.proxySaving = false;
    },

    async testProxy() {
      this.proxyTesting = true;
      this.proxyTestResult = null;
      try {
        this.proxyTestResult = await this.api('POST', '/api/proxy/test', { url: this.proxyCfg.url });
      } catch (e) {
        this.proxyTestResult = { ok: false, error: e.message };
      }
      this.proxyTesting = false;
    },

    async triggerScan() {
      this.scanning = true;
      try {
        await this.api('POST', '/api/scan');
        this.showToast('扫描已触发');
        this.setWorkspace('logs');
        this.autoRefresh = true;
        this.loadLog();
      } finally {
        setTimeout(() => { this.scanning = false; }, 3000);
      }
    },
  };
}
</script>
</body>
</html>
