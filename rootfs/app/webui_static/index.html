<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="color-scheme" content="dark light">
<title>IPA Self-Host 控制台</title>
<link rel="icon" type="image/svg+xml" href="/static/brand-icon.svg">
<link rel="apple-touch-icon" href="/static/brand-icon.svg">
<script>
(function() {
  try {
    const mode = localStorage.getItem('ipa-theme-mode') || 'dark';
    const hour = new Date().getHours();
    const theme = mode === 'auto' ? ((hour >= 7 && hour < 19) ? 'light' : 'dark') : mode;
    document.documentElement.setAttribute('data-theme', theme === 'light' ? 'light' : 'dark');
  } catch (e) {
    document.documentElement.setAttribute('data-theme', 'dark');
  }
})();
</script>
<script defer src="/static/vendor/alpine-3.13.5.min.js"></script>
<style>
  :root {
    color-scheme: dark;
    --bg:#0a0e14;
    --bg-2:#101722;
    --surface:rgba(18,25,38,.88);
    --panel:#141d2a;
    --panel-2:#192434;
    --line:#30405a;
    --line-2:#415273;
    --text:#f5f7fb;
    --text-2:#d8e1ee;
    --muted:#a6b3c8;
    --accent:#5b8cff;
    --accent-strong:#3d73f2;
    --accent-soft:rgba(91,140,255,.18);
    --good:#38c277;
    --good-soft:rgba(56,194,119,.16);
    --danger:#ff6b78;
    --danger-soft:rgba(255,107,120,.16);
    --input:#101824;
    --log-bg:#0c1420;
    --log-text:#dde7f5;
    --shadow:0 18px 44px rgba(0,0,0,.28);
  }
  [data-theme="light"] {
    color-scheme: light;
    --bg:#f3f6fb;
    --bg-2:#edf2f8;
    --surface:rgba(255,255,255,.9);
    --panel:#ffffff;
    --panel-2:#f7f9fc;
    --line:#d9e1ec;
    --line-2:#bac7da;
    --text:#111827;
    --text-2:#334155;
    --muted:#637188;
    --accent:#295cff;
    --accent-strong:#1f4fe8;
    --accent-soft:rgba(41,92,255,.12);
    --good:#15803d;
    --good-soft:rgba(21,128,61,.12);
    --danger:#dc2626;
    --danger-soft:rgba(220,38,38,.12);
    --input:#ffffff;
    --log-bg:#f8fafc;
    --log-text:#0f172a;
    --shadow:0 14px 36px rgba(15,23,42,.1);
  }

  * { box-sizing:border-box }
  [x-cloak] { display:none !important }
  html { min-height:100%; background:var(--bg); color:var(--text) }
  body {
    margin:0;
    min-height:100vh;
    color:var(--text);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;
    background:
      radial-gradient(circle at top right, var(--accent-soft), transparent 28%),
      linear-gradient(180deg, var(--bg), var(--bg-2));
  }
  button, input, select, textarea { font:inherit; color:inherit }
  button { border:0; cursor:pointer }
  button:disabled { cursor:not-allowed; opacity:.62 }
  a { color:var(--accent); text-decoration:none }
  a:hover { text-decoration:underline }

  .app-shell { min-height:100vh; padding:20px; display:grid; gap:14px; align-content:start }
  .topbar,
  .subbar,
  .panel {
    border:1px solid var(--line);
    background:var(--surface);
    backdrop-filter:blur(18px);
    box-shadow:var(--shadow);
  }
  .topbar {
    position:sticky;
    top:12px;
    z-index:20;
    border-radius:22px;
    padding:14px 16px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
  }
  .brand {
    display:flex;
    align-items:center;
    gap:12px;
    min-width:220px;
  }
  .brand-mark {
    width:44px;
    height:44px;
    border-radius:14px;
    display:block;
    object-fit:cover;
    background:var(--accent);
    box-shadow:0 12px 28px var(--accent-soft);
  }
  .brand h1 {
    margin:0;
    font-size:16px;
    line-height:1.1;
  }
  .brand span {
    display:block;
    margin-top:4px;
    color:var(--muted);
    font-size:12px;
  }
  .header-actions {
    display:flex;
    align-items:center;
    justify-content:flex-end;
    gap:10px;
    flex-wrap:wrap;
  }
  .theme-switch,
  .tabs {
    display:inline-flex;
    align-items:center;
    gap:4px;
    padding:4px;
    border:1px solid var(--line);
    border-radius:14px;
    background:var(--panel);
  }
  .theme-switch button,
  .tabs button {
    min-height:34px;
    border-radius:10px;
    padding:0 12px;
    background:transparent;
    color:var(--muted);
    white-space:nowrap;
    transition:background .18s ease, color .18s ease, transform .18s ease;
  }
  .theme-switch button:hover,
  .tabs button:hover {
    color:var(--text);
    background:var(--panel-2);
  }
  .theme-switch button.active,
  .tabs button.active {
    color:#fff;
    background:linear-gradient(135deg, var(--accent), var(--accent-strong));
  }
  .btn {
    min-height:38px;
    padding:0 14px;
    border-radius:12px;
    border:1px solid var(--line);
    background:var(--panel);
    color:var(--text);
    transition:transform .18s ease, border-color .18s ease, background .18s ease;
  }
  .btn:hover {
    transform:translateY(-1px);
    border-color:var(--line-2);
  }
  .btn.primary {
    border-color:transparent;
    color:#fff;
    background:linear-gradient(135deg, var(--accent), var(--accent-strong));
  }
  .btn.danger {
    color:var(--danger);
    background:var(--danger-soft);
    border-color:rgba(255,107,120,.24);
  }
  .btn.danger:hover {
    background:var(--danger);
    color:#fff;
    border-color:var(--danger);
  }
  .btn.ghost {
    background:transparent;
    box-shadow:none;
  }
  .btn.sm {
    min-height:30px;
    padding:0 10px;
    border-radius:10px;
    font-size:12px;
  }
  .btn.icon {
    width:32px;
    padding:0;
    display:grid;
    place-items:center;
  }

  .subbar {
    border-radius:20px;
    padding:12px;
    display:flex;
    align-items:center;
  }
  .tabs {
    overflow:auto;
    width:100%;
  }

  .view { animation:viewIn .18s ease both }
  .panel {
    border-radius:22px;
    overflow:hidden;
  }
  .panel-head {
    padding:16px 18px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .head-block h2 {
    margin:0;
    font-size:16px;
    line-height:1.2;
  }
  .head-block span {
    display:block;
    margin-top:4px;
    color:var(--muted);
    font-size:12px;
  }
  .panel-body { padding:16px 18px 18px }

  input,
  select,
  textarea {
    width:100%;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:12px;
    background:var(--input);
    color:var(--text);
    outline:none;
    transition:border-color .18s ease, box-shadow .18s ease;
  }
  input:focus,
  select:focus,
  textarea:focus {
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft);
  }
  input::placeholder,
  textarea::placeholder { color:var(--muted) }

  .toolbar {
    display:grid;
    grid-template-columns:minmax(220px,1fr) auto auto;
    gap:10px;
    align-items:center;
    margin-bottom:14px;
  }
  .search {
    position:relative;
  }
  .search:before {
    content:"⌕";
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    color:var(--muted);
    font-size:17px;
  }
  .search input { padding-left:34px }

  .app-list { display:grid; gap:10px }
  .app-row {
    border:1px solid var(--line);
    border-radius:18px;
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    overflow:hidden;
    transition:border-color .18s ease, transform .18s ease;
  }
  .app-row:hover {
    transform:translateY(-1px);
    border-color:var(--line-2);
  }
  .app-main {
    width:100%;
    padding:14px 16px;
    background:transparent;
    display:grid;
    grid-template-columns:auto minmax(0,1fr) auto auto auto;
    gap:12px;
    align-items:center;
    text-align:left;
  }
  .app-icon {
    width:42px;
    height:42px;
    border-radius:12px;
    overflow:hidden;
    display:grid;
    place-items:center;
    flex-shrink:0;
    font-weight:800;
    color:var(--accent);
    background:var(--accent-soft);
    border:1px solid var(--line);
  }
  .app-icon img {
    width:100%;
    height:100%;
    object-fit:cover;
  }
  .app-info { min-width:0 }
  .app-info h3 {
    margin:0;
    font-size:15px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .app-info p {
    margin:3px 0 0;
    color:var(--muted);
    font-size:12px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .app-info .app-desc {
    color:var(--text-2);
  }
  .app-meta-line {
    display:block;
    margin-top:2px;
    color:var(--muted);
    font-size:12px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .app-pill,
  .app-time {
    color:var(--text-2);
    font-size:12px;
    white-space:nowrap;
  }
  .app-pill {
    padding:6px 10px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--panel);
  }
  .chev {
    color:var(--muted);
    font-size:18px;
    transition:transform .18s ease;
  }
  .chev.open { transform:rotate(90deg) }
  .version-list {
    max-height:0;
    overflow:hidden;
    transition:max-height .25s ease;
  }
  .version-list.open { max-height:2200px }
  .version-row {
    display:grid;
    grid-template-columns:70px minmax(0,1fr) 90px 130px auto auto;
    gap:10px;
    align-items:center;
    padding:12px 16px;
    border-top:1px solid var(--line);
    font-size:12px;
  }
  .version-row .ver { font-weight:800 }
  .version-row .file {
    min-width:0;
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .grid {
    display:grid;
    gap:14px;
  }
  .grid.two {
    grid-template-columns:repeat(2, minmax(0,1fr));
  }
  .list { display:flex; flex-direction:column }
  .list-row {
    display:grid;
    grid-template-columns:auto minmax(0,1fr) auto;
    gap:10px;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid var(--line);
  }
  .list-row:last-child { border-bottom:0 }
  .grow {
    min-width:0;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .muted { color:var(--muted) }
  .addbar {
    display:grid;
    grid-template-columns:minmax(0,1fr) auto;
    gap:10px;
    margin-top:14px;
  }
  .addbar.three {
    grid-template-columns:minmax(130px,.9fr) minmax(0,1.4fr) auto;
  }
  .whitelist-item {
    padding:12px 0;
    border-bottom:1px solid var(--line);
  }
  .whitelist-item:last-child { border-bottom:0 }
  .whitelist-top {
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .tag-cloud {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
  }
  .tag {
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:6px 10px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--panel);
    font-size:12px;
  }
  .tag button {
    padding:0;
    background:transparent;
    color:var(--muted);
  }
  .tag button:hover { color:var(--danger) }
  .inline-add {
    width:auto;
    min-width:140px;
    max-width:220px;
  }

  .field { display:grid; gap:6px }
  .field label,
  .mini-label {
    color:var(--muted);
    font-size:12px;
  }
  .grid3 {
    display:grid;
    grid-template-columns:repeat(3, minmax(0,1fr));
    gap:10px;
  }
  .actions {
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-top:14px;
  }
  .checkline {
    display:inline-flex;
    align-items:center;
    gap:7px;
    color:var(--muted);
    font-size:12px;
    white-space:nowrap;
  }
  .checkline input {
    width:auto;
    margin:0;
  }
  .status-line {
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
    font-size:13px;
  }
  .dot {
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--muted);
  }
  .dot.on { background:var(--good) }
  .code {
    display:inline-block;
    padding:4px 8px;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--panel);
    font:12px/1.3 Menlo,Monaco,monospace;
  }
  .result-box {
    margin-top:14px;
    padding:12px 14px;
    border-radius:14px;
    border:1px solid var(--line);
    background:var(--panel);
    font-size:13px;
  }
  .result-box.ok { border-color:rgba(56,194,119,.28) }
  .result-box.err { border-color:rgba(255,107,120,.28) }
  .preset-grid {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
  }
  .preset-grid .active {
    color:var(--accent);
    border-color:var(--accent);
    background:var(--accent-soft);
  }

  .log-tools {
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;
  }
  .log-tools select {
    width:auto;
    min-width:126px;
  }
  pre.log {
    margin:0;
    min-height:460px;
    max-height:68vh;
    overflow:auto;
    padding:16px 18px;
    background:var(--log-bg);
    color:var(--log-text);
    border-top:1px solid var(--line);
    font:12px/1.6 Menlo,Monaco,Consolas,monospace;
    white-space:pre-wrap;
  }

  .empty {
    min-height:160px;
    display:grid;
    place-items:center;
    text-align:center;
    color:var(--muted);
    border:1px dashed var(--line);
    border-radius:18px;
    background:rgba(127,127,127,.04);
  }
  .empty strong {
    display:block;
    margin-bottom:4px;
    color:var(--text);
  }
  .skeleton-grid {
    display:grid;
    gap:10px;
  }
  .skeleton {
    height:78px;
    border-radius:16px;
    background:linear-gradient(90deg, var(--panel), var(--panel-2), var(--panel));
    background-size:240% 100%;
    animation:shimmer 1.2s linear infinite;
  }
  .toast {
    position:fixed;
    top:88px;
    right:20px;
    z-index:99;
    max-width:360px;
    padding:12px 14px;
    border-radius:14px;
    border:1px solid var(--line);
    background:var(--panel);
    box-shadow:var(--shadow);
    animation:toastIn .18s ease both;
  }
  .toast.ok { border-color:rgba(56,194,119,.28) }
  .toast.err {
    color:var(--danger);
    border-color:rgba(255,107,120,.28);
  }

  @keyframes viewIn {
    from { opacity:0; transform:translateY(6px) }
    to { opacity:1; transform:translateY(0) }
  }
  @keyframes toastIn {
    from { opacity:0; transform:translateY(-6px) }
    to { opacity:1; transform:translateY(0) }
  }
  @keyframes shimmer {
    to { background-position:-240% 0 }
  }
  @media (prefers-reduced-motion:reduce) {
    *, *:before, *:after {
      animation-duration:.01ms !important;
      animation-iteration-count:1 !important;
      transition-duration:.01ms !important;
    }
  }
  @media (max-width:1080px) {
    .grid.two {
      grid-template-columns:1fr;
    }
  }
  @media (max-width:820px) {
    .toolbar,
    .grid3,
    .addbar,
    .addbar.three {
      grid-template-columns:1fr;
    }
    .app-main {
      grid-template-columns:auto minmax(0,1fr) auto;
      grid-template-areas:
        "icon info chev"
        "icon latest latest"
        "icon time time";
      align-items:start;
    }
    .app-icon { grid-area:icon }
    .app-info { grid-area:info }
    .app-pill { grid-area:latest; width:max-content }
    .app-time { grid-area:time }
    .chev { grid-area:chev; justify-self:end }
    .version-row {
      grid-template-columns:1fr auto auto;
    }
    .version-row .file {
      grid-column:1 / -1;
      grid-row:2;
    }
    .version-row .time {
      grid-column:1 / -1;
      grid-row:3;
      color:var(--muted);
    }
  }
  @media (max-width:720px) {
    .app-shell { padding:12px }
    .topbar {
      position:relative;
      top:0;
      border-radius:18px;
      align-items:flex-start;
      flex-direction:column;
    }
    .header-actions {
      width:100%;
      justify-content:space-between;
    }
    .subbar,
    .panel {
      border-radius:18px;
    }
    .toast {
      top:auto;
      right:12px;
      left:12px;
      bottom:12px;
      max-width:none;
    }
  }
</style>
</head>
<body>
<div class="app-shell" x-data="ipaApp()" x-init="init()">
  <header class="topbar">
    <div class="brand">
      <img class="brand-mark" src="/static/brand-icon.svg" alt="">
      <div>
        <h1>IPA Self-Host</h1>
        <span x-text="workspaceLabel()"></span>
      </div>
    </div>
    <div class="header-actions">
      <div class="theme-switch" aria-label="主题切换">
        <button type="button" :class="{active:themeMode==='dark'}" @click="setTheme('dark')" title="深色">☾</button>
        <button type="button" :class="{active:themeMode==='light'}" @click="setTheme('light')" title="浅色">☀</button>
        <button type="button" :class="{active:themeMode==='auto'}" @click="setTheme('auto')" title="自动">A</button>
      </div>
      <button type="button" class="btn" @click="loadAll()">刷新</button>
      <button type="button" class="btn primary" @click="triggerScan()" :disabled="scanning" x-text="scanning ? '扫描中' : '扫描'"></button>
      <button type="button" class="btn ghost" @click="logout()">退出</button>
    </div>
  </header>

  <section class="subbar">
    <nav class="tabs" aria-label="工作区">
      <template x-for="w in workspaces" :key="w.id">
        <button type="button" :class="{active:workspace===w.id}" @click="setWorkspace(w.id)" x-text="w.name"></button>
      </template>
    </nav>
  </section>

  <section class="view" x-show="workspace==='apps'" x-cloak x-transition.opacity.duration.150ms>
    <div class="panel">
      <div class="panel-head">
        <div class="head-block">
          <h2>应用</h2>
          <span x-text="appSearch ? '筛选中' : '最近更新'"></span>
        </div>
        <button type="button" class="btn sm" @click="loadIpa()">刷新列表</button>
      </div>
      <div class="panel-body">
        <div class="toolbar">
          <div class="search"><input x-model="appSearch" placeholder="搜索应用 / 文件 / 版本"></div>
          <select x-model="appSort">
            <option value="recent">最近更新</option>
            <option value="name">名称</option>
            <option value="count">版本数</option>
          </select>
          <button type="button" class="btn" @click="setAllExpanded(!expandAll)" x-text="expandAll ? '收起全部' : '展开全部'"></button>
        </div>

        <div class="skeleton-grid" x-show="loading" x-cloak>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
          <div class="skeleton"></div>
        </div>

        <template x-if="!loading && !filteredApps().length">
          <div class="empty">
            <div>
              <strong>没有匹配内容</strong>
              <span>换个关键词，或先执行一次扫描。</span>
            </div>
          </div>
        </template>

        <div class="app-list" x-show="!loading && filteredApps().length" x-cloak>
          <template x-for="app in filteredApps()" :key="app.name">
            <article class="app-row">
              <button type="button" class="app-main" @click="app.expanded = !app.expanded">
                <div class="app-icon">
                  <img :src="appIconSrc(app)" @error="handleIconError($event, app)" alt="">
                </div>
                <div class="app-info">
                  <h3 x-text="app.name"></h3>
                  <p class="app-desc" x-text="app.description"></p>
                  <span class="app-meta-line" x-text="app.versions.length + ' 个版本 · 最新 v' + (app.versions[0]?.version || '-')"></span>
                </div>
                <span class="app-pill" x-text="(app.versions[0]?.size_mb || '-') + ' MB'"></span>
                <span class="app-time" x-text="app.versions[0]?.mtime_str || '-'"></span>
                <span class="chev" :class="{open:app.expanded}">›</span>
              </button>
              <div class="version-list" :class="{open:app.expanded}">
                <template x-for="v in app.versions" :key="v.filename">
                  <div class="version-row">
                    <span class="ver" x-text="'v' + v.version"></span>
                    <span class="file" x-text="v.filename"></span>
                    <span x-text="(v.size_mb || '-') + ' MB'"></span>
                    <span class="time" x-text="v.mtime_str || '-'"></span>
                    <button type="button" class="btn sm icon" @click.stop="downloadIpa(v.filename)" title="下载">↓</button>
                    <button type="button" class="btn danger sm" @click.stop="delIpaSingle(v.filename)">删除</button>
                  </div>
                </template>
              </div>
            </article>
          </template>
        </div>
      </div>
    </div>
  </section>

  <section class="view" x-show="workspace==='rules'" x-cloak x-transition.opacity.duration.150ms>
    <div class="grid two">
      <div class="panel">
        <div class="panel-head">
          <div class="head-block">
            <h2>群组</h2>
            <span>来源</span>
          </div>
        </div>
        <div class="panel-body">
          <template x-if="!cfg.groups || !cfg.groups.length">
            <div class="empty">
              <div>
                <strong>还没有群组</strong>
                <span>添加 `t.me` 链接后即可扫描。</span>
              </div>
            </div>
          </template>
          <div class="list" x-show="cfg.groups && cfg.groups.length" x-cloak>
            <template x-for="g in (cfg.groups || [])" :key="g">
              <div class="list-row">
                <button
                  type="button"
                  class="btn sm icon"
                  @click="togglePriority(g)"
                  :title="(cfg.priority_groups || []).includes(g) ? '取消优先' : '设为优先'"
                  x-text="(cfg.priority_groups || []).includes(g) ? '★' : '☆'"></button>
                <div class="grow"><a :href="g" target="_blank" x-text="g"></a></div>
                <button type="button" class="btn danger sm" @click="delGroup(g)">删除</button>
              </div>
            </template>
          </div>
          <div class="addbar">
            <input x-model="newGroup" placeholder="https://t.me/xxx" @keydown.enter.prevent="addGroup()">
            <button type="button" class="btn primary" @click="addGroup()">添加</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="head-block">
            <h2>白名单</h2>
            <span>关键词</span>
          </div>
        </div>
        <div class="panel-body">
          <template x-if="!cfg.whitelist || !cfg.whitelist.length">
            <div class="empty">
              <div>
                <strong>还没有规则</strong>
                <span>应用名和关键词会一起参与筛选。</span>
              </div>
            </div>
          </template>
          <div x-show="cfg.whitelist && cfg.whitelist.length" x-cloak>
            <template x-for="app in (cfg.whitelist || [])" :key="app.name">
              <div class="whitelist-item">
                <div class="whitelist-top">
                  <div class="grow">
                    <b x-text="app.name"></b>
                    <span class="muted" x-text="' · ' + app.keywords.length + ' 词'"></span>
                  </div>
                  <button type="button" class="btn danger sm" @click="delApp(app.name)">删除</button>
                </div>
                <div class="tag-cloud">
                  <template x-for="(k,i) in app.keywords" :key="k">
                    <span class="tag"><span x-text="k"></span><button type="button" @click="delKeyword(app,i)">×</button></span>
                  </template>
                  <input class="inline-add" x-model="newKw[app.name]" placeholder="+ 关键词" @keydown.enter.prevent="addKeyword(app)">
                </div>
              </div>
            </template>
          </div>
          <div class="addbar three">
            <input x-model="newApp.name" placeholder="应用名">
            <input x-model="newApp.keywords" placeholder="关键词 1, 关键词 2">
            <button type="button" class="btn primary" @click="addApp()">添加</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="view" x-show="workspace==='ops'" x-cloak x-transition.opacity.duration.150ms>
    <div class="grid two">
      <div class="panel">
        <div class="panel-head">
          <div class="head-block">
            <h2>扫描</h2>
            <span x-text="'每日 ' + (cfg.rate_limit?.max_per_day || 30) + ' 次'"></span>
          </div>
        </div>
        <div class="panel-body">
          <div class="grid3">
            <div class="field">
              <label>每日最多</label>
              <input type="number" x-model.number="cfg.rate_limit.max_per_day" min="1">
            </div>
            <div class="field">
              <label>最小间隔</label>
              <input type="number" x-model.number="cfg.rate_limit.min_interval_sec" min="1">
            </div>
            <div class="field">
              <label>最大间隔</label>
              <input type="number" x-model.number="cfg.rate_limit.max_interval_sec" min="1">
            </div>
          </div>
          <div class="actions">
            <button type="button" class="btn primary" @click="saveRate()">保存</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="head-block">
            <h2>Bot</h2>
            <span x-text="botCfg.has_token ? '@' + (botCfg.bot_username || '已配置') : '未配置'"></span>
          </div>
        </div>
        <div class="panel-body">
          <div class="field">
            <label>Bot Token</label>
            <input x-model="botCfg.token" type="text" placeholder="123456:ABC-DEF1234gh...">
          </div>
          <div class="actions" style="margin-top:10px">
            <label class="checkline"><input type="checkbox" x-model="botCfg.enabled"> 启用</label>
          </div>
          <div class="status-line" style="margin-top:12px">
            <span class="dot" :class="{on:botCfg.has_token && botCfg.bot_username}"></span>
            <span x-text="botCfg.has_token && botCfg.bot_username ? '已连接 @' + botCfg.bot_username : '未连接'"></span>
            <span class="code" x-show="botCfg.has_token" x-cloak x-text="botCfg.token_preview || '***'"></span>
          </div>
          <div class="actions">
            <button type="button" class="btn primary" @click="saveBot()" :disabled="botSaving" x-text="botSaving ? '保存中' : '保存'"></button>
            <button type="button" class="btn" @click="testBot()" :disabled="botTesting || !botCfg.has_token" x-show="botCfg.has_token" x-cloak x-text="botTesting ? '测试中' : '测试'"></button>
          </div>
          <div x-show="botTestResult" x-cloak class="result-box" :class="botTestResult && botTestResult.ok ? 'ok' : 'err'">
            <template x-if="botTestResult && botTestResult.ok">
              <div>连接正常：@<span x-text="botTestResult.bot?.username"></span> · <span x-text="botTestResult.bot?.name"></span></div>
            </template>
            <template x-if="botTestResult && !botTestResult.ok">
              <div x-text="botTestResult.error"></div>
            </template>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="head-block">
            <h2>代理</h2>
            <span x-text="proxyCfg.enabled ? '已启用' : '未启用'"></span>
          </div>
        </div>
        <div class="panel-body">
          <div class="field">
            <label>代理地址</label>
            <input :value="proxyCfg.url" @input="proxyCfg.url=$event.target.value; proxyCfg.source='custom'" placeholder="socks5://10.0.0.100:7893">
          </div>
          <div class="actions" style="margin-top:10px">
            <label class="checkline"><input type="checkbox" x-model="proxyCfg.enabled"> 启用</label>
          </div>
          <div class="preset-grid" x-show="proxyPresets.length" x-cloak>
            <template x-for="p in proxyPresets" :key="p.url">
              <button type="button" class="btn sm" :class="{active:proxyCfg.url===p.url}" @click="proxyCfg.url=p.url; proxyCfg.source='preset'" x-text="p.name" :title="p.desc"></button>
            </template>
          </div>
          <div class="actions">
            <button type="button" class="btn primary" @click="saveProxy()" :disabled="proxySaving" x-text="proxySaving ? '保存中' : '保存'"></button>
            <button type="button" class="btn" @click="testProxy()" :disabled="proxyTesting" x-text="proxyTesting ? '测试中' : '测试'"></button>
          </div>
          <div x-show="proxyTestResult" x-cloak class="result-box" :class="proxyTestResult && proxyTestResult.ok ? 'ok' : 'err'">
            <template x-if="proxyTestResult">
              <div>
                <div><b x-text="proxyTestResult.ok ? '代理可用' : '代理不可用'"></b></div>
                <template x-if="proxyTestResult.tests">
                  <div class="muted" style="margin-top:8px">
                    <div>Telegram: <span x-text="proxyTestResult.tests.telegram_via_proxy?.ok ? '✓ ' + proxyTestResult.tests.telegram_via_proxy?.latency_ms + 'ms' : '✗'"></span></div>
                    <div>Google: <span x-text="proxyTestResult.tests.google_via_proxy?.ok ? '✓ ' + proxyTestResult.tests.google_via_proxy?.latency_ms + 'ms' : '✗'"></span></div>
                    <div>直连 TG: <span x-text="proxyTestResult.tests.telegram_direct?.ok ? '✓ ' + proxyTestResult.tests.telegram_direct?.latency_ms + 'ms' : '✗'"></span></div>
                  </div>
                </template>
                <template x-if="proxyTestResult.error">
                  <div style="margin-top:8px" x-text="proxyTestResult.error"></div>
                </template>
              </div>
            </template>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-head">
          <div class="head-block">
            <h2>账户</h2>
            <span>用户名固定为 admin</span>
          </div>
        </div>
        <div class="panel-body">
          <div class="field">
            <label>当前密码</label>
            <input type="password" x-model="pw.old">
          </div>
          <div class="field" style="margin-top:12px">
            <label>新密码</label>
            <input type="password" x-model="pw.new" maxlength="64">
          </div>
          <div class="field" style="margin-top:12px">
            <label>确认新密码</label>
            <input type="password" x-model="pw.confirm" maxlength="64">
          </div>
          <div class="actions">
            <button type="button" class="btn primary" @click="changePassword()">修改</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="view" x-show="workspace==='logs'" x-cloak x-transition.opacity.duration.150ms>
    <div class="panel">
      <div class="panel-head">
        <div class="head-block">
          <h2>日志</h2>
          <span x-text="autoRefresh ? '自动刷新' : '手动刷新'"></span>
        </div>
        <div class="log-tools">
          <select x-model="logName" @change="loadLog()">
            <option value="tg-cron">TG 扫描</option>
            <option value="scanner">仓库扫描</option>
            <option value="nginx-error">Nginx 错误</option>
          </select>
          <button type="button" class="btn sm" @click="loadLog()">刷新</button>
          <label class="checkline"><input type="checkbox" x-model="autoRefresh"> 自动刷新</label>
        </div>
      </div>
      <pre class="log" x-text="logContent || '(空)'"></pre>
    </div>
  </section>

  <div x-show="toast.msg" x-cloak x-transition class="toast" :class="toast.type" @click="toast.msg=''" x-text="toast.msg"></div>
</div>

<script>
const APP_DESC = {
  '小红书': '笔记、攻略、本地生活。',
  'YouTube': '视频、订阅、播放列表。',
  'YouTube Music': '音乐、歌单、播客。',
  '哔哩哔哩': '番剧、视频、直播。',
  'Spotify': '音乐、歌单、播客。',
  '高德地图': '路线、导航、实时路况。',
  '百度地图': '路线、公交、位置搜索。',
  '闲鱼': '二手交易和闲置转让。',
  'Swiftgram': 'Telegram 第三方客户端。',
  'Infuse': '本地和网络视频播放器。',
  '知乎': '问答、讨论、知识社区。',
  'PiliPlus': '清爽的哔哩哔哩第三方客户端。',
  '抖音': '短视频、直播、创作。',
  'Facebook': '社交动态和好友联系。',
  'X': '实时信息和社交讨论。',
  'Shadowrocket': 'iOS 网络代理工具。',
  'Bit远控助手': '远程控制工具。',
};

function describeApp(name) {
  const n = String(name || '').trim();
  if (APP_DESC[n]) return APP_DESC[n];
  const lower = n.toLowerCase();
  if (lower.includes('pili')) return APP_DESC.PiliPlus;
  if (lower.includes('youtube')) return APP_DESC.YouTube;
  if (lower.includes('bili')) return APP_DESC['哔哩哔哩'];
  return 'iOS 应用安装包。';
}

function fallbackAppIcon(name) {
  const lower = String(name || '').toLowerCase();
  if (lower.includes('pili')) return '/static/app-icons/piliplus.svg';
  return '/static/app-icons/default.svg';
}

function normalizeThemeMode(mode) {
  return ['dark', 'light', 'auto'].includes(mode) ? mode : 'dark';
}

function resolveTheme(mode) {
  const next = normalizeThemeMode(mode);
  if (next !== 'auto') return next;
  const hour = new Date().getHours();
  return (hour >= 7 && hour < 19) ? 'light' : 'dark';
}

function normalizeWorkspace(name) {
  const next = String(name || '');
  const map = {
    overview: 'apps',
    library: 'apps',
    sources: 'rules',
    automation: 'ops',
    logs: 'logs',
  };
  return ['apps', 'rules', 'ops', 'logs'].includes(next) ? next : (map[next] || 'apps');
}

function ipaApp() {
  return {
    workspaces: [
      { id: 'apps', name: '应用' },
      { id: 'rules', name: '规则' },
      { id: 'ops', name: '设置' },
      { id: 'logs', name: '日志' },
    ],
    workspace: 'apps',
    cfg: { groups: [], priority_groups: [], whitelist: [], rate_limit: {} },
    status: {},
    pw: { old: '', new: '', confirm: '' },
    ipaList: [],
    appGroups: [],
    newGroup: '',
    newApp: { name: '', keywords: '' },
    newKw: {},
    scanning: false,
    loading: true,
    logName: 'tg-cron',
    logContent: '',
    autoRefresh: false,
    toast: { msg: '', type: 'ok' },
    themeMode: 'dark',
    currentTheme: 'dark',
    appSearch: '',
    appSort: 'recent',
    expandAll: false,
    botCfg: { token: '', enabled: true, token_preview: '', has_token: false, bot_username: '', chat_id: '' },
    botSaving: false,
    botTesting: false,
    botTestResult: null,
    proxyCfg: { url: '', enabled: true, source: '', env_tg_proxy: '', env_forward_proxy: '' },
    proxyPresets: [],
    proxySaving: false,
    proxyTesting: false,
    proxyTestResult: null,

    async init() {
      this.workspace = normalizeWorkspace(localStorage.getItem('ipa-workspace') || 'apps');
      this.themeMode = normalizeThemeMode(localStorage.getItem('ipa-theme-mode') || 'dark');
      this.applyTheme();
      setInterval(() => {
        if (this.themeMode === 'auto') this.applyTheme();
      }, 60000);
      try {
        await this.loadAll();
      } finally {
        this.loading = false;
      }
      await Promise.allSettled([this.loadProxy(), this.loadBot()]);
      setInterval(() => {
        if (this.workspace === 'logs' && this.autoRefresh) this.loadLog();
        if (this.workspace === 'apps') this.loadStatus();
      }, 3000);
    },

    workspaceLabel() {
      return this.workspaces.find((w) => w.id === this.workspace)?.name || '控制台';
    },

    setWorkspace(next) {
      this.workspace = normalizeWorkspace(next);
      localStorage.setItem('ipa-workspace', this.workspace);
      if (this.workspace === 'logs' && !this.logContent) this.loadLog();
    },

    setTheme(mode) {
      this.themeMode = normalizeThemeMode(mode);
      this.applyTheme();
    },

    applyTheme() {
      this.currentTheme = resolveTheme(this.themeMode);
      document.documentElement.setAttribute('data-theme', this.currentTheme);
      localStorage.setItem('ipa-theme-mode', this.themeMode);
    },

    setAllExpanded(open) {
      this.expandAll = open;
      for (const app of this.appGroups) app.expanded = open;
    },

    appIconSrc(app) {
      if (app.icon && !app.iconFailed) return '/static/icons/' + encodeURIComponent(app.icon);
      return fallbackAppIcon(app.name);
    },

    handleIconError(event, app) {
      if (!app.iconFailed) {
        app.iconFailed = true;
        event.target.src = fallbackAppIcon(app.name);
        return;
      }
      event.target.onerror = null;
      event.target.src = '/static/app-icons/default.svg';
    },

    filteredApps() {
      const q = this.appSearch.trim().toLowerCase();
      let arr = this.appGroups.filter((app) => !q ||
        app.name.toLowerCase().includes(q) ||
        app.description.toLowerCase().includes(q) ||
        app.versions.some((v) =>
          (v.filename || '').toLowerCase().includes(q) ||
          String(v.version || '').toLowerCase().includes(q)
        ));
      arr = [...arr];
      if (this.appSort === 'name') {
        arr.sort((a, b) => a.name.localeCompare(b.name, 'zh-CN'));
      }
      if (this.appSort === 'count') {
        arr.sort((a, b) => b.versions.length - a.versions.length || a.name.localeCompare(b.name, 'zh-CN'));
      }
      if (this.appSort === 'recent') {
        arr.sort((a, b) => (b.versions[0]?.mtime || 0) - (a.versions[0]?.mtime || 0));
      }
      return arr;
    },

    groupApps() {
      const map = {};
      for (const f of this.ipaList) {
        const name = f.app_name || f.filename.replace(/_\d+[\.\d]*_.+\.ipa$/, '');
        if (!map[name]) {
          map[name] = {
            name,
            description: describeApp(name),
            icon: null,
            iconFailed: false,
            versions: [],
            expanded: this.expandAll,
          };
        }
        if (f.icon && !map[name].icon) map[name].icon = f.icon;
        map[name].versions.push(f);
      }
      const arr = Object.values(map);
      for (const g of arr) g.versions.sort((a, b) => b.mtime - a.mtime);
      arr.sort((a, b) => (b.versions[0]?.mtime || 0) - (a.versions[0]?.mtime || 0));
      this.appGroups = arr;
    },

    async api(method, url, body) {
      try {
        const r = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: body ? JSON.stringify(body) : undefined,
        });
        if (r.status === 401) {
          window.location.href = '/login';
          throw new Error('登录已过期');
        }
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || r.statusText);
        return j;
      } catch (e) {
        this.showToast(e.message, 'err');
        throw e;
      }
    },

    showToast(msg, type = 'ok') {
      this.toast = { msg, type };
      setTimeout(() => { this.toast.msg = ''; }, 3000);
    },

    async loadAll() {
      await Promise.all([this.loadConfig(), this.loadStatus(), this.loadIpa()]);
    },

    async loadConfig() {
      const c = await this.api('GET', '/api/config');
      this.cfg = {
        groups: c.groups || [],
        priority_groups: c.priority_groups || [],
        whitelist: c.whitelist || [],
        rate_limit: c.rate_limit || { max_per_day: 30, min_interval_sec: 30, max_interval_sec: 120 },
      };
    },

    async loadStatus() {
      this.status = await this.api('GET', '/api/status');
    },

    async loadIpa() {
      const r = await this.api('GET', '/api/ipa');
      this.ipaList = r.files || [];
      this.groupApps();
    },

    async loadLog() {
      const r = await fetch('/api/logs/' + this.logName + '?lines=300');
      if (r.status === 401) {
        window.location.href = '/login';
        return;
      }
      const j = await r.json();
      this.logContent = (j.lines || []).join('');
      this.$nextTick(() => {
        const pre = document.querySelector('pre.log');
        if (pre) pre.scrollTop = pre.scrollHeight;
      });
    },

    async addGroup() {
      if (!this.newGroup.trim()) return;
      await this.api('POST', '/api/groups', { url: this.newGroup.trim() });
      this.newGroup = '';
      await this.loadConfig();
      this.showToast('已添加群组');
    },

    async delGroup(url) {
      if (!confirm('删除：' + url + '？')) return;
      await this.api('DELETE', '/api/groups', { url });
      await this.loadConfig();
      this.showToast('已删除');
    },

    async togglePriority(url) {
      await this.api('POST', '/api/groups/priority', { url });
      await this.loadConfig();
    },

    async addApp() {
      const name = this.newApp.name.trim();
      const kws = this.newApp.keywords.split(',').map((s) => s.trim()).filter(Boolean);
      if (!name || !kws.length) {
        this.showToast('请填写应用名和关键词', 'err');
        return;
      }
      await this.api('POST', '/api/whitelist', { name, keywords: kws });
      this.newApp = { name: '', keywords: '' };
      await this.loadConfig();
      this.showToast('已添加');
    },

    async delApp(name) {
      if (!confirm('删除 "' + name + '" 的规则？')) return;
      await this.api('DELETE', '/api/whitelist', { name });
      await this.loadConfig();
      this.showToast('已删除');
    },

    async addKeyword(app) {
      const k = (this.newKw[app.name] || '').trim();
      if (!k) return;
      if (app.keywords.includes(k)) {
        this.showToast('关键词已存在', 'err');
        return;
      }
      await this.api('PUT', '/api/whitelist', { name: app.name, keywords: [...app.keywords, k] });
      this.newKw[app.name] = '';
      await this.loadConfig();
    },

    async delKeyword(app, idx) {
      const next = app.keywords.filter((_, i) => i !== idx);
      if (!next.length) {
        if (!confirm('删除最后一个关键词会移除整个应用规则，继续？')) return;
        await this.api('DELETE', '/api/whitelist', { name: app.name });
      } else {
        await this.api('PUT', '/api/whitelist', { name: app.name, keywords: next });
      }
      await this.loadConfig();
    },

    async delIpaSingle(filename) {
      if (!confirm('确认删除 "' + filename + '"？')) return;
      await this.api('DELETE', '/api/ipa', { filenames: [filename] });
      await this.loadIpa();
      await this.loadStatus();
      this.showToast('已删除');
    },

    downloadIpa(filename) {
      window.open('/_ipa_proxy/' + encodeURIComponent(filename), '_blank');
    },

    async saveRate() {
      await this.api('PUT', '/api/rate_limit', this.cfg.rate_limit);
      this.showToast('速率已保存');
    },

    async changePassword() {
      if (!this.pw.old || !this.pw.new || !this.pw.confirm) {
        this.showToast('请填完三个字段', 'err');
        return;
      }
      if (this.pw.new !== this.pw.confirm) {
        this.showToast('两次密码不一致', 'err');
        return;
      }
      if (this.pw.new.length < 4) {
        this.showToast('新密码至少 4 位', 'err');
        return;
      }
      try {
        await this.api('PUT', '/api/password', {
          old_password: this.pw.old,
          new_password: this.pw.new,
        });
        this.showToast('已修改，3 秒后跳转登录');
        setTimeout(() => { window.location.href = '/login'; }, 3000);
      } catch (e) {}
    },

    async logout() {
      try {
        await fetch('/api/logout', { method: 'POST' });
      } catch (e) {}
      window.location.href = '/login';
    },

    async loadBot() {
      try {
        const r = await this.api('GET', '/api/bot');
        this.botCfg = {
          token: '',
          enabled: r.enabled !== false,
          token_preview: r.token_preview || '',
          has_token: r.has_token,
          bot_username: r.bot_username || '',
          chat_id: r.chat_id || '',
        };
      } catch (e) {}
    },

    async saveBot() {
      const token = this.botCfg.token.trim();
      if (this.botCfg.enabled && !token && !this.botCfg.has_token) {
        this.showToast('请输入 Bot Token', 'err');
        return;
      }
      this.botSaving = true;
      try {
        const payload = { enabled: this.botCfg.enabled };
        if (token) payload.bot_token = token;
        const r = await this.api('PUT', '/api/bot', payload);
        this.showToast(r.msg || '已保存');
        this.botCfg.token = '';
        await this.loadBot();
      } catch (e) {}
      this.botSaving = false;
    },

    async testBot() {
      this.botTesting = true;
      this.botTestResult = null;
      try {
        this.botTestResult = await this.api('POST', '/api/bot/test');
      } catch (e) {
        this.botTestResult = { ok: false, error: e.message };
      }
      this.botTesting = false;
    },

    async loadProxy() {
      try {
        const r = await this.api('GET', '/api/proxy');
        this.proxyCfg = {
          url: r.url || '',
          enabled: r.enabled !== false,
          source: r.source || '',
          env_tg_proxy: r.env_tg_proxy || '',
          env_forward_proxy: r.env_forward_proxy || '',
        };
        this.proxyPresets = r.presets || [];
      } catch (e) {}
    },

    async saveProxy() {
      this.proxySaving = true;
      try {
        const r = await this.api('PUT', '/api/proxy', {
          url: this.proxyCfg.url,
          enabled: this.proxyCfg.enabled,
          source: this.proxyCfg.source || 'custom',
        });
        this.showToast(r.msg || '已保存');
      } catch (e) {}
      this.proxySaving = false;
    },

    async testProxy() {
      this.proxyTesting = true;
      this.proxyTestResult = null;
      try {
        this.proxyTestResult = await this.api('POST', '/api/proxy/test', { url: this.proxyCfg.url });
      } catch (e) {
        this.proxyTestResult = { ok: false, error: e.message };
      }
      this.proxyTesting = false;
    },

    async triggerScan() {
      this.scanning = true;
      try {
        await this.api('POST', '/api/scan');
        this.showToast('扫描已触发');
        this.setWorkspace('logs');
        this.autoRefresh = true;
        this.loadLog();
      } finally {
        setTimeout(() => { this.scanning = false; }, 3000);
      }
    },
  };
}
</script>
</body>
</html>
